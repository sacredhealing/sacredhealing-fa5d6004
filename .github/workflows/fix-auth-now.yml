name: Fix Auth Users Now

on:
  push:
    paths:
      - '.github/workflows/fix-auth-now.yml'
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Create and verify auth users in new Supabase
        env:
          SVC: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          PASS="SiddhaQuantum2050!"

          echo "=== Checking existing users ==="
          USERS=$(curl -s "$BASE/auth/v1/admin/users?per_page=100" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC")
          echo "$USERS" | python3 -c "
import sys,json
d=json.load(sys.stdin)
users=d.get('users',[])
print(f'Total users: {len(users)}')
for u in users[:10]:
    print(f'  {u.get(\"email\",\"?\")} | id:{u.get(\"id\",\"?\")[:8]} | confirmed:{bool(u.get(\"email_confirmed_at\"))}')
"

          echo ""
          echo "=== Creating/resetting admin accounts ==="

          reset_user() {
            EMAIL="$1"
            echo "--- $EMAIL ---"
            
            # Try create first
            CREATE=$(curl -s -X POST "$BASE/auth/v1/admin/users" \
              -H "apikey: $SVC" \
              -H "Authorization: Bearer $SVC" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\",\"email_confirm\":true}")
            echo "Create response: $(echo $CREATE | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("id","")[:8] if "id" in d else d.get("code","") + " " + d.get("msg",""))')"
            
            # Get user ID (whether new or existing)
            UID=$(curl -s "$BASE/auth/v1/admin/users?per_page=1000" \
              -H "apikey: $SVC" \
              -H "Authorization: Bearer $SVC" \
              | python3 -c "
import sys,json
d=json.load(sys.stdin)
for u in d.get('users',[]):
    if u.get('email','').lower() == '$EMAIL'.lower():
        print(u['id'])
        break
")
            
            if [ -n "$UID" ]; then
              echo "Found user ID: $UID"
              UPDATE=$(curl -s -X PUT "$BASE/auth/v1/admin/users/$UID" \
                -H "apikey: $SVC" \
                -H "Authorization: Bearer $SVC" \
                -H "Content-Type: application/json" \
                -d "{\"password\":\"$PASS\",\"email_confirm\":true,\"ban_duration\":\"none\"}")
              echo "Password reset: $(echo $UPDATE | python3 -c 'import sys,json; d=json.load(sys.stdin); print("OK" if "id" in d else str(d)[:80])')"
            else
              echo "ERROR: User not found after create"
            fi
          }

          reset_user "sacredhealingvibe@gmail.com"
          reset_user "laila.amrouche@gmail.com"

          echo ""
          echo "=== Final user list ==="
          curl -s "$BASE/auth/v1/admin/users?per_page=100" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC" \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
users=d.get('users',[])
print(f'Total: {len(users)} users')
for u in users:
    print(f'  {u.get(\"email\",\"?\")} | confirmed:{bool(u.get(\"email_confirmed_at\"))} | id:{u.get(\"id\",\"\")[:8]}')
"
          echo ""
          echo "Login at siddhaquantumnexus.com with password: $PASS"
