name: Deploy jyotish-ephemeris edge function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/jyotish-ephemeris/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy jyotish-ephemeris
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy jyotish-ephemeris \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt
          echo "jyotish-ephemeris deployed"
