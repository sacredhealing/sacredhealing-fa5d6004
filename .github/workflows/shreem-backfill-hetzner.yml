name: Shreem Backfill — Run on Hetzner (non-blocked IP)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/shreem-backfill-hetzner.yml'
      - 'scripts/shreem_backfill.mjs'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Copy and run backfill on Hetzner
        env:
          # Use the live ssygukfdbtehvtndandn service role key
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          sudo apt-get install -y sshpass 2>/dev/null

          HETZNER_IP="178.105.183.74"
          HETZNER_PW="LiuCcqgARtAx"
          HELIUS_KEY="REMOVED_OLD_KEY"
          SUPA_KEY="${SUPABASE_SERVICE_KEY}"

          echo "Copying script..."
          sshpass -p "$HETZNER_PW" scp -o StrictHostKeyChecking=no \
            scripts/shreem_backfill.mjs root@${HETZNER_IP}:/root/shreem_backfill.mjs

          echo "Running backfill on Hetzner (non-Azure IP, Helius accessible)..."
          sshpass -p "$HETZNER_PW" ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 root@${HETZNER_IP} \
            "HELIUS_KEY=${HELIUS_KEY} SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co SUPABASE_SERVICE_KEY=${SUPA_KEY} node /root/shreem_backfill.mjs 2>&1" \
            | tee _backfill_result.txt

          echo "=== FINAL SUMMARY ==="
          grep -E "(🏆|✅|Total|→)" _backfill_result.txt | tail -30

      - name: Commit result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add _backfill_result.txt || true
          git commit -m "data: backfill $(date -u +%Y-%m-%d-%H%M)" || echo "nothing to commit"
          git push "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
