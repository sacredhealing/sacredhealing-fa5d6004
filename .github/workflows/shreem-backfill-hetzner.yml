name: Shreem Backfill — Run on Hetzner (non-blocked IP)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/shreem-backfill-hetzner.yml'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Copy backfill script to Hetzner and run it
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Install sshpass
          sudo apt-get install -y sshpass 2>/dev/null

          HETZNER_IP="178.105.183.74"
          HETZNER_PW="LiuCcqgARtAx"
          HELIUS_KEY="775d3d1f-6801-41de-a063-8aee4382d0f4"
          SUPA_KEY="${SUPABASE_SERVICE_KEY}"

          # Copy script to Hetzner
          sshpass -p "$HETZNER_PW" scp -o StrictHostKeyChecking=no \
            scripts/shreem_backfill.mjs root@${HETZNER_IP}:/root/shreem_backfill.mjs

          echo "Script copied — running backfill on Hetzner..."

          # Run on Hetzner (has Helius access, not Azure IP)
          sshpass -p "$HETZNER_PW" ssh -o StrictHostKeyChecking=no root@${HETZNER_IP} \
            "cd /root && HELIUS_KEY=${HELIUS_KEY} SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co SUPABASE_SERVICE_KEY=${SUPA_KEY} node shreem_backfill.mjs 2>&1" \
            | tee _backfill_result.txt

          echo ""
          echo "=== SUMMARY ==="
          grep -E "(✅|🏆|🐋|⚠|❌|inserted)" _backfill_result.txt | tail -30 || true

      - name: Commit result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI Backfill Bot"
          git add _backfill_result.txt || true
          git commit -m "data: shreem backfill via Hetzner $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
