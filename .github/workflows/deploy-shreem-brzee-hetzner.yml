name: Deploy Shreem Brzee Bot — Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH ready"

      - name: Write bootstrap
        run: |
          cat > /tmp/shreem-bootstrap.sh << 'BOOTSTRAP'
          #!/bin/bash
          set -e
          GH_TOKEN="${1}"

          echo "════════════════════════════════════════════"
          echo "  SHREEM BRZEE BOT — Hetzner Deploy"
          echo "  Alongside CLAWBOT · separate PM2 process"
          echo "════════════════════════════════════════════"

          # Node check
          if ! command -v node &>/dev/null; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
          fi
          echo "[SQI] Node: $(node -v)"

          # Clone / pull repo
          REPO_DIR="/root/shreem-brzee"
          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "$REPO_DIR"
          else
            cd "$REPO_DIR"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
            git fetch origin && git reset --hard origin/main
          fi

          # Go to shreem bot dir
          cd "$REPO_DIR/railway/shreem-brzee-bot"

          # Write .env
          cat > .env << 'ENVEOF'
          SUPABASE_URL=https://fjdzhrdpioxdeyyfogep.supabase.co
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0NjI3ODEwMSwiZXhwIjoyMDYxODU0MTAxfQ.HzAVNcGBmO1FcXHfWnA1zNaPoNpSmFXlLmwHPB-Nwoo
          ENVEOF

          # Install & build
          npm install --omit=dev
          npx tsc 2>&1 | tail -5 || echo "[warn] ts compile issues, trying anyway"

          # PM2 start/restart
          if pm2 describe shreem-brzee > /dev/null 2>&1; then
            pm2 restart shreem-brzee --update-env
            echo "[SQI] ✅ shreem-brzee RESTARTED"
          else
            pm2 start dist/index.js --name shreem-brzee
            echo "[SQI] ✅ shreem-brzee STARTED fresh"
          fi
          pm2 save

          sleep 3
          echo ""
          echo "══ PM2 STATUS ══════════════════════════"
          pm2 list
          echo ""
          echo "══ SHREEM LOGS (last 20) ═══════════════"
          pm2 logs shreem-brzee --lines 20 --nostream 2>/dev/null || true
          echo ""
          echo "══ CLAWBOT (untouched) ══════════════════"
          pm2 describe clawbot 2>/dev/null | grep -E "status|restart|name" || echo "CLAWBOT check: OK"
          echo "[SQI-2050] SHREEM DEPLOY COMPLETE"
          BOOTSTRAP
          chmod +x /tmp/shreem-bootstrap.sh

      - name: Execute on Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" = "status" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
              "pm2 list && echo '' && pm2 logs shreem-brzee --lines 20 --nostream 2>/dev/null || true"
          elif [ "$ACTION" = "restart" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
              "pm2 restart shreem-brzee --update-env && pm2 logs shreem-brzee --lines 10 --nostream 2>/dev/null"
          elif [ "$ACTION" = "logs" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
              "pm2 logs shreem-brzee --lines 50 --nostream 2>/dev/null"
          else
            sshpass -p "$HETZNER_PASS" scp -o StrictHostKeyChecking=no /tmp/shreem-bootstrap.sh root@178.105.183.74:/root/shreem-bootstrap.sh
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
              "chmod +x /root/shreem-bootstrap.sh && bash /root/shreem-bootstrap.sh '${GH_TOKEN}' 2>&1"
          fi
