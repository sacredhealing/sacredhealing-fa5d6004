name: Deploy Shreem Brzee Bot — Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, restart, status, logs]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get install -y sshpass -qq
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run on Hetzner
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          ACTION="${{ github.event.inputs.action }}"

          case "$ACTION" in
            status)
              sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
                'echo "=== PM2 ===" && pm2 list && echo "" && echo "=== SHREEM LOGS ===" && pm2 logs shreem-brzee --lines 30 --nostream 2>/dev/null || true'
              ;;
            restart)
              sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
                'pm2 restart shreem-brzee --update-env && sleep 2 && pm2 logs shreem-brzee --lines 15 --nostream 2>/dev/null'
              ;;
            logs)
              sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 \
                'pm2 logs shreem-brzee --lines 80 --nostream 2>/dev/null'
              ;;
            *)
              # Full deploy
              sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 << SSHEOF
                set -e
                echo "══════════════════════════════════════════"
                echo "  SHREEM BRZEE — Hetzner Deploy"
                echo "══════════════════════════════════════════"

                # Node 20
                if ! command -v node &>/dev/null || [[ "\$(node -v)" != v20* ]]; then
                  curl -fsSL https://deb.nodesource.com/setup_20.x | bash - > /dev/null 2>&1
                  apt-get install -y nodejs > /dev/null 2>&1
                fi
                echo "Node \$(node -v) | npm \$(npm -v)"

                # PM2
                if ! command -v pm2 &>/dev/null; then
                  npm install -g pm2 > /dev/null 2>&1
                fi

                # Clone / pull
                REPO="/root/shreem-brzee"
                if [ ! -d "\$REPO/.git" ]; then
                  git clone "https://x-access-token:${GH}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "\$REPO" --depth=1 --quiet
                else
                  cd "\$REPO"
                  git remote set-url origin "https://x-access-token:${GH}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
                  git fetch origin main --quiet && git reset --hard origin/main --quiet
                fi

                cd "\$REPO/railway/shreem-brzee-bot"

                # Install & build
                npm install --omit=dev --silent
                npx tsc --skipLibCheck 2>&1 | grep -v "^$" | tail -10 || true

                # Start / restart
                if pm2 describe shreem-brzee > /dev/null 2>&1; then
                  pm2 restart shreem-brzee --update-env
                  echo "✅ shreem-brzee RESTARTED"
                else
                  pm2 start dist/index.js --name shreem-brzee
                  echo "✅ shreem-brzee STARTED"
                fi
                pm2 save --force > /dev/null

                sleep 4
                echo ""
                echo "══ PM2 LIST ══"
                pm2 list
                echo ""
                echo "══ SHREEM LOGS ══"
                pm2 logs shreem-brzee --lines 25 --nostream 2>/dev/null || true
                echo ""
                echo "══ CLAWBOT (untouched) ══"
                pm2 describe clawbot 2>/dev/null | grep -E "status|restarts" | head -3 || true
                echo "══════════════════════════════════════════"
                echo "  DEPLOY COMPLETE"
                echo "══════════════════════════════════════════"
SSHEOF
              ;;
          esac
