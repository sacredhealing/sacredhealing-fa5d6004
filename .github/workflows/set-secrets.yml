name: Set Secrets in New Supabase

on:
  workflow_dispatch:

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure all secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          S_GEMINI: ${{ secrets.S_GEMINI }}
          S_RESEND: ${{ secrets.S_RESEND }}
          S_STRIPE_SECRET: ${{ secrets.S_STRIPE_SECRET }}
          S_STRIPE_WEBHOOK: ${{ secrets.S_STRIPE_WEBHOOK }}
          S_DAILY: ${{ secrets.S_DAILY }}
          S_TELEGRAM_BOT: ${{ secrets.S_TELEGRAM_BOT }}
          S_TELEGRAM_GROUP: ${{ secrets.S_TELEGRAM_GROUP }}
          S_OPENAI: ${{ secrets.S_OPENAI }}
          S_YOUTUBE_API: ${{ secrets.S_YOUTUBE_API }}
          S_YOUTUBE_CLIENT_ID: ${{ secrets.S_YOUTUBE_CLIENT_ID }}
          S_YOUTUBE_CLIENT_SECRET: ${{ secrets.S_YOUTUBE_CLIENT_SECRET }}
          S_META_APP_ID: ${{ secrets.S_META_APP_ID }}
          S_META_APP_SECRET: ${{ secrets.S_META_APP_SECRET }}
          S_META_PAGE_ID: ${{ secrets.S_META_PAGE_ID }}
          S_META_PAGE_TOKEN: ${{ secrets.S_META_PAGE_TOKEN }}
          S_META_USER_TOKEN: ${{ secrets.S_META_USER_TOKEN }}
          S_META_KRITAGYA_PAGE: ${{ secrets.S_META_KRITAGYA_PAGE }}
          S_BOT_WEBHOOK: ${{ secrets.S_BOT_WEBHOOK }}
          S_AUDIO_WORKER_URL: ${{ secrets.S_AUDIO_WORKER_URL }}
          S_AUDIO_WORKER_KEY: ${{ secrets.S_AUDIO_WORKER_KEY }}
          S_RAPIDAPI_TRACK: ${{ secrets.S_RAPIDAPI_TRACK }}
          S_RAPIDAPI_NOISE: ${{ secrets.S_RAPIDAPI_NOISE }}
          S_RAPIDAPI_LANDR: ${{ secrets.S_RAPIDAPI_LANDR }}
          S_RAPIDAPI_STEM: ${{ secrets.S_RAPIDAPI_STEM }}
          S_SOLANA: ${{ secrets.S_SOLANA }}
          S_SHC_MINT: ${{ secrets.S_SHC_MINT }}
          S_BOT_URL: ${{ secrets.S_BOT_URL }}
          S_STRIPE_PRICE_999: ${{ secrets.S_STRIPE_PRICE_999 }}
          S_STRIPE_PRICE_1499: ${{ secrets.S_STRIPE_PRICE_1499 }}
          S_STRIPE_PRICE_149: ${{ secrets.S_STRIPE_PRICE_149 }}
        run: node scripts/set-secrets.mjs
