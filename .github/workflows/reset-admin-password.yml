name: Reset Admin Password

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send password reset email
        env:
          SERVICE_KEY: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://fjdzhrdpioxdeyyfogep.supabase.co/auth/v1/admin/users/generate-link" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "apikey: $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type":"recovery","email":"sacredhealingvibe@gmail.com","redirect_to":"https://www.siddhaquantumnexus.com/auth"}')
          echo "Status: $STATUS"
          cat /tmp/resp.json

      - name: Also try for laila
        env:
          SERVICE_KEY: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          curl -s -X POST "https://fjdzhrdpioxdeyyfogep.supabase.co/auth/v1/admin/users/generate-link" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "apikey: $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"type":"recovery","email":"laila.amrouche@gmail.com","redirect_to":"https://www.siddhaquantumnexus.com/auth"}'
          echo "Done"
