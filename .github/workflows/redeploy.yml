name: Redeploy Production
on:
  workflow_dispatch:
jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Production Deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{"name":"sacredhealing-fa5d6004-adb1","target":"production","gitSource":{"type":"github","repoId":"sacredhealing/sacredhealing-fa5d6004","ref":"main"}}" | head -c 500
