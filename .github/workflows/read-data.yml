name: Read DB Data

on:
  push:
    paths:
      - '.github/workflows/read-data.yml'

jobs:
  read:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Read storage and DB
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SVC: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF' > /tmp/dbdata.json
          const https = require('https');
          const PAT = process.env.PAT;
          const REF = 'ssygukfdbtehvtndandn';
          const OLD = 'https://ssygukfdbtehvtndandn.supabase.co';
          const SVC = process.env.SVC;

          function sql(q) {
            return new Promise(res => {
              const b = JSON.stringify({query:q});
              const r = https.request({hostname:'api.supabase.com',path:`/v1/projects/${REF}/database/query`,method:'POST',
                headers:{'Authorization':`Bearer ${PAT}`,'Content-Type':'application/json','Content-Length':Buffer.byteLength(b)}
              },resp=>{let d='';resp.on('data',c=>d+=c);resp.on('end',()=>{try{res(JSON.parse(d))}catch{res(d)}})});
              r.on('error',e=>res(e.message)); r.write(b); r.end();
            });
          }

          function rest(path) {
            return new Promise(res => {
              const r = https.request({hostname:'ssygukfdbtehvtndandn.supabase.co',path,method:'GET',
                headers:{'apikey':SVC,'Authorization':`Bearer ${SVC}`}
              },resp=>{let d='';resp.on('data',c=>d+=c);resp.on('end',()=>{try{res(JSON.parse(d))}catch{res(d)}})});
              r.on('error',e=>res(e.message)); r.end();
            });
          }

          async function main() {
            const result = {};

            // Check storage buckets
            result.buckets = await sql(`SELECT id, name, public FROM storage.buckets ORDER BY name`);

            // Check creative-soul-library files by folder
            const folders = ['indian','shamanic','mystic','tibetan','sufi','zen','nature','ocean','sound_bath','chakra','higher_consciousness','relaxing','forest','breath_focus','kundalini'];
            const storageCounts = {};
            for (const folder of folders) {
              const files = await sql(`SELECT COUNT(*) as count FROM storage.objects WHERE bucket_id = 'creative-soul-library' AND name LIKE '${folder}/%'`);
              storageCounts[folder] = files.b?.[0]?.count || 0;
            }
            result.creative_soul_storage_counts = storageCounts;

            // Total files in creative-soul-library
            result.creative_soul_total = await sql(`SELECT COUNT(*) as count FROM storage.objects WHERE bucket_id = 'creative-soul-library'`);

            // Sample files
            result.creative_soul_sample = await sql(`SELECT name, bucket_id FROM storage.objects WHERE bucket_id = 'creative-soul-library' LIMIT 10`);

            // meditation_style_sounds count
            result.style_sounds_count = await sql(`SELECT COUNT(*) FROM public.meditation_style_sounds`);

            // Check all buckets and their file counts
            result.all_bucket_counts = await sql(`
              SELECT bucket_id, COUNT(*) as files
              FROM storage.objects
              GROUP BY bucket_id
              ORDER BY files DESC
            `);

            console.log(JSON.stringify(result, null, 2));
          }
          main().catch(e=>console.error(e.message));
          EOF

      - name: Commit output
        run: |
          cp /tmp/dbdata.json scripts/dbdata.json
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add scripts/dbdata.json
          git diff --staged --quiet || git commit -m "diag: storage and DB data"
          git push
