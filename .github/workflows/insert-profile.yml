name: Insert Adam Profile

on:
  push:
    paths:
      - '.github/workflows/insert-profile.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert Adam profile into new Supabase
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          SVC="${{ secrets.NEW_SERVICE_ROLE }}"
          UUID="bd0b21c9-577a-450b-bb1e-21c9d0423f17"

          echo "=== Upsert Adam profile ==="
          curl -s -X POST "$BASE/rest/v1/profiles" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "{\"id\":\"$UUID\",\"email\":\"sacredhealingvibe@gmail.com\",\"full_name\":\"Adam\",\"display_name\":\"Adam\",\"membership_tier\":\"akasha_infinity\",\"is_admin\":true}"

          echo ""
          echo "=== Also set membership table if exists ==="
          curl -s -X POST "$BASE/rest/v1/user_memberships" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"user_id\":\"$UUID\",\"tier\":\"akasha_infinity\",\"status\":\"active\"}" || true

          echo ""
          echo "=== Verify ==="
          curl -s "$BASE/rest/v1/profiles?id=eq.$UUID&select=id,full_name,display_name,email,membership_tier,is_admin" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC"
