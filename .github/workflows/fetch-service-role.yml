name: Fetch Supabase Service Role Key

on:
  workflow_dispatch:

jobs:
  fetch-service-role:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install PyNaCl requests -q

      - name: Run fetch script
        env:
          SUPA_PAT: ${{ secrets.SUPA_ADMIN_PAT }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: python3 scripts/fetch_service_role.py
