name: Deploy Shreem Helius Webhook

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | setup-helius-webhook'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - setup-helius-webhook

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy shreem-helius-webhook edge function
        if: github.event.inputs.action == 'deploy'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Deploying shreem-helius-webhook..."
          supabase functions deploy shreem-helius-webhook \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
          echo "✅ shreem-helius-webhook deployed"
          echo ""
          echo "Edge function URL:"
          echo "https://fjdzhrdpioxdeyyfogep.supabase.co/functions/v1/shreem-helius-webhook"

      - name: Register Helius webhook
        if: github.event.inputs.action == 'setup-helius-webhook'
        env:
          HELIUS_API_KEY: '775d3d1f-6801-41de-a063-8aee4382d0f4'
        run: |
          node << 'JSEOF'
          const https = require('https');
          const KEY = process.env.HELIUS_API_KEY;

          const WHALE_WALLETS = [
            'FnCPt5VWxHyRE6oFGLuJEf4tzmLEJPdPKXdnCumHzMQT',
            'AzEn6PEKCiHRkKHPELwVoK2pHcUjQrAMYyNxaVkgKnwH',
            'HeyitsYoloXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
            'EVvpKxsMzn7F65fMr6qbJuBaAvuZhZr5KSbJ5gH3UW8m',
