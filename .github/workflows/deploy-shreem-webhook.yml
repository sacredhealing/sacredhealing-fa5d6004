name: Deploy Shreem Helius Webhook

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | setup-helius-webhook | list-webhooks'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, setup-helius-webhook, list-webhooks]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── DEPLOY edge function to OLD (live) Supabase ──────────────
      - name: Deploy edge function
        if: github.event.inputs.action == 'deploy'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Deploying shreem-helius-webhook → ssygukfdbtehvtndandn..."
          supabase functions deploy shreem-helius-webhook \
            --project-ref ssygukfdbtehvtndandn \
            --no-verify-jwt 2>&1
          echo ""
          echo "✅ Deployed. URL:"
          echo "https://ssygukfdbtehvtndandn.supabase.co/functions/v1/shreem-helius-webhook"

      # ── REGISTER Helius webhook ───────────────────────────────────
      - name: Register Helius webhook
        if: github.event.inputs.action == 'setup-helius-webhook'
        run: |
          node << 'JSEOF'
          const https = require('https');

          const HELIUS_KEY = 'REMOVED_OLD_KEY';

          // 21 verified elite Solana whale wallets (matches edge function)
          const WALLETS = [
            'HdxkiXqeN6qpK2YbG51W23QSWj3Yygc1eEk2zwmKJExp',
            'H72yLkhTnoBfhBTXXaj1RBXuirm8s8G5fcVh2XpQLggM',
            '4Be9CvxqHW6BYiRAxW9Q3xu1ycTMWaL5z8NX4HR3ha7t',
            '7x6qE3DRMW2ZCgT1YQuBLePiheEWw7qjH6rYjj6GDtEd',
            '9WzDXwBbmkg8ZTbNMqUxvQRAyrZzDsGYdLVL9zYtAWWM',
            'DfXygSm4jCyNCybVYYK6DwvWqjKee8pbDmJGcLWNDXjh',
            'GHoTTNFnSBFBbZvBZNvwNz7jtJz1TBNBqkS9vGPnm7Dv',
            '5tzFkiKscXHK5ZXCGbGuPbCLNqLJnEUPs3EBGzSdAFkF',
            'BU9EFBu2DSPwvbMpPjiFf46jqNiPDuvBkEbBBBDJUHBg',
            '58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWagsenfzNnvk',
            'Gr5mNBC5GnBZBQMm3MdVU9vEFpNSR1pGbTc8o1BvUCNh',
            'ASTyfSima4LLAdDgoFGkgqoKowG1LZFDr9fAQrg7iaJZ',
            '2AQdpHJ2JpcEgPiATUXjQxA8QmafFegfQwSLWSprPicm',
            'Dt4GEBcpsSCB2B1kSsRobF26TvBVVcfKAGR6pXPJSFfA',
            'EVvpKxsMzn7F65fMr6qbJuBaAvuZhZr5KSbJ5gH3UW8m',
            'CmqJEJg6tLMV7VnXL5PvXtxBMBqVr4XJHNKEhLJHm1E',
            '8GFzKBLyFGDQRBMFhNKHMuq9MeFEWAT6c6E1a6HYpump',
            'FYmEhv1CybVe3NHGiK2gPLNfBCFkc5XNhEL7J2MhMkE',
            '3QsmYbFPSFAHcnEHbmcqAGqJhkYVCMSmCHPG7BLNBZEV',
            'DpWpCsnmhzmpjfhTtdKQSVQv78MdPHhFzKWkdumzXJNS',
            'GTMckXBGFT9qigrJLxUq5FBjcgbJLqh2DLZ4H7LGGEP',
          ];

          // Edge function on OLD Supabase project
          const WEBHOOK_URL = 'https://ssygukfdbtehvtndandn.supabase.co/functions/v1/shreem-helius-webhook';

          const body = JSON.stringify({
            webhookURL:       WEBHOOK_URL,
            transactionTypes: ['SWAP'],
            accountAddresses: WALLETS,
            webhookType:      'enhanced',
            txnStatus:        'success',
          });

          const req = https.request({
            hostname: 'api.helius.xyz',
            path: `/v0/webhooks?api-key=${HELIUS_KEY}`,
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) },
          }, (res) => {
            let d = '';
            res.on('data', c => d += c);
            res.on('end', () => {
              console.log(`Helius API → ${res.statusCode}`);
              try {
                const p = JSON.parse(d);
                console.log('Webhook ID:', p.webhookID || '(see full)');
                console.log(JSON.stringify(p, null, 2));
              } catch { console.log(d.slice(0, 1000)); }
            });
          });
          req.on('error', e => console.error('Error:', e.message));
          req.write(body);
          req.end();
          JSEOF

      # ── LIST existing Helius webhooks ─────────────────────────────
      - name: List Helius webhooks
        if: github.event.inputs.action == 'list-webhooks'
        run: |
          curl -s "https://api.helius.xyz/v0/webhooks?api-key=REMOVED_OLD_KEY" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
if isinstance(d, list):
    print(f'Total webhooks: {len(d)}')
    for w in d:
        print(f'  ID: {w.get(\"webhookID\")}')
        print(f'  URL: {w.get(\"webhookURL\")}')
        print(f'  Wallets: {len(w.get(\"accountAddresses\",[]))}')
        print()
else:
    print(d)
"

