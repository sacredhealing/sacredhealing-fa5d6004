name: Deploy palm-oracle-reading Edge Function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/palm-oracle-reading/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout OK"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy palm-oracle-reading
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying palm-oracle-reading ==="
          supabase functions deploy palm-oracle-reading --project-ref fjdzhrdpioxdeyyfogep --no-verify-jwt
          echo "Done at $(date)"
