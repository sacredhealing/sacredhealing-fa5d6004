name: Deploy palm-oracle-reading Edge Function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/palm-oracle-reading/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout OK"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to NEW Supabase (active)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying palm-oracle-reading → NEW Supabase ==="
          supabase functions deploy palm-oracle-reading --project-ref fjdzhrdpioxdeyyfogep --no-verify-jwt
          echo "NEW done at $(date)"

      - name: Deploy to OLD Supabase (Lovable - live app)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying palm-oracle-reading → OLD Supabase (Lovable) ==="
          supabase functions deploy palm-oracle-reading --project-ref ssygukfdbtehvtndandn --no-verify-jwt
          echo "OLD done at $(date)"
