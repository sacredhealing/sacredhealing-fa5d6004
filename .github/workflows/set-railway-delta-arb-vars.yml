name: Set Railway Delta-Arb Supabase Vars
on:
  workflow_dispatch:
jobs:
  set-vars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Clear trades and set balance
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          # Step 1: Clear all trades from Supabase
          python3 scripts/resolve_trades.py 2>&1 | tee _railway_vars_result.txt

          # Step 2: Set STARTING_BALANCE=10 in Railway
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { variableCollectionUpsert(input: { projectId: \"4851410d-a6d6-4739-be6b-33e6deb5b6f2\", environmentId: \"5745e241-6e8e-4c3e-a5fd-91efff9a72c2\", serviceId: \"d06cd2df-e657-434f-b8fa-db34c3b3c473\", variables: { STARTING_BALANCE: \"10\" } }) }"}' \
            >> _railway_vars_result.txt

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add _railway_vars_result.txt && git commit -m "ci: cleared + reset" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
