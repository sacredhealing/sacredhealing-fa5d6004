name: Set Railway Delta-Arb Supabase Vars
on:
  workflow_dispatch:
jobs:
  set-vars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check Railway vars and redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_railway_vars_result.txt"

          echo "=== Current Railway Variables ===" | tee $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ variables(serviceId: \"d06cd2df-e657-434f-b8fa-db34c3b3c473\", environmentId: \"5745e241-6e8e-4c3e-a5fd-91efff9a72c2\", projectId: \"4851410d-a6d6-4739-be6b-33e6deb5b6f2\") }"}' \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
v=d.get('data',{}).get('variables',{})
for k,val in v.items():
    if k in ['MODE','STARTING_BALANCE','STRATEGY']:
        print(f'{k} = {val}')
    elif 'PRIVATE' in k or 'KEY' in k:
        print(f'{k} = {val[:10]}...' if val else f'{k} = EMPTY')
    elif 'ADDRESS' in k or 'FUNDER' in k:
        print(f'{k} = {val}')
" | tee -a $LOG

          echo "" >> $LOG
          echo "=== Triggering redeploy ===" | tee -a $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"5745e241-6e8e-4c3e-a5fd-91efff9a72c2\", serviceId: \"d06cd2df-e657-434f-b8fa-db34c3b3c473\") }"}' \
            | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: check vars + redeploy" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
