name: Apply Delta-Arb Bot Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Delta-Arb migration via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          npm install -g supabase@latest 2>&1 | tail -2
          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo
          cd repo
          supabase link --project-ref fjdzhrdpioxdeyyfogep 2>&1
          supabase db push --linked 2>&1 || true
          echo "Migration complete"
