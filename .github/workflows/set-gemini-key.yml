name: Set GEMINI_API_KEY Directly
on:
  workflow_dispatch:
jobs:
  set-key:
    runs-on: ubuntu-latest
    steps:
      - name: Push GEMINI_API_KEY to new Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Pushing key to fjdzhrdpioxdeyyfogep..."
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "[{\"name\":\"GEMINI_API_KEY\",\"value\":\"$GEMINI_API_KEY\"}]")
          echo "Status: $STATUS"
          cat /tmp/resp.json
