name: Deploy Sniper to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH ready"

      - name: Write bootstrap
        run: |
          echo "" | base64 -d > /tmp/sniper-bootstrap.sh
          chmod +x /tmp/sniper-bootstrap.sh
          echo "Bootstrap: $(wc -c < /tmp/sniper-bootstrap.sh) bytes"

      - name: Execute on Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" = "status" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 "pm2 list && pm2 logs sovereign-sniper --lines 30 --nostream 2>/dev/null || true"
          elif [ "$ACTION" = "restart" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 "pm2 restart sovereign-sniper --update-env && pm2 logs sovereign-sniper --lines 20 --nostream 2>/dev/null"
          elif [ "$ACTION" = "logs" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 "pm2 logs sovereign-sniper --lines 50 --nostream 2>/dev/null"
          else
            sshpass -p "$HETZNER_PASS" scp -o StrictHostKeyChecking=no /tmp/sniper-bootstrap.sh root@178.105.183.74:/root/sniper-bootstrap.sh
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 "chmod +x /root/sniper-bootstrap.sh && bash /root/sniper-bootstrap.sh '${GH_TOKEN}' 2>&1"
          fi
