name: Fix User Metadata

on:
  push:
    paths:
      - '.github/workflows/fix-user-metadata.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix user metadata for Adam account
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          SVC="${{ secrets.NEW_SERVICE_ROLE }}"
          UUID="bd0b21c9-577a-450b-bb1e-21c9d0423f17"

          echo "=== List ALL auth users ==="
          curl -s "$BASE/auth/v1/admin/users?per_page=100" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC"

          echo ""
          echo "=== Update user metadata for Adam ==="
          curl -s -X PUT "$BASE/auth/v1/admin/users/$UUID" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC" \
            -H "Content-Type: application/json" \
            -d '{"user_metadata":{"full_name":"Adam","display_name":"Adam","name":"Adam"},"app_metadata":{"is_admin":true}}'

          echo ""
          echo "=== Verify ==="
          curl -s "$BASE/auth/v1/admin/users/$UUID" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC"
