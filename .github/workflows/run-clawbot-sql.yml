name: Run CLAWBOT SQL Direct

on:
  workflow_dispatch:

jobs:
  run-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Execute SQL via psql
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_clawbot_sql_result.txt"
          echo "=== CLAWBOT SQL $(date -u) ===" > $LOG

          # Install psql
          sudo apt-get install -y postgresql-client 2>&1 | tail -3

          # Get DB connection string via Supabase API
          DB_URL=$(curl -s             -H "Authorization: Bearer ${SUPABASE_PAT}"             "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep"             | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('db_host',''))" 2>/dev/null)

          echo "DB host: $DB_URL" >> $LOG

          python3 scripts/run_sql_direct.py 2>&1 | tee -a $LOG

          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add $LOG
          git commit -m "CLAWBOT SQL result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
