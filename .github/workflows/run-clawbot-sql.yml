name: Run CLAWBOT SQL Direct

on:
  workflow_dispatch:

jobs:
  run-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check delta_arb_trades
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          KEY="${SK:-$SK2}"
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          LOG="_resolve_result.txt"
          
          echo "=== TRADES COUNT ===" | tee $LOG
          curl -s "${BASE}/delta_arb_trades?select=id&limit=1" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" \
            -H "Prefer: count=exact" -D - | grep -i "content-range" | tee -a $LOG
          
          echo "" >> $LOG
          echo "=== ALL TRADES ===" | tee -a $LOG
          curl -s "${BASE}/delta_arb_trades?select=id,asset,signal,delta,size_usd,entry_price,status,pnl_usdc,net_pnl_usdc,created_at&order=created_at.desc&limit=100" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(f'Total rows: {len(data)}')
won  = [t for t in data if t.get('status')=='won']
lost = [t for t in data if t.get('status')=='lost']
open_ = [t for t in data if t.get('status') not in ['won','lost']]
total_pnl = sum(float(t.get('pnl_usdc') or 0) for t in data)
print(f'Won: {len(won)} | Lost: {len(lost)} | Open: {len(open_)}')
print(f'Total PnL: {total_pnl:.4f}')
print()
for t in data[:10]:
    print(f'  {t.get("asset","?"):4} {t.get("signal","?"):5} {t.get("delta","?"):12} {t.get("status","?"):6} pnl={t.get("pnl_usdc","NULL")} size={t.get("size_usd","?")}')
" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: trades audit" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
