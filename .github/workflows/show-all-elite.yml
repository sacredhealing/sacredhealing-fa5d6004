name: List All Elite

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: List elite wallets
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          B="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/polymarket_whales"
          H1="apikey: ${SK}"
          H2="Authorization: Bearer ${SK}"
          LOG="_elite_list.txt"
          
          echo "ELITE WALLETS:" > $LOG
          curl -s "${B}?is_elite=eq.true&order=total_profit.desc&select=alias,total_profit,win_rate_30d,strategy" \
            -H "$H1" -H "$H2" >> $LOG
          echo "" >> $LOG
          echo "TOTAL COUNT:" >> $LOG
          curl -s "${B}?select=is_elite" -H "$H1" -H "$H2" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Elite:',sum(1 for w in d if w.get('is_elite')), '| Total:',len(d))" >> $LOG
          
          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "Elite list" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
