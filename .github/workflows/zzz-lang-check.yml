name: SQI - Diagnostic Language Coverage Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Query preferred_language distribution
        env:
          SUPABASE_URL: ${{ secrets.LOVABLE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.LOVABLE_SUPABASE_ANON_KEY }}
          SCRIPT_B64: 
        run: |
          curl -s "${SUPABASE_URL}/rest/v1/profiles?select=preferred_language"             -H "Authorization: Bearer ${SUPABASE_KEY}"             -H "apikey: ${SUPABASE_KEY}" > /tmp/langs.json
          echo "$SCRIPT_B64" | base64 -d > /tmp/lang_check.py
          python3 /tmp/lang_check.py
      - name: Commit result
        run: |
          git config user.name "SQI Bot"
          git config user.email "bot@sqi.local"
          mkdir -p diagnostics
          mv diagnostics_lang_result.json diagnostics/lang-coverage.json 2>/dev/null || echo {} > diagnostics/lang-coverage.json
          git add diagnostics/lang-coverage.json
          git commit -m "diagnostic: language coverage result" || echo "nothing to commit"
          git push
