name: Deploy SQI Transmission Heartbeat

on:
  workflow_dispatch:
  push:
    paths:
      - supabase/functions/sqi-transmission-heartbeat/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -s -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '[
              {"name":"SUPABASE_URL","value":"https://fjdzhrdpioxdeyyfogep.supabase.co"},
              {"name":"SUPABASE_SERVICE_ROLE_KEY","value":"${{ secrets.NEW_SERVICE_ROLE }}"}
            ]'

      - name: Deploy heartbeat function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying sqi-transmission-heartbeat ==="
          supabase functions deploy sqi-transmission-heartbeat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
          echo "Exit: $?"

      - name: Done
        run: echo "Heartbeat deployed at $(date)"
