name: Run Full Data Migration

on:
  push:
    paths:
      - 'scripts/run-full-migration.mjs'
      - 'scripts/diagnose.mjs'
      - '.github/workflows/run-migration.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Diagnose connection
        env:
          NEW_SERVICE_ROLE: ${{ secrets.NEW_SERVICE_ROLE }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/diagnose.mjs
      - name: Run full migration
        env:
          NEW_SERVICE_ROLE: ${{ secrets.NEW_SERVICE_ROLE }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/run-full-migration.mjs
