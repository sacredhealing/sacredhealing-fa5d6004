name: Run User Data Migration

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/run-migration.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run migration edge function
        run: |
          echo "Calling migrate-to-new-project on old Supabase..."
          RESPONSE=$(curl -s -X POST \
            "https://ssygukfdbtehvtndandn.supabase.co/functions/v1/migrate-to-new-project" \
            -H "Content-Type: application/json" \
            -H "x-new-service-role: ${{ secrets.NEW_SERVICE_ROLE }}" \
            --max-time 300)

          echo "Response:"
          echo "$RESPONSE"
          echo "$RESPONSE" > migration-report.json

      - name: Commit migration report
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add migration-report.json
          git diff --staged --quiet || git commit -m "chore: migration report $(date +%Y%m%d-%H%M%S)"
          git push || true
