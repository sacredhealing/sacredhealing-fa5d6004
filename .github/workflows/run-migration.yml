name: Run User Data Migration

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/run-migration.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger migration edge function
        run: |
          echo "Calling migrate-to-new-project edge function..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ssygukfdbtehvtndandn.supabase.co/functions/v1/migrate-to-new-project" \
            -H "Content-Type: application/json" \
            -H "x-new-service-role: ${{ secrets.NEW_SERVICE_ROLE }}" \
            --max-time 300)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Migration failed with status $HTTP_CODE"
            exit 1
          fi
          echo "Migration complete!"
