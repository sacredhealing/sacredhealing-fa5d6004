name: Create Delta-Arb Tables Like CLAWBOT

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Fix affiliate rates + grant permissions
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          LOG="_delta_arb_create.txt"

          q() {
            curl -s -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          echo "Seeding affiliate rates (fixed)..." | tee $LOG
          q '{"query":"INSERT INTO delta_arb_affiliate_rates (tier, l1_pct, l2_pct) VALUES ('\''free'\'',10.00,3.00),(('\''prana_flow'\'',8.00,2.00),(('\''siddha_quantum'\'',5.00,1.00),(('\''akasha_infinity'\'',3.00,1.00) ON CONFLICT (tier) DO UPDATE SET l1_pct=EXCLUDED.l1_pct, l2_pct=EXCLUDED.l2_pct"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Granting permissions to service_role and anon..." | tee -a $LOG
          q '{"query":"GRANT ALL ON delta_arb_members TO service_role, anon, authenticated; GRANT ALL ON delta_arb_trades TO service_role, anon, authenticated; GRANT ALL ON delta_arb_fee_ledger TO service_role, anon, authenticated; GRANT ALL ON delta_arb_platform_config TO service_role, anon, authenticated; GRANT ALL ON delta_arb_affiliate_rates TO service_role, anon, authenticated;"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Verifying wallet..." | tee -a $LOG
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_platform_config?select=platform_wallet&id=eq.1" \
            -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" | tee -a $LOG
          echo "" >> $LOG

          echo "Verifying affiliate rates..." | tee -a $LOG
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_affiliate_rates?select=*" \
            -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: delta-arb fix affiliates + grant perms" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
