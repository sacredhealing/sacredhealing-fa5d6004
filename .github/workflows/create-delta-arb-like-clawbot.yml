name: Create Delta-Arb Tables Like CLAWBOT

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check trades + fix RLS
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          KEY="${SK:-$SK2}"
          LOG="_delta_arb_create.txt"
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"

          q() {
            curl -s -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          echo "=== Last 5 trades ===" | tee $LOG
          curl -s "${BASE}/delta_arb_trades?select=asset,signal,delta,status,pnl_usdc,created_at&order=created_at.desc&limit=5" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | python3 -c "
import sys,json
data=json.load(sys.stdin)
print(f'Total recent: {len(data)}')
for t in data: print(f'  {t.get("created_at","?")[:16]}  {t.get("asset","?"):4} {t.get("signal","?"):5} {t.get("delta","?"):12} {t.get("status","?"):6} pnl={t.get("pnl_usdc","NULL")}')
" | tee -a $LOG
          echo "" >> $LOG

          echo "=== Fixing RLS - ensure public read works ===" | tee -a $LOG
          q '{"query":"DROP POLICY IF EXISTS \"Public read delta_arb_trades\" ON delta_arb_trades"}' >> $LOG
          q '{"query":"CREATE POLICY \"Public read delta_arb_trades\" ON delta_arb_trades FOR SELECT USING (true)"}' | tee -a $LOG
          echo "" >> $LOG

          echo "=== Resolve all NULL pnl ===" | tee -a $LOG
          python3 scripts/resolve_trades.py 2>&1 | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: check trades + fix RLS" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
