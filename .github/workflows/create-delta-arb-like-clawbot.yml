name: Create Delta-Arb Tables Like CLAWBOT

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check real PnL data
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          KEY="${SK:-$SK2}"
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          LOG="_delta_arb_create.txt"

          echo "=== REAL PNL BREAKDOWN ===" | tee $LOG
          curl -s "${BASE}/delta_arb_trades?select=status,pnl_usdc,size_usd,entry_price&limit=500" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | python3 -c "
import sys, json
data = json.load(sys.stdin)
won  = [t for t in data if t.get('status')=='won']
lost = [t for t in data if t.get('status')=='lost']
opn  = [t for t in data if t.get('status') not in ['won','lost']]

win_pnl  = sum(float(t.get('pnl_usdc') or 0) for t in won)
loss_pnl = sum(float(t.get('pnl_usdc') or 0) for t in lost)
total    = win_pnl + loss_pnl

print(f'Won:    {len(won):3} trades  total_pnl=+{win_pnl:.2f}')
print(f'Lost:   {len(lost):3} trades  total_pnl={loss_pnl:.2f}')
print(f'Open:   {len(opn):3} trades')
print(f'NET PNL: {total:.2f}')
print(f'Balance: {100 + total:.2f}')
print()
print('Sample won trades:')
for t in won[:3]:
    print(f'  size={t.get("size_usd")} ep={t.get("entry_price")} pnl={t.get("pnl_usdc")}')
print('Sample lost trades:')
for t in lost[:3]:
    print(f'  size={t.get("size_usd")} ep={t.get("entry_price")} pnl={t.get("pnl_usdc")}')
" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: pnl audit" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
