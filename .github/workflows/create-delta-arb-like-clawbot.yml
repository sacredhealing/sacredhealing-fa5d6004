name: Create Delta-Arb Tables Like CLAWBOT

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Seed affiliate rates correctly
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          LOG="_delta_arb_create.txt"

          q() {
            curl -s -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          echo "Inserting free rate..." | tee $LOG
          q '{"query":"INSERT INTO delta_arb_affiliate_rates (tier,l1_pct,l2_pct) VALUES ('"'"'free'"'"',10.00,3.00) ON CONFLICT (tier) DO UPDATE SET l1_pct=10.00,l2_pct=3.00"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Inserting prana_flow rate..." | tee -a $LOG
          q '{"query":"INSERT INTO delta_arb_affiliate_rates (tier,l1_pct,l2_pct) VALUES ('"'"'prana_flow'"'"',8.00,2.00) ON CONFLICT (tier) DO UPDATE SET l1_pct=8.00,l2_pct=2.00"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Inserting siddha_quantum rate..." | tee -a $LOG
          q '{"query":"INSERT INTO delta_arb_affiliate_rates (tier,l1_pct,l2_pct) VALUES ('"'"'siddha_quantum'"'"',5.00,1.00) ON CONFLICT (tier) DO UPDATE SET l1_pct=5.00,l2_pct=1.00"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Inserting akasha_infinity rate..." | tee -a $LOG
          q '{"query":"INSERT INTO delta_arb_affiliate_rates (tier,l1_pct,l2_pct) VALUES ('"'"'akasha_infinity'"'"',3.00,1.00) ON CONFLICT (tier) DO UPDATE SET l1_pct=3.00,l2_pct=1.00"}' | tee -a $LOG
          echo "" >> $LOG

          echo "=== FINAL VERIFICATION ===" | tee -a $LOG
          echo "Wallet:" | tee -a $LOG
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_platform_config?select=platform_wallet" \
            -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" | tee -a $LOG
          echo "" >> $LOG

          echo "Affiliate rates:" | tee -a $LOG
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_affiliate_rates?select=*&order=tier" \
            -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: seed affiliate rates one by one" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
