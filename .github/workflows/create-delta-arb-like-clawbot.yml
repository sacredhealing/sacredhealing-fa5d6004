name: Create Delta-Arb Tables Like CLAWBOT

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Fix RLS on delta_arb_trades
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          KEY="${SK:-$SK2}"
          LOG="_delta_arb_create.txt"

          q() {
            curl -s -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          echo "Adding public read policy to delta_arb_trades..." | tee $LOG
          q '{"query":"DROP POLICY IF EXISTS \"Public read delta_arb_trades\" ON delta_arb_trades"}' | tee -a $LOG
          echo "" >> $LOG
          q '{"query":"CREATE POLICY \"Public read delta_arb_trades\" ON delta_arb_trades FOR SELECT USING (true)"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Adding public read policy to delta_arb_platform_config..." | tee -a $LOG
          q '{"query":"DROP POLICY IF EXISTS \"Public read delta_arb_platform_config\" ON delta_arb_platform_config"}' | tee -a $LOG
          q '{"query":"CREATE POLICY \"Public read delta_arb_platform_config\" ON delta_arb_platform_config FOR SELECT USING (true)"}' | tee -a $LOG
          echo "" >> $LOG

          echo "Verify trades visible via anon key..." | tee -a $LOG
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_trades?select=id,asset,signal,delta,status,pnl_usdc&order=created_at.desc&limit=5" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: fix RLS - public read on delta_arb_trades" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
