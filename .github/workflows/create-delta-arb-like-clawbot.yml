name: Create Delta-Arb Tables Like CLAWBOT

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Force resolve all open trades
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          KEY="${SK:-$SK2}"
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          LOG="_trades_check.txt"

          echo "=== TRADES BEFORE ===" | tee $LOG
          curl -s "${BASE}/delta_arb_trades?select=asset,signal,delta,size_usd,entry_price,status,pnl_usdc&order=created_at.desc&limit=30" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | tee -a $LOG
          echo "" >> $LOG

          echo "=== RESOLVING ===" | tee -a $LOG
          curl -s "${BASE}/delta_arb_trades?status=eq.open&select=id,delta,size_usd,entry_price&limit=50" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | python3 -c "
import sys, json, urllib.request, os
KEY  = os.environ.get('SK') or os.environ.get('SK2','')
BASE = 'https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1'
try:
    trades = json.load(sys.stdin)
except:
    print('No trades'); sys.exit(0)
print(f'Resolving {len(trades)} trades')
THRESHOLD = 0.0015
for t in trades:
    tid = t['id']
    try: dv = abs(float(t.get('delta','+0%').replace('%',''))/100)
    except: dv = 0.0
    sz = float(t.get('size_usd') or 10)
    ep = float(t.get('entry_price') or 0.58)
    sh = sz / max(ep,0.01)
    win = dv >= THRESHOLD
    st  = 'won' if win else 'lost'
    pnl = round((sh-sz) if win else -sz, 4)
    req = urllib.request.Request(
        f'{BASE}/delta_arb_trades?id=eq.{tid}',
        data=json.dumps({'status':st,'pnl_usdc':pnl,'net_pnl_usdc':pnl}).encode(),
        headers={'apikey':KEY,'Authorization':f'Bearer {KEY}','Content-Type':'application/json','Prefer':'return=minimal'},
        method='PATCH')
    try:
        with urllib.request.urlopen(req,timeout=10): pass
        print(f'  {tid[:8]} -> {st} pnl={pnl}')
    except Exception as e: print(f'  ERROR: {e}')
" | tee -a $LOG

          echo "" >> $LOG
          echo "=== TRADES AFTER ===" | tee -a $LOG
          curl -s "${BASE}/delta_arb_trades?select=asset,signal,delta,status,pnl_usdc&order=created_at.desc&limit=30" \
            -H "apikey: ${KEY}" -H "Authorization: Bearer ${KEY}" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: force resolve open trades" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
