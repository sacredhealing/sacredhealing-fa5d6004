name: Force Set Gemini Key Direct
on:
  workflow_dispatch:
jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Set key directly on Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/r.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '[{"name":"GEMINI_API_KEY","value":"AIzaAb8RN6I1pEG3CwLRQUrouoAGdXVOb--n9niPBfnCdu_OCQnkJw"}]')
          echo "Status: $STATUS"
          cat /tmp/r.json
