name: Full Bot Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test all layers
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDQwMDMsImV4cCI6MjA5MzY4MDAwM30.Mkbodv6uEb1yMKA0UIKMzm-cFWfcgNFXr-LLGtqoNcg"
          PROXY="https://fjdzhrdpioxdeyyfogep.supabase.co/functions/v1"
          TS=$(date +%s)
          TS5=$(( (TS / 300) * 300 ))
          
          echo "=== LAYER 1: Binance REST ==="
          for sym in BTCUSDT ETHUSDT SOLUSDT; do
            PRICE=$(curl -s "https://data-stream.binance.com/api/v3/ticker/price?symbol=$sym" | python3 -c "import sys,json; print(json.load(sys.stdin).get('price','FAIL'))" 2>/dev/null)
            echo "  $sym: $PRICE"
          done
          
          echo ""
          echo "=== LAYER 2: Polymarket proxy (from GitHub Actions runner) ==="
          SLUG="btc-updown-5m-${TS5}"
          HTTP=$(curl -s -o /tmp/pm.json -w "%{http_code}"             "$PROXY/polymarket-proxy?endpoint=markets&params=slug=$SLUG"             -H "Authorization: Bearer $ANON" -H "apikey: $ANON")
          echo "  HTTP $HTTP for $SLUG"
          cat /tmp/pm.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('  Response:', json.dumps(d)[:300])" 2>/dev/null || cat /tmp/pm.json
          
          echo ""
          echo "=== LAYER 3: What slugs does Polymarket actually have? ==="
          # Try different slug formats
          for SLUG in "btc-updown-5m-${TS5}" "will-btc-be-higher-in-5-minutes-than-now" "btc-5m" "crypto-btc-updown"; do
            HTTP=$(curl -s -o /tmp/slug.json -w "%{http_code}"               "https://gamma-api.polymarket.com/markets?slug=$SLUG"               -H "User-Agent: Mozilla/5.0")
            BODY=$(cat /tmp/slug.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d)[:200])" 2>/dev/null)
            echo "  $SLUG -> HTTP $HTTP -> $BODY"
          done
          
          echo ""
          echo "=== LAYER 4: Search for any active BTC updown markets ==="
          HTTP=$(curl -s -o /tmp/search.json -w "%{http_code}"             "https://gamma-api.polymarket.com/markets?tag_slug=crypto&active=true&closed=false&limit=5"             -H "User-Agent: Mozilla/5.0")
          echo "  Search HTTP: $HTTP"
          cat /tmp/search.json | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    if isinstance(d,list):
        for m in d[:5]:
            print(f'  slug={m.get(\"slug\",\"?\")[:50]} active={m.get(\"active\")} closed={m.get(\"closed\")}')
    else:
        print(json.dumps(d)[:300])
except Exception as e:
    print(f'Parse error: {e}')
" 2>/dev/null
          
          echo ""
          echo "=== LAYER 5: CLOB API for updown markets ==="
          HTTP=$(curl -s -o /tmp/clob.json -w "%{http_code}"             "https://clob.polymarket.com/markets?next_cursor=&limit=5"             -H "User-Agent: Mozilla/5.0")
          echo "  CLOB HTTP: $HTTP"
          cat /tmp/clob.json | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    markets = d.get('data',[]) if isinstance(d,dict) else d
    for m in markets[:3]:
        print(f'  {m.get(\"condition_id\",\"?\")[:16]} {m.get(\"question\",\"\")[:60]}')
except: print(sys.stdin.read()[:300])
" 2>/dev/null

          echo ""
          echo "=== LAYER 6: Delta arb proxy health ==="
          curl -s "$PROXY/delta-arb-proxy?endpoint=health"             -H "Authorization: Bearer $ANON" -H "apikey: $ANON" | python3 -m json.tool 2>/dev/null
          
          echo ""
          echo "=== LAYER 7: Railway bot - latest deployment ==="
          curl -s -X POST "https://backboard.railway.app/graphql/v2"             -H "Authorization: Bearer $RAILWAY_TOKEN"             -H "Content-Type: application/json"             -d '{"query":"{ deployments(input:{serviceId:\"d06cd2df-e657-434f-b8fa-db34c3b3c473\"}) { edges { node { id status createdAt } } } }"}'             | python3 -c "
import sys,json
d=json.load(sys.stdin)
deps=d.get('data',{}).get('deployments',{}).get('edges',[])
for e in deps[:3]:
    n=e['node']
    print(f'  {n[\"id\"][:8]} {n[\"status\"]} {n[\"createdAt\"]}')
" 2>/dev/null
