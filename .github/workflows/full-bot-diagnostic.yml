name: Full Bot Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Full layer test
        env:
          RT: ${{ secrets.RAILWAY_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDQwMDMsImV4cCI6MjA5MzY4MDAwM30.Mkbodv6uEb1yMKA0UIKMzm-cFWfcgNFXr-LLGtqoNcg"
          SBPROXY="https://fjdzhrdpioxdeyyfogep.supabase.co/functions/v1"
          TS=$(python3 -c "import time; print(int(int(time.time())/300)*300)")

          echo "=== 1. Binance REST ==="
          for sym in BTCUSDT ETHUSDT SOLUSDT; do
            R=$(curl -sf "https://data-stream.binance.com/api/v3/ticker/price?symbol=$sym" || echo "FAIL")
            echo "  $sym: $R"
          done

          echo ""
          echo "=== 2. Polymarket gamma-api direct ==="
          SLUG="btc-updown-5m-${TS}"
          echo "  Testing slug: $SLUG"
          curl -s -o /tmp/g.json -w "HTTP %{http_code}\n" "https://gamma-api.polymarket.com/markets?slug=$SLUG" -H "User-Agent: curl/7.0"
          python3 -c "import sys,json; d=json.load(open('/tmp/g.json')); print('  Result:', json.dumps(d)[:300])"

          echo ""
          echo "=== 3. Search active crypto markets ==="
          curl -s -o /tmp/s.json -w "HTTP %{http_code}\n" "https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=5&tag_slug=crypto" -H "User-Agent: curl/7.0"
          python3 -c "
import json
try:
    d=json.load(open('/tmp/s.json'))
    if isinstance(d,list):
        for m in d[:5]: print(f'  {m.get(\"slug\",\"?\")[:60]}', 'active=',m.get('active'),'closed=',m.get('closed'))
    else: print(json.dumps(d)[:300])
except Exception as e: print('parse error:',e)
"

          echo ""
          echo "=== 4. Polymarket proxy edge fn ==="
          curl -s -o /tmp/p.json -w "HTTP %{http_code}\n" "${SBPROXY}/polymarket-proxy?endpoint=markets&params=slug=${SLUG}" -H "Authorization: Bearer $ANON" -H "apikey: $ANON"
          python3 -c "import json; print(json.dumps(json.load(open('/tmp/p.json')))[:400])"

          echo ""
          echo "=== 5. Delta-arb health proxy ==="
          curl -s "${SBPROXY}/delta-arb-proxy?endpoint=health" -H "Authorization: Bearer $SK" -H "apikey: $SK" | python3 -m json.tool 2>/dev/null | head -20

          echo ""
          echo "=== 6. Supabase trades count ==="
          curl -s "${SBPROXY}/../rest/v1/delta_arb_trades?select=id,mode,status&limit=5&order=created_at.desc" -H "apikey: $SK" -H "Authorization: Bearer $SK" -H "Prefer: count=exact" -I 2>/dev/null | grep -i "content-range"
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_trades?select=id,mode,status&limit=5&order=created_at.desc" -H "apikey: $SK" -H "Authorization: Bearer $SK" | python3 -m json.tool 2>/dev/null | head -30
