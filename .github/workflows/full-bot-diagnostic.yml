name: Polymarket Slug Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Polymarket
        run: |
          TS=$(python3 -c "import time; print(int(int(time.time())/300)*300)")
          TS15=$(python3 -c "import time; print(int(int(time.time())/900)*900)")
          echo "5m timestamp: $TS"
          echo "15m timestamp: $TS15"
          
          for SLUG in "btc-updown-5m-${TS}" "eth-updown-5m-${TS}" "sol-updown-5m-${TS}" "btc-updown-15m-${TS15}"; do
            echo -n "  $SLUG -> "
            curl -sf "https://gamma-api.polymarket.com/markets?slug=${SLUG}" -H "User-Agent: curl/8.0" -w " HTTP:%{http_code}" && echo "" || echo "FAIL"
          done
          
          echo ""
          echo "=== Search any active BTC markets ==="
          curl -sf "https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=10" -H "User-Agent: curl/8.0" | python3 -c "
import sys,json
d=json.load(sys.stdin)
btc=[m for m in d if 'btc' in m.get('slug','').lower() or 'bitcoin' in m.get('question','').lower()]
eth=[m for m in d if 'eth' in m.get('slug','').lower()]
sol=[m for m in d if 'sol' in m.get('slug','').lower()]
print(f'Total markets: {len(d)}, BTC: {len(btc)}, ETH: {len(eth)}, SOL: {len(sol)}')
for m in d[:5]:
    print(f'  slug={m.get(\"slug\",\"?\")[:50]} q={m.get(\"question\",\"\")[:50]}')
" || echo "FAILED"
          
          echo ""
          echo "=== CLOB API ==="
          curl -sf "https://clob.polymarket.com/markets?next_cursor=&limit=5" -H "User-Agent: curl/8.0" | python3 -c "
import sys,json
d=json.load(sys.stdin)
print(f'Type: {type(d).__name__}')
if isinstance(d,dict):
    print(f'Keys: {list(d.keys())}')
    data=d.get(\"data\",[])
    for m in data[:3]: print(f'  {m.get(\"condition_id\",\"\")[:20]} {m.get(\"question\",\"\")[:60]}')
" || echo "CLOB FAILED"
