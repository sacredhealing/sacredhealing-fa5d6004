name: Deploy weekly-digest edge function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/weekly-digest/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy weekly-digest
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy weekly-digest \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt
          echo "✦ weekly-digest deployed"
