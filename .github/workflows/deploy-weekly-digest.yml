name: Deploy weekly-digest edge function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/weekly-digest/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout OK"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy weekly-digest
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          supabase functions deploy weekly-digest \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt
          echo "\u2736 weekly-digest deployed successfully at $(date)"
