name: Deploy Ayurveda Chat — Lovable Only

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/ayurveda-chat/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ayurveda-chat to Lovable Supabase (ssygukfd)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ayurveda-chat --project-ref ssygukfdbtehvtndandn --no-verify-jwt
          echo "✅ ayurveda-chat deployed to Lovable at $(date)"
