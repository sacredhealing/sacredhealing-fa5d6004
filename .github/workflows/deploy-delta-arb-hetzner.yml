name: Deploy Delta-Arb Bot to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: deploy
        type: choice
        options: [deploy, restart, status, logs]
      bot_mode:
        description: 'PAPER or LIVE'
        required: false
        default: PAPER
        type: choice
        options: [PAPER, LIVE]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get install -y sshpass -qq
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write helper script
        if: inputs.action == 'status'
        run: |
          cat > /tmp/write_status.py << 'PYEOF'
          import json, base64, urllib.request, time, os

          token = os.environ["GH_TOKEN"]
          repo  = "sacredhealing/sacredhealing-fa5d6004"
          path  = "_diag/delta_arb_status_latest.txt"
          content = open("/tmp/status_out.txt").read()

          def get_sha():
              try:
                  req0 = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/contents/{path}",
                      headers={"Authorization": f"token {token}"}
                  )
                  with urllib.request.urlopen(req0) as r0:
                      return json.load(r0)["sha"]
              except Exception:
                  return None

          sha = get_sha()
          for attempt in range(6):
              body = {"message": "diag: delta-arb hetzner status", "content": base64.b64encode(content.encode()).decode()}
              if sha:
                  body["sha"] = sha
              payload = json.dumps(body).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  data=payload,
                  headers={"Authorization": f"token {token}", "Content-Type": "application/json"},
                  method="PUT"
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      print("Wrote status OK on attempt", attempt)
                      break
              except Exception as e:
                  print("attempt", attempt, "failed:", e)
                  time.sleep(2)
                  sha = get_sha()
          PYEOF

      - name: Status (write via Contents API, no git race)
        if: inputs.action == 'status'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          sshpass -p "$HP" ssh -T root@178.105.183.74 "
            echo '=== PM2 LIST ===' && pm2 list &&
            echo '=== PM2 LOGS delta-arb (last 80) ===' && pm2 logs delta-arb --lines 80 --nostream 2>/dev/null || echo 'no delta-arb process' &&
            echo '=== HEALTH ===' && curl -s http://localhost:8081/health || echo 'health: offline' &&
            echo '=== ENV MODE ===' && grep BOT_MODE /root/delta-arb/delta-arb-hetzner/.env 2>/dev/null || echo 'no .env' &&
            echo '=== ENV SUPABASE KEY LEN ===' && (grep SUPABASE_SERVICE_ROLE_KEY /root/delta-arb/delta-arb-hetzner/.env | cut -d= -f2 | wc -c) 2>/dev/null || echo 'no key line' &&
            echo '=== ENV BINANCE KEY LEN ===' && (grep BINANCE_API_KEY /root/delta-arb/delta-arb-hetzner/.env | cut -d= -f2 | wc -c) 2>/dev/null || echo 'no key line' &&
            echo '=== DIR ===' && ls /root/delta-arb/delta-arb-hetzner/ 2>/dev/null || echo 'dir missing' &&
            echo '=== FRONTEND ANON KEY TEST ===' && curl -s -o /tmp/anontest.json -w 'HTTP_%{http_code}\n' 'https://ssygukfdbtehvtndandn.supabase.co/rest/v1/bot_trades?select=id&limit=1' -H 'apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWd1a2ZkYnRlaHZ0bmRhbmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MDMxMDMsImV4cCI6MjA4MDE3OTEwM30.XXwg0F7kXR4-OFRu4A2RARfhbEXurwHp5HzMOMBAiy4' -H 'Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWd1a2ZkYnRlaHZ0bmRhbmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MDMxMDMsImV4cCI6MjA4MDE3OTEwM30.XXwg0F7kXR4-OFRu4A2RARfhbEXurwHp5HzMOMBAiy4' && cat /tmp/anontest.json
          " > /tmp/status_out.txt 2>&1
          cat /tmp/status_out.txt
          GH_TOKEN="$GH_TOKEN" python3 /tmp/write_status.py

      - name: Test new publishable key
        if: inputs.action == 'status'
        env:
          PUB_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          {
          echo "=== VITE_SUPABASE_URL ==="
          echo "$VITE_URL"
          echo "=== PUBLISHABLE KEY (vs ssy project) ==="
          echo "present: $([ -n "$PUB_KEY" ] && echo YES || echo NO) len: ${#PUB_KEY} prefix: ${PUB_KEY:0:15}"
          curl -s -w ' HTTP_%{http_code}\n' 'https://ssygukfdbtehvtndandn.supabase.co/rest/v1/bot_trades?select=id&limit=1' -H "apikey: $PUB_KEY" -H "Authorization: Bearer $PUB_KEY"
          echo "=== ANON KEY (vs ssy project) ==="
          echo "present: $([ -n "$ANON_KEY" ] && echo YES || echo NO) len: ${#ANON_KEY} prefix: ${ANON_KEY:0:15}"
          curl -s -w ' HTTP_%{http_code}\n' 'https://ssygukfdbtehvtndandn.supabase.co/rest/v1/bot_trades?select=id&limit=1' -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY"
          echo "=== PUBLISHABLE KEY against VITE_SUPABASE_URL (whatever project that is) ==="
          curl -s -w ' HTTP_%{http_code}\n' "$VITE_URL/rest/v1/bot_trades?select=id&limit=1" -H "apikey: $PUB_KEY" -H "Authorization: Bearer $PUB_KEY"
          } > /tmp/pubtest.json 2>&1
          cat /tmp/pubtest.json
          GH_TOKEN="${{ secrets.GH_ADMIN_PAT }}" python3 - <<'PYEOF'
          import json, base64, urllib.request, time, os
          token = os.environ["GH_TOKEN"]
          repo  = "sacredhealing/sacredhealing-fa5d6004"
          path  = "_diag/pubkey_test_latest.txt"
          content = open("/tmp/pubtest.json").read()
          def get_sha():
              try:
                  r0 = urllib.request.Request(f"https://api.github.com/repos/{repo}/contents/{path}", headers={"Authorization": f"token {token}"})
                  with urllib.request.urlopen(r0) as x: return json.load(x)["sha"]
              except Exception: return None
          sha = get_sha()
          body = {"message": "diag: pubkey test", "content": base64.b64encode(content.encode()).decode()}
          if sha: body["sha"] = sha
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/contents/{path}", data=json.dumps(body).encode(),
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"}, method="PUT")
          with urllib.request.urlopen(req) as r: print("wrote", path)
          PYEOF

      - name: Extract live key from Lovable-deployed bundle
        if: inputs.action == 'status'
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          {
          echo "=== Fetching sacredhealing.lovable.app ==="
          curl -s -L https://sacredhealing.lovable.app/ -o /tmp/index.html
          echo "index.html bytes: $(wc -c < /tmp/index.html)"
          JS_PATHS=$(grep -oE 'src="[^"]*\.js"' /tmp/index.html | sed 's/src="//;s/"//' | sort -u)
          echo "JS assets found:"
          echo "$JS_PATHS"
          for p in $JS_PATHS; do
            if [[ "$p" == http* ]]; then URL="$p"; else URL="https://sacredhealing.lovable.app${p}"; fi
            echo "--- fetching $URL ---"
            curl -s -L "$URL" -o /tmp/bundle.js
            echo "bytes: $(wc -c < /tmp/bundle.js)"
            echo "sb_publishable matches:"
            grep -oE 'sb_publishable_[A-Za-z0-9_-]+' /tmp/bundle.js | sort -u
            echo "legacy eyJ matches near supabase (first 3):"
            grep -oE 'eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' /tmp/bundle.js | sort -u | head -3
            echo "ssygukfdbtehvtndandn mentioned: $(grep -c ssygukfdbtehvtndandn /tmp/bundle.js || echo 0)"
          done
          echo "=== VERIFY EXTRACTED KEY ==="
          FOUND_KEY=$(grep -oE 'sb_publishable_[A-Za-z0-9_-]+' /tmp/bundle.js | sort -u | head -1)
          echo "Testing key: $FOUND_KEY"
          curl -s -w ' HTTP_%{http_code}\n' 'https://ssygukfdbtehvtndandn.supabase.co/rest/v1/bot_trades?select=id&limit=3' -H "apikey: $FOUND_KEY" -H "Authorization: Bearer $FOUND_KEY"
          } > /tmp/keyfind.txt 2>&1
          cat /tmp/keyfind.txt
          python3 - <<'PYEOF'
          import json, base64, urllib.request, os
          token = os.environ["GH_TOKEN"]
          repo  = "sacredhealing/sacredhealing-fa5d6004"
          path  = "_diag/livekey_extract_latest.txt"
          content = open("/tmp/keyfind.txt").read()
          def get_sha():
              try:
                  r0 = urllib.request.Request(f"https://api.github.com/repos/{repo}/contents/{path}", headers={"Authorization": f"token {token}"})
                  with urllib.request.urlopen(r0) as x: return json.load(x)["sha"]
              except Exception: return None
          sha = get_sha()
          body = {"message": "diag: live key extract", "content": base64.b64encode(content.encode()).decode()}
          if sha: body["sha"] = sha
          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/contents/{path}", data=json.dumps(body).encode(),
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"}, method="PUT")
          with urllib.request.urlopen(req) as r: print("wrote", path)
          PYEOF

      - name: Logs
        if: inputs.action == 'logs'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: sshpass -p "$HP" ssh -T root@178.105.183.74 "pm2 logs delta-arb --lines 80 --nostream 2>/dev/null || echo not-running"

      - name: Restart
        if: inputs.action == 'restart'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: sshpass -p "$HP" ssh -T root@178.105.183.74 "pm2 restart delta-arb --update-env && sleep 5 && pm2 list && curl -s http://localhost:8081/health"

      - name: Write deploy script
        if: inputs.action == 'deploy'
        env:
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BIN_KEY: ${{ secrets.BINANCE_API_KEY }}
          BIN_SEC: ${{ secrets.BINANCE_API_SECRET }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          BOT_MODE: ${{ inputs.bot_mode }}
        run: |
          cat > /tmp/deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          GH_TOKEN="${GH_TOKEN}"
          SB_KEY="${SB_KEY}"
          BIN_KEY="${BIN_KEY}"
          BIN_SEC="${BIN_SEC}"
          BOT_MODE="${BOT_MODE:-PAPER}"

          install_node() { curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs -qq; }
          if ! command -v node &>/dev/null; then install_node
          else NM=\$(node -e "process.stdout.write(process.version.slice(1).split('.')[0])"); [ "\$NM" -lt 20 ] && install_node; fi
          echo "Node: \$(node -v)"
          command -v pm2 &>/dev/null || npm install -g pm2 -q
          command -v git &>/dev/null || apt-get install -y git -qq

          REPO=/root/delta-arb
          if [ ! -d "\$REPO/.git" ]; then
            git clone "https://x-access-token:\${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "\$REPO"
          else
            cd "\$REPO"
            git remote set-url origin "https://x-access-token:\${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
            git fetch origin && git reset --hard origin/main
          fi

          cd /root/delta-arb/delta-arb-hetzner
          npm install --omit=dev -q

          printf 'SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co\nSUPABASE_SERVICE_ROLE_KEY=%s\nBINANCE_API_KEY=%s\nBINANCE_API_SECRET=%s\nBOT_MODE=%s\nPORT=8081\nDELTA_THRESHOLD=0.0012\nTRADE_SIZE_USD=15\nSCAN_INTERVAL_MS=15000\n' "\$SB_KEY" "\$BIN_KEY" "\$BIN_SEC" "\$BOT_MODE" > .env
          echo ".env written | MODE=\$BOT_MODE | BINANCE=\$([ -n "\$BIN_KEY" ] && echo SET || echo MISSING)"

          if pm2 describe delta-arb > /dev/null 2>&1; then
            pm2 delete delta-arb || true
          fi
          pm2 start bot.js --name delta-arb --cwd /root/delta-arb/delta-arb-hetzner --node-args="--env-file=.env" && echo "Started with --env-file"
          pm2 save

          sleep 10
          echo "=== PM2 ===" && pm2 list
          echo "=== HEALTH ===" && curl -sf http://localhost:8081/health | python3 -m json.tool 2>/dev/null || curl -s http://localhost:8081/health || echo "Starting..."
          echo "=== LOGS ===" && pm2 logs delta-arb --lines 20 --nostream 2>/dev/null || true
          echo "=== DONE ==="
          SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Deploy to Hetzner
        if: inputs.action == 'deploy'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          sshpass -p "$HP" scp -o StrictHostKeyChecking=no /tmp/deploy.sh root@178.105.183.74:/tmp/deploy.sh
          sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 "bash /tmp/deploy.sh 2>&1"
