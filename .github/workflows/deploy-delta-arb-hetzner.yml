name: Deploy Delta-Arb Bot to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs
      bot_mode:
        description: 'PAPER or LIVE'
        required: false
        default: 'PAPER'
        type: choice
        options:
          - PAPER
          - LIVE

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 > ~/.ssh/known_hosts 2>/dev/null
          echo "Host key lines: $(wc -l < ~/.ssh/known_hosts)"

      - name: Status / Logs / Restart (quick actions)
        if: ${{ inputs.action != 'deploy' }}
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          ACTION="${{ inputs.action }}"
          if [ "$ACTION" = "status" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74               "pm2 list && echo '---' && curl -s http://localhost:8081/health | python3 -m json.tool 2>/dev/null || echo 'health: not running'"
          elif [ "$ACTION" = "logs" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74               "pm2 logs delta-arb --lines 80 --nostream 2>/dev/null || echo 'No delta-arb process'"
          elif [ "$ACTION" = "restart" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74               "pm2 restart delta-arb --update-env && sleep 5 && pm2 list && curl -s http://localhost:8081/health"
          fi

      - name: Write bootstrap script
        if: ${{ inputs.action == 'deploy' }}
        run: |
          echo '' | base64 -d > /tmp/bootstrap-delta-arb.sh
          chmod +x /tmp/bootstrap-delta-arb.sh
          echo "Bootstrap size: $(wc -c < /tmp/bootstrap-delta-arb.sh) bytes"

      - name: Upload bootstrap to Hetzner
        if: ${{ inputs.action == 'deploy' }}
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74             'cat > /root/bootstrap-delta-arb.sh && chmod +x /root/bootstrap-delta-arb.sh && echo "Script uploaded: $(wc -c < /root/bootstrap-delta-arb.sh) bytes"'             < /tmp/bootstrap-delta-arb.sh

      - name: Execute bootstrap on Hetzner
        if: ${{ inputs.action == 'deploy' }}
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          BOT_MODE: ${{ inputs.bot_mode }}
        run: |
          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74             "SUPABASE_KEY='$SUPABASE_KEY' BINANCE_API_KEY='$BINANCE_API_KEY' BINANCE_API_SECRET='$BINANCE_API_SECRET' BOT_MODE='$BOT_MODE' bash /root/bootstrap-delta-arb.sh '$GH_TOKEN' 2>&1"
