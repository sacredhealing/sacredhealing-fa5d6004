name: Deploy Delta-Arb Bot to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs
      bot_mode:
        description: 'PAPER or LIVE'
        required: false
        default: 'PAPER'
        type: choice
        options:
          - PAPER
          - LIVE

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 > ~/.ssh/known_hosts 2>/dev/null
          echo "Host key lines: $(wc -l < ~/.ssh/known_hosts)"

      - name: Quick actions (status / logs / restart)
        if: ${{ inputs.action != 'deploy' }}
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          ACTION="${{ inputs.action }}"
          if [ "$ACTION" = "status" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "pm2 list && echo '---HEALTH---' && curl -s http://localhost:8081/health | python3 -m json.tool 2>/dev/null || curl -s http://localhost:8081/health"
          elif [ "$ACTION" = "logs" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "pm2 logs delta-arb --lines 80 --nostream 2>/dev/null || echo 'No delta-arb process'"
          elif [ "$ACTION" = "restart" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "pm2 restart delta-arb --update-env && sleep 5 && pm2 list && curl -s http://localhost:8081/health"
          fi

      - name: Upload bootstrap + deploy
        if: ${{ inputs.action == 'deploy' }}
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          BOT_MODE: ${{ inputs.bot_mode }}
        run: |
          # Inline bootstrap - no base64 needed
          cat > /tmp/bootstrap-delta-arb.sh << 'BOOTEOF'
#!/bin/bash
set -e
GH_TOKEN="${1}"
echo "=== SQI DELTA-ARB BOT — HETZNER BOOTSTRAP ==="

# Node 20
install_node() { curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs; }
if ! command -v node &>/dev/null; then install_node
else
  NM=$(node -e "process.stdout.write(process.version.slice(1).split('.')[0])")
  [ "$NM" -lt 20 ] && install_node
fi
echo "Node: $(node -v)"

# PM2
if ! command -v pm2 &>/dev/null; then
  npm install -g pm2
  env PATH=$PATH:/usr/bin pm2 startup systemd -u root --hp /root || true
fi

# Git
command -v git &>/dev/null || apt-get install -y git

# Clone/pull
REPO="/root/delta-arb"
if [ ! -d "$REPO/.git" ]; then
  git clone "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "$REPO"
else
  cd "$REPO"
  git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
  git fetch origin && git reset --hard origin/main
fi

# Install deps
cd "$REPO/delta-arb-hetzner"
npm install --omit=dev

# Write .env (vars injected by GitHub Actions)
cat > .env << ENVEOF
SUPABASE_URL=https://fjdzhrdpioxdeyyfogep.supabase.co
SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_KEY}
BINANCE_API_KEY=${BINANCE_API_KEY}
BINANCE_API_SECRET=${BINANCE_API_SECRET}
BOT_MODE=${BOT_MODE:-PAPER}
PORT=8081
DELTA_THRESHOLD=0.0012
TRADE_SIZE_USD=15
SCAN_INTERVAL_MS=15000
ENVEOF
echo ".env written | MODE=${BOT_MODE:-PAPER} | BINANCE=$([ -n "$BINANCE_API_KEY" ] && echo 'SET' || echo 'MISSING')"

# PM2 manage
if pm2 describe delta-arb > /dev/null 2>&1; then
  pm2 restart delta-arb --update-env && echo "✅ DELTA-ARB restarted"
else
  pm2 start bot.js --name delta-arb --cwd /root/delta-arb/delta-arb-hetzner
  echo "✅ DELTA-ARB started fresh"
fi
pm2 save

sleep 8
echo "=== PM2 STATUS ==="
pm2 list
echo "=== HEALTH CHECK ==="
curl -sf http://localhost:8081/health | python3 -m json.tool 2>/dev/null || curl -s http://localhost:8081/health || echo "Starting up..."
echo "=== LAST 30 LINES ==="
pm2 logs delta-arb --lines 30 --nostream 2>/dev/null || true
echo "=== DELTA-ARB DEPLOYED ==="
BOOTEOF

          chmod +x /tmp/bootstrap-delta-arb.sh

          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
            'cat > /root/bootstrap-delta-arb.sh && chmod +x /root/bootstrap-delta-arb.sh' \
            < /tmp/bootstrap-delta-arb.sh

          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
            "SUPABASE_KEY='$SUPABASE_KEY' BINANCE_API_KEY='$BINANCE_API_KEY' BINANCE_API_SECRET='$BINANCE_API_SECRET' BOT_MODE='$BOT_MODE' bash /root/bootstrap-delta-arb.sh '$GH_TOKEN' 2>&1"
