name: Deploy Delta-Arb Bot to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: deploy
        type: choice
        options: [deploy, restart, status, logs]
      bot_mode:
        description: 'PAPER or LIVE'
        required: false
        default: PAPER
        type: choice
        options: [PAPER, LIVE]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get install -y sshpass -qq
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Status
        if: inputs.action == 'status'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          OUT=$(sshpass -p "$HP" ssh -T root@178.105.183.74 "
            echo '=== PM2 LIST ===' && pm2 list &&
            echo '=== PM2 LOGS delta-arb (last 50) ===' && pm2 logs delta-arb --lines 50 --nostream 2>/dev/null || echo 'no delta-arb process' &&
            echo '=== HEALTH ===' && curl -s http://localhost:8081/health || echo 'health: offline' &&
            echo '=== NODE VERSION ===' && node -v &&
            echo '=== DIR ===' && ls /root/delta-arb/delta-arb-hetzner/ 2>/dev/null || echo 'dir missing'
          " 2>&1)
          echo "$OUT"
          LOG="_delta_arb_status_$(date +%s).txt"
          echo "$OUT" > $LOG
          git config user.email "bot@sqi.app" && git config user.name "SQI-Bot"
          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo_out
          cp $LOG repo_out/$LOG
          cd repo_out
          git add $LOG
          git commit -m "diag: delta-arb hetzner status" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true

      - name: Logs
        if: inputs.action == 'logs'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: sshpass -p "$HP" ssh -T root@178.105.183.74 "pm2 logs delta-arb --lines 80 --nostream 2>/dev/null || echo not-running"

      - name: Restart
        if: inputs.action == 'restart'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: sshpass -p "$HP" ssh -T root@178.105.183.74 "pm2 restart delta-arb --update-env && sleep 5 && pm2 list && curl -s http://localhost:8081/health"

      - name: Write deploy script
        if: inputs.action == 'deploy'
        env:
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BIN_KEY: ${{ secrets.BINANCE_API_KEY }}
          BIN_SEC: ${{ secrets.BINANCE_API_SECRET }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          BOT_MODE: ${{ inputs.bot_mode }}
        run: |
          cat > /tmp/deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          GH_TOKEN="${GH_TOKEN}"
          SB_KEY="${SB_KEY}"
          BIN_KEY="${BIN_KEY}"
          BIN_SEC="${BIN_SEC}"
          BOT_MODE="${BOT_MODE:-PAPER}"

          install_node() { curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs -qq; }
          if ! command -v node &>/dev/null; then install_node
          else NM=\$(node -e "process.stdout.write(process.version.slice(1).split('.')[0])"); [ "\$NM" -lt 20 ] && install_node; fi
          echo "Node: \$(node -v)"
          command -v pm2 &>/dev/null || npm install -g pm2 -q
          command -v git &>/dev/null || apt-get install -y git -qq

          REPO=/root/delta-arb
          if [ ! -d "\$REPO/.git" ]; then
            git clone "https://x-access-token:\${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "\$REPO"
          else
            cd "\$REPO"
            git remote set-url origin "https://x-access-token:\${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
            git fetch origin && git reset --hard origin/main
          fi

          cd /root/delta-arb/delta-arb-hetzner
          npm install --omit=dev -q

          printf 'SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co\nSUPABASE_SERVICE_ROLE_KEY=%s\nBINANCE_API_KEY=%s\nBINANCE_API_SECRET=%s\nBOT_MODE=%s\nPORT=8081\nDELTA_THRESHOLD=0.0012\nTRADE_SIZE_USD=15\nSCAN_INTERVAL_MS=15000\n' "\$SB_KEY" "\$BIN_KEY" "\$BIN_SEC" "\$BOT_MODE" > .env
          echo ".env written | MODE=\$BOT_MODE | BINANCE=\$([ -n "\$BIN_KEY" ] && echo SET || echo MISSING)"

          if pm2 describe delta-arb > /dev/null 2>&1; then
            pm2 restart delta-arb --update-env && echo "Restarted"
          else
            pm2 start bot.js --name delta-arb --cwd /root/delta-arb/delta-arb-hetzner && echo "Started"
          fi
          pm2 save

          sleep 10
          echo "=== PM2 ===" && pm2 list
          echo "=== HEALTH ===" && curl -sf http://localhost:8081/health | python3 -m json.tool 2>/dev/null || curl -s http://localhost:8081/health || echo "Starting..."
          echo "=== LOGS ===" && pm2 logs delta-arb --lines 20 --nostream 2>/dev/null || true
          echo "=== DONE ==="
          SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Deploy to Hetzner
        if: inputs.action == 'deploy'
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          sshpass -p "$HP" scp -o StrictHostKeyChecking=no /tmp/deploy.sh root@178.105.183.74:/tmp/deploy.sh
          sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 "bash /tmp/deploy.sh 2>&1"
