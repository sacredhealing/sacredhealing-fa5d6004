name: Seed Agastyar Academy 108 Modules

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upsert batch 1 (modules 1-36)
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/upsert_batch.py scripts/batch_1.json

      - name: Upsert batch 2 (modules 37-72)
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/upsert_batch.py scripts/batch_2.json

      - name: Upsert batch 3 (modules 73-108)
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/upsert_batch.py scripts/batch_3.json

      - name: Verify count
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
import urllib.request, os, json
from collections import Counter
sk = os.environ["SK"]
req = urllib.request.Request(
  "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/ayurveda_courses?select=module_number,phase,tier_required&order=module_number",
  headers={"apikey": sk, "Authorization": f"Bearer {sk}"}
)
data = json.loads(urllib.request.urlopen(req).read())
tiers = Counter(r["tier_required"] for r in data)
phases = Counter(r["phase"] for r in data)
print(f"Total: {len(data)} modules in DB")
for t,c in sorted(tiers.items()): print(f"  {t}: {c}")
for p,c in sorted(phases.items()): print(f"  Phase {p}: {c}")
EOF
