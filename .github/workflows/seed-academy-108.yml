name: Seed Agastyar Academy 108 Modules

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/batch_1.json'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upsert batch 1 (modules 1-36)
        env:
          SK: ${{ secrets.NEW_SERVICE_ROLE }}
        run: python3 scripts/upsert_batch.py scripts/batch_1.json

      - name: Upsert batch 2 (modules 37-72)
        env:
          SK: ${{ secrets.NEW_SERVICE_ROLE }}
        run: python3 scripts/upsert_batch.py scripts/batch_2.json

      - name: Upsert batch 3 (modules 73-108)
        env:
          SK: ${{ secrets.NEW_SERVICE_ROLE }}
        run: python3 scripts/upsert_batch.py scripts/batch_3.json

      - name: Verify count
        env:
          SK: ${{ secrets.NEW_SERVICE_ROLE }}
        run: python3 scripts/verify_modules.py
