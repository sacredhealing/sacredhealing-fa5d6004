name: Check CLAWBOT Wallet

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Read CLAWBOT platform wallet
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          npm install -g supabase@latest 2>&1 | tail -1
          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo
          cd repo
          supabase link --project-ref fjdzhrdpioxdeyyfogep 2>&1 | tail -2
          echo "=== CLAWBOT platform_wallet ==="
          supabase db execute --linked --sql "SELECT id, platform_wallet FROM clawbot_platform_config;" 2>&1
          echo "=== DELTA ARB platform_wallet ==="
          supabase db execute --linked --sql "SELECT id, platform_wallet FROM delta_arb_platform_config;" 2>&1
          
          # Write result to file
          RESULT1=$(supabase db execute --linked --sql "SELECT platform_wallet FROM clawbot_platform_config WHERE id=1;" 2>&1)
          RESULT2=$(supabase db execute --linked --sql "SELECT platform_wallet FROM delta_arb_platform_config WHERE id=1;" 2>&1)
          cd ..
          printf "CLAWBOT: %s
DELTA_ARB: %s" "$RESULT1" "$RESULT2" > _wallet_check.txt
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _wallet_check.txt
          git commit -m "ci: wallet check result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
