name: Deploy Delta-Arb Proxy Direct

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Delete old function then deploy delta-arb-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_delta_arb_proxy_deploy.txt"
          echo "=== Deploy delta-arb-proxy $(date -u) ===" | tee $LOG

          npm install -g supabase@latest 2>&1 | tail -2 | tee -a $LOG

          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo
          cd repo

          echo "Deleting old unused functions to free slot..." | tee -a "../$LOG"
          supabase functions delete sqi-oracle \
            --project-ref fjdzhrdpioxdeyyfogep 2>&1 | tee -a "../$LOG" || true
          supabase functions delete vastu-chat \
            --project-ref fjdzhrdpioxdeyyfogep 2>&1 | tee -a "../$LOG" || true

          echo "Deploying delta-arb-proxy..." | tee -a "../$LOG"
          supabase functions deploy delta-arb-proxy \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1 | tee -a "../$LOG"

          echo "Done." | tee -a "../$LOG"
          cd ..

          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add $LOG
          git commit -m "delta-arb-proxy deploy result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
