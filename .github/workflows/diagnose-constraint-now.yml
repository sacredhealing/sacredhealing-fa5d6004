name: Diagnose Constraint NOW

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Fix granted_by NOT NULL
        env:
          SUPA_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          AUTH="Authorization: Bearer ${SUPA_PAT}"
          LOG="_diag_constraint.txt"

          run_sql() {
            local label="$1"
            local query="$2"
            echo "=== $label ===" | tee -a $LOG
            curl -s -X POST "$DB" -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"query\":\"$query\"}" | tee -a $LOG
            echo "" | tee -a $LOG
          }

          echo "START $(date)" > $LOG

          run_sql "MAKE_GRANTED_BY_NULLABLE" "ALTER TABLE public.admin_granted_access ALTER COLUMN granted_by DROP NOT NULL;"

          run_sql "VERIFY_COLUMN" "SELECT column_name, is_nullable FROM information_schema.columns WHERE table_schema='public' AND table_name='admin_granted_access' AND column_name='granted_by';"

          run_sql "TEST_INSERT_MEMBERSHIP" "INSERT INTO public.admin_granted_access (user_id, access_type, access_id, is_active, granted_at, granted_by) VALUES ('bd0b21c9-577a-450b-bb1e-21c9d0423f17', 'membership', 'siddha-quantum', false, now(), 'bd0b21c9-577a-450b-bb1e-21c9d0423f17') RETURNING id, access_type, access_id;"

          run_sql "TEST_INSERT_PRODUCT" "INSERT INTO public.admin_granted_access (user_id, access_type, access_id, is_active, granted_at, granted_by) VALUES ('bd0b21c9-577a-450b-bb1e-21c9d0423f17', 'product', 'digital-nadi', false, now(), 'bd0b21c9-577a-450b-bb1e-21c9d0423f17') RETURNING id, access_type, access_id;"

          run_sql "CLEANUP" "DELETE FROM public.admin_granted_access WHERE is_active = false AND user_id = 'bd0b21c9-577a-450b-bb1e-21c9d0423f17';"

          echo "END $(date)" | tee -a $LOG

          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add $LOG
          git commit -m "fix granted_by nullable + test $(date +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
