name: Seed Agastya History All Users

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test connection
        env:
          SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Testing Supabase connection..."
          curl -sf \
            "$SUPABASE_URL/auth/v1/admin/users?page=1&per_page=3" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -o /tmp/test.json || echo "CURL FAILED"
          echo "Response:"
          cat /tmp/test.json | python3 -c "import sys,json; d=json.load(sys.stdin); u=d.get('users',[]); print(f'Users found: {len(u)}')" || cat /tmp/test.json | head -c 200

      - name: Run seeder
        env:
          SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/seed_agastya_history.py
