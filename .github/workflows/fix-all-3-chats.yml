name: Fix All 3 Chats - Set Gemini Key + Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-all-3-chats.yml

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout: $(ls repo/supabase/functions | wc -l) functions"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set all secrets on Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '[
              {"name":"GEMINI_API_KEY","value":"${{ secrets.GEMINI_API_KEY }}"},
              {"name":"SUPABASE_URL","value":"https://fjdzhrdpioxdeyyfogep.supabase.co"},
              {"name":"SUPABASE_SERVICE_ROLE_KEY","value":"${{ secrets.NEW_SERVICE_ROLE }}"},
              {"name":"SUPABASE_ANON_KEY","value":"${{ secrets.VITE_SUPABASE_ANON_KEY }}"}
            ]')
          echo "Secret status: $STATUS"
          cat /tmp/resp.json

      - name: Deploy quantum-apothecary-chat
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying quantum-apothecary-chat ==="
          supabase functions deploy quantum-apothecary-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
          echo "Exit: $?"

      - name: Deploy bhrigu-oracle
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying bhrigu-oracle ==="
          supabase functions deploy bhrigu-oracle \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
          echo "Exit: $?"
        continue-on-error: true

      - name: Deploy ayurveda-chat
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          echo "=== Deploying ayurveda-chat ==="
          supabase functions deploy ayurveda-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
          echo "Exit: $?"
        continue-on-error: true

      - name: Done
        run: echo "All done at $(date)"
