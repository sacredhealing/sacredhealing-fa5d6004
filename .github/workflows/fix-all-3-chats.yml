name: Fix All 3 Chats - Set Gemini Key + Deploy

on:
  push:
    paths:
      - '.github/workflows/fix-all-3-chats.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Check MODE in Railway and bot status
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_resolve_result.txt"
          KEY="${SK:-$SK2}"

          echo "=== Railway Variables ===" | tee $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ variables(serviceId: \"d06cd2df-e657-434f-b8fa-db34c3b3c473\", environmentId: \"5745e241-6e8e-4c3e-a5fd-91efff9a72c2\", projectId: \"4851410d-a6d6-4739-be6b-33e6deb5b6f2\") }"}' \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
v=d.get('data',{}).get('variables',{})
for k,val in v.items():
    if k in ['MODE','STARTING_BALANCE','STRATEGY']:
        print(f'  {k} = {val}')
    elif any(x in k for x in ['PRIVATE','KEY','ADDRESS','FUNDER']):
        print(f'  {k} = {(val[:8]+"...") if val else "EMPTY"}')
" | tee -a $LOG

          echo "" >> $LOG
          echo "=== Latest Supabase Trades ===" | tee -a $LOG
          curl -s "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/delta_arb_trades?select=mode,status,pnl_usdc,size_usd,created_at&order=created_at.desc&limit=5" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" | python3 -c "
import sys,json,datetime
trades=json.load(sys.stdin)
now=datetime.datetime.now(datetime.timezone.utc)
for t in trades:
    dt=datetime.datetime.fromisoformat(t['created_at'].replace('Z','+00:00'))
    ago=round((now-dt).total_seconds()/60,1)
    print(f'  {ago}min ago | {t.get("mode","?"):5} | {t.get("status","?"):5} | \${float(t.get("size_usd") or 0):.2f}')
live=[t for t in trades if t.get('mode')=='LIVE']
print(f'LIVE trades: {len(live)}')
if live: print('BOT IS LIVE!')
else: print('Still PAPER or no trades yet')
" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI-Bot"
          git add $LOG && git commit -m "ci: status check" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true

      - name: Done
        run: echo "All done at $(date)"
