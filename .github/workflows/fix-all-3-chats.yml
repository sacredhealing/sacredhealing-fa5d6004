name: Fix All 3 Chats - Set Gemini Key + Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-all-3-chats.yml

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
      PROJECT: fjdzhrdpioxdeyyfogep
      GEMINI_KEY: AIzaSyAdDnCIjX7AZqzLGBUYEi5BGZ6fgzA6SS0

    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:$GH_PAT@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout done"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set GEMINI_API_KEY secret on Supabase
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/$PROJECT/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '[{"name":"GEMINI_API_KEY","value":"AIzaSyAdDnCIjX7AZqzLGBUYEi5BGZ6fgzA6SS0"}]')
          echo "Secret status: $STATUS"
          cat /tmp/resp.json

      - name: Deploy quantum-apothecary-chat
        working-directory: repo
        run: |
          supabase functions deploy quantum-apothecary-chat \
            --project-ref $PROJECT \
            --no-verify-jwt 2>&1
          echo "QA exit: $?"

      - name: Deploy bhrigu-oracle
        working-directory: repo
        run: |
          supabase functions deploy bhrigu-oracle \
            --project-ref $PROJECT \
            --no-verify-jwt 2>&1
          echo "Bhrigu exit: $?"
        continue-on-error: true

      - name: Deploy ayurveda-chat
        working-directory: repo
        run: |
          supabase functions deploy ayurveda-chat \
            --project-ref $PROJECT \
            --no-verify-jwt 2>&1
          echo "Ayurveda exit: $?"
        continue-on-error: true

      - name: Done
        run: echo "All 3 chats deployed at $(date)"
