name: Fix All 3 Chats - Set Gemini Key + Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-all-3-chats.yml

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout done: $(ls repo/supabase/functions | head -5)"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set GEMINI_API_KEY secret on Supabase
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/secrets" \
            -H "Authorization: Bearer sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744" \
            -H "Content-Type: application/json" \
            -d '[{"name":"GEMINI_API_KEY","value":"AIzaSyAdDnCIjX7AZqzLGBUYEi5BGZ6fgzA6SS0"}]')
          echo "Secret status: $STATUS"
          cat /tmp/resp.json

      - name: Deploy quantum-apothecary-chat
        env:
          SUPABASE_ACCESS_TOKEN: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        working-directory: repo
        run: |
          echo "=== Deploying quantum-apothecary-chat ==="
          supabase functions deploy quantum-apothecary-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt \
            --debug 2>&1
          echo "Exit code: $?"

      - name: Deploy bhrigu-oracle
        env:
          SUPABASE_ACCESS_TOKEN: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        working-directory: repo
        run: |
          echo "=== Deploying bhrigu-oracle ==="
          supabase functions deploy bhrigu-oracle \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt \
            --debug 2>&1
          echo "Exit code: $?"
        continue-on-error: true

      - name: Deploy ayurveda-chat
        env:
          SUPABASE_ACCESS_TOKEN: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        working-directory: repo
        run: |
          echo "=== Deploying ayurveda-chat ==="
          supabase functions deploy ayurveda-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt \
            --debug 2>&1
          echo "Exit code: $?"
        continue-on-error: true

      - name: Done
        run: echo "All done at $(date)"
