name: Fix All 3 Chats - Set Gemini Key + Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-all-3-chats.yml

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout done"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set GEMINI_API_KEY secret on Supabase
        env:
          KNOWN_PAT: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
          PROJECT: fjdzhrdpioxdeyyfogep
          GEMINI_KEY: AIzaSyAdDnCIjX7AZqzLGBUYEi5BGZ6fgzA6SS0
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/$PROJECT/secrets" \
            -H "Authorization: Bearer $KNOWN_PAT" \
            -H "Content-Type: application/json" \
            -d '[{"name":"GEMINI_API_KEY","value":"AIzaSyAdDnCIjX7AZqzLGBUYEi5BGZ6fgzA6SS0"}]')
          echo "Secret status: $STATUS"
          cat /tmp/resp.json

      - name: Deploy all 3 chats
        env:
          SUPABASE_ACCESS_TOKEN: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
          PROJECT: fjdzhrdpioxdeyyfogep
        working-directory: repo
        run: |
          echo "Deploying quantum-apothecary-chat..."
          supabase functions deploy quantum-apothecary-chat \
            --project-ref $PROJECT \
            --no-verify-jwt 2>&1 || echo "QA deploy failed - continuing"

          echo "Deploying bhrigu-oracle..."
          supabase functions deploy bhrigu-oracle \
            --project-ref $PROJECT \
            --no-verify-jwt 2>&1 || echo "Bhrigu deploy failed - continuing"

          echo "Deploying ayurveda-chat..."
          supabase functions deploy ayurveda-chat \
            --project-ref $PROJECT \
            --no-verify-jwt 2>&1 || echo "Ayurveda deploy failed - continuing"

          echo "All deploy attempts complete at $(date)"
