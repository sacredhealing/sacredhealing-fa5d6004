name: Create Users Now

on:
  push:
    branches: [main]
    paths: ['scripts/create-admin.mjs']
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/create-admin.mjs
