name: Fix SQI Apothecary Deploy

on:
  push:
    paths:
      - .github/workflows/fix-sqi-apothecary.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy quantum-apothecary-chat to new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy quantum-apothecary-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt

      - name: Deploy ayurveda-chat to new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ayurveda-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt
        continue-on-error: true

      - name: Verify deployment
        run: echo "Done deploying to fjdzhrdpioxdeyyfogep"
