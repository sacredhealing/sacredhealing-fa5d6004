name: Migrate Data to New Supabase

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run data migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, time, sys

          OLD = "ssygukfdbtehvtndandn"
          NEW = "fjdzhrdpioxdeyyfogep"
          PAT = "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

          def query(project_ref, sql, retries=3):
              url = f"https://api.supabase.com/v1/projects/{project_ref}/database/query"
              data = json.dumps({"query": sql}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "Authorization": f"Bearer {PAT}",
                  "Content-Type": "application/json"
              })
              for attempt in range(retries):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read())
                  except urllib.error.HTTPError as e:
                      body = e.read().decode()[:200]
                      if attempt == retries - 1:
                          return {"error": f"HTTP {e.code}: {body}"}
                      time.sleep(2)
                  except Exception as ex:
                      if attempt == retries - 1:
                          return {"error": str(ex)}
                      time.sleep(2)

          def escape(val):
              if val is None:
                  return "NULL"
              if isinstance(val, bool):
                  return "TRUE" if val else "FALSE"
              if isinstance(val, (int, float)):
                  return str(val)
              s = str(val).replace("'", "''")
              return f"'{s}'"

          # Get all public tables from OLD DB
          print("=== Fetching table list from old Supabase ===")
          tables_result = query(OLD, """
              SELECT table_name FROM information_schema.tables
              WHERE table_schema = 'public' AND table_type = 'BASE TABLE'
              ORDER BY table_name
          """)

          if "error" in str(tables_result):
              print(f"ERROR getting tables: {tables_result}")
              sys.exit(1)

          tables = [r["table_name"] for r in tables_result]
          print(f"Found {len(tables)} tables: {', '.join(tables[:10])}...")

          total_rows = 0
          skipped = []

          # Disable triggers/constraints on new DB for clean insert
          query(NEW, "SET session_replication_role = replica;")

          for table in tables:
              print(f"\n--- Migrating: {table} ---")

              # Get row count
              count_result = query(OLD, f"SELECT COUNT(*) as cnt FROM public.{table}")
              if isinstance(count_result, list) and len(count_result) > 0:
                  count = int(count_result[0].get("cnt", 0))
              else:
                  print(f"  ⚠️  Could not count {table}, skipping")
                  skipped.append(table)
                  continue

              if count == 0:
                  print(f"  ○ Empty table, skipping")
                  continue

              print(f"  Rows to migrate: {count}")

              # Fetch in batches of 500
              batch_size = 500
              offset = 0
              table_total = 0

              while offset < count:
                  rows = query(OLD, f"SELECT * FROM public.{table} LIMIT {batch_size} OFFSET {offset}")

                  if not isinstance(rows, list) or len(rows) == 0:
                      break

                  # Get column names from first row
                  cols = list(rows[0].keys())
                  cols_str = ", ".join([f'"{c}"' for c in cols])

                  # Build INSERT
                  values_list = []
                  for row in rows:
                      vals = ", ".join([escape(row.get(c)) for c in cols])
                      values_list.append(f"({vals})")

                  values_str = ",\n".join(values_list)
                  insert_sql = f"""
                      INSERT INTO public."{table}" ({cols_str})
                      VALUES {values_str}
                      ON CONFLICT DO NOTHING
                  """

                  result = query(NEW, insert_sql)
                  if isinstance(result, dict) and "error" in str(result):
                      print(f"  ⚠️  Batch error at offset {offset}: {str(result)[:150]}")
                  else:
                      table_total += len(rows)

                  offset += batch_size

              print(f"  ✅ Migrated {table_total} rows")
              total_rows += table_total

          # Re-enable triggers
          query(NEW, "SET session_replication_role = DEFAULT;")

          print(f"\n{'='*50}")
          print(f"✅ MIGRATION COMPLETE")
          print(f"   Total rows migrated: {total_rows}")
          if skipped:
              print(f"   Skipped tables: {', '.join(skipped)}")
          print(f"{'='*50}")
          PYEOF
