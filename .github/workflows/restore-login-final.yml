name: Restore Login Final

on:
  push:
    paths:
      - '.github/workflows/restore-login-final.yml'

jobs:
  create-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Create admin users via Supabase Auth Admin API
        env:
          SVC: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          PASS="SiddhaQuantum2050!"
          SVC_KEY="$SVC"

          create_or_reset() {
            EMAIL="$1"
            echo "=== $EMAIL ==="
            
            R=$(curl -s -X POST "$BASE/auth/v1/admin/users" \
              -H "apikey: $SVC_KEY" \
              -H "Authorization: Bearer $SVC_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\",\"email_confirm\":true}")
            
            echo "Create: $R"
            
            # If already exists, find ID and update password
            if echo "$R" | grep -q "already been registered"; then
              echo "Exists - fetching user list to get ID..."
              USERS=$(curl -s "$BASE/auth/v1/admin/users" \
                -H "apikey: $SVC_KEY" \
                -H "Authorization: Bearer $SVC_KEY")
              
              UID=$(echo "$USERS" | python3 -c "
import sys,json
d=json.load(sys.stdin)
users = d.get('users',[])
for u in users:
    if u.get('email','') == '$EMAIL':
        print(u['id'])
        break
" 2>/dev/null)
              
              if [ -n "$UID" ]; then
                echo "Found ID: $UID - resetting password"
                UPD=$(curl -s -X PUT "$BASE/auth/v1/admin/users/$UID" \
                  -H "apikey: $SVC_KEY" \
                  -H "Authorization: Bearer $SVC_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"password\":\"$PASS\",\"email_confirm\":true}")
                echo "Update: $UPD"
              fi
            fi
          }

          create_or_reset "sacredhealingvibe@gmail.com"
          create_or_reset "laila.amrouche@gmail.com"

          echo ""
          echo "=== Final user list ==="
          curl -s "$BASE/auth/v1/admin/users" \
            -H "apikey: $SVC_KEY" \
            -H "Authorization: Bearer $SVC_KEY" | python3 -c "
import sys,json
d=json.load(sys.stdin)
users=d.get('users',[])
print(f'Total: {len(users)} users')
for u in users:
    print(f'  {u[\"email\"]} | confirmed:{bool(u.get(\"email_confirmed_at\"))}')
"
          echo ""
          echo "Login at siddhaquantumnexus.com with: SiddhaQuantum2050!"
