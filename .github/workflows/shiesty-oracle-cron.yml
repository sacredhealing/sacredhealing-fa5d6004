name: Shiesty Signal Oracle -- 24/7 Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Shiesty Signal Oracle
        env:
          SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PAPER_MODE: 'true'
          RISK_PCT: '0.05'
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          node scripts/shiesty_oracle.mjs 2>&1 | tee _oracle_last_run.txt
          echo "Exit code: $?"

          git config user.email "bot@sqi.app"
          git config user.name "SQI Oracle Bot"
          git add _oracle_last_run.txt
          git commit -m "Oracle run $(date -u +%Y-%m-%dT%H:%M)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
