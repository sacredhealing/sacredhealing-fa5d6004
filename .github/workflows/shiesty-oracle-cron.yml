name: CLAWBOT v8 — 24/7 Elite Whale Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run CLAWBOT v8 Elite Whale Scanner
        env:
          SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          PAPER_MODE: 'true'
          MIN_TRADE_USDC: '500'
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          node scripts/clawbot_oracle.mjs 2>&1 | tee _oracle_last_run.txt
          echo "Exit: $?"
          git config user.email "bot@sqi.app"
          git config user.name "SQI CLAWBOT"
          git add _oracle_last_run.txt
          git commit -m "CLAWBOT $(date -u +%Y-%m-%dT%H:%M)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
