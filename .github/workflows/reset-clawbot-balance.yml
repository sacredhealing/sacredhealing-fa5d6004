name: Patch CLAWBOT Balance UUID

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Patch balance with correct UUID
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_oracle_reset.txt"
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          UUID="052ae9dc-7355-46ab-8584-70d2ba33ae68"

          echo "=== Patching balance to 10.00 ===" > $LOG

          RES=$(curl -s -w "\nHTTP:%{http_code}" \
            -X PATCH "${BASE}/polymarket_bot_settings?id=eq.${UUID}" \
            -H "apikey: ${SK}" \
            -H "Authorization: Bearer ${SK}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{"paper_balance":10.00,"updated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')

          echo "$RES" >> $LOG
          echo "" >> $LOG
          echo "=== Verify ===" >> $LOG
          curl -s "${BASE}/polymarket_bot_settings?limit=1" \
            -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"
          git config user.name "SQI CLAWBOT"
          git add $LOG
          git commit -m "CLAWBOT balance patched $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
