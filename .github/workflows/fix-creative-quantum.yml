name: Fix Creative Soul and Quantum Sync

on:
  push:
    paths:
      - '.github/workflows/fix-creative-quantum.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix meditation_style_sounds and quantum transmissions
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SVC_OLD: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const PAT = process.env.PAT;
          const REF = 'ssygukfdbtehvtndandn';
          const ADAM = 'bd0b21c9-577a-450b-bb1e-21c9d0423f17';
          const R2 = 'https://pub-7a2cf16596fd425ab1717b8c0c3e567d.r2.dev';

          function sql(query) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ query });
              const r = https.request({
                hostname: 'api.supabase.com',
                path: `/v1/projects/${REF}/database/query`,
                method: 'POST',
                headers: { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              }, (res) => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve({ s: res.statusCode, b: JSON.parse(d) }); } catch { resolve({ s: res.statusCode, b: d }); } });
              });
              r.on('error', e => resolve({ s: 0, b: e.message }));
              r.write(body); r.end();
            });
          }

          async function main() {
            // 1. Check meditation_style_sounds
            console.log('=== meditation_style_sounds ===');
            const sounds = await sql(`
              SELECT style_id, COUNT(*) as count, is_active
              FROM public.meditation_style_sounds
              GROUP BY style_id, is_active
              ORDER BY style_id
            `);
            console.log('Sounds by style:', JSON.stringify(sounds.b));

            // 2. Check full sample of sounds to see file_path format
            const soundSample = await sql(`
              SELECT id, style_id, name, file_path, is_active
              FROM public.meditation_style_sounds
              LIMIT 5
            `);
            console.log('Sample sounds:', JSON.stringify(soundSample.b));

            // 3. Check creative-soul-library bucket files via storage API
            console.log('\n=== creative-soul-library storage ===');
            const buckets = await sql(`
              SELECT id, name, public FROM storage.buckets WHERE name = 'creative-soul-library'
            `);
            console.log('Bucket:', JSON.stringify(buckets.b));

            // 4. List files in storage
            const files = await sql(`
              SELECT name, bucket_id FROM storage.objects
              WHERE bucket_id = 'creative-soul-library'
              LIMIT 20
            `);
            console.log('Storage files (sample):', JSON.stringify(files.b));

            // 5. Check user_active_transmissions RLS
            console.log('\n=== user_active_transmissions ===');
            const txData = await sql(`
              SELECT user_id, updated_at,
                jsonb_array_length(COALESCE(activations, '[]')::jsonb) as count
              FROM public.user_active_transmissions
              WHERE user_id = '${ADAM}'
            `);
            console.log('Adam transmissions:', JSON.stringify(txData.b));

            // 6. Check RLS on user_active_transmissions
            const txRls = await sql(`SELECT policyname, cmd FROM pg_policies WHERE tablename = 'user_active_transmissions'`);
            console.log('Transmission RLS:', JSON.stringify(txRls.b));

            // 7. Check creative_tools
            console.log('\n=== creative_tools ===');
            const tools = await sql(`SELECT slug, name, tool_type, is_active FROM public.creative_tools ORDER BY price_eur`);
            console.log('Tools:', JSON.stringify(tools.b));
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF
