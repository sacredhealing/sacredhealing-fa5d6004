name: Check Oracle Trades

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Query trades and write to repo
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          echo "=== Settings ===" > _trade_log.txt
          curl -s \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/polymarket_bot_settings?limit=1" >> _trade_log.txt

          echo "" >> _trade_log.txt
          echo "=== Recent Trades ===" >> _trade_log.txt
          curl -s \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            "https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/polymarket_trades?order=created_at.desc&limit=5" >> _trade_log.txt

          cat _trade_log.txt
          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add _trade_log.txt
          git commit -m "Trade log check" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
