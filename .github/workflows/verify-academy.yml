name: Verify Academy DB
on:
  workflow_dispatch:
  push:
    paths:
      - scripts/verify-academy.cjs
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Count modules per tier
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/verify-academy.cjs
      - name: Commit result
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add academy-verify.json
          git commit -m "verify: academy DB state $(date +%H%M%S)" || true
          git push "https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
