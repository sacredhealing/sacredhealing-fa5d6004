name: Diagnose Airdrop Farming DB Access

on:
  push:
    paths:
      - '.github/workflows/diag-airdrop.yml'
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Test service role keys against live project
        env:
          SVC1: ${{ secrets.NEW_SERVICE_ROLE }}
          SVC2: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SVC3: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          OUT="_airdrop_diag_result.txt"
          echo "=== $(date -u -Iseconds) ===" > $OUT

          for pair in "NEW_SERVICE_ROLE:$SVC1" "SUPABASE_SERVICE_KEY:$SVC2" "SUPABASE_SERVICE_ROLE_KEY:$SVC3"; do
            NAME="${pair%%:*}"
            KEY="${pair#*:}"
            if [ -z "$KEY" ]; then
              echo "$NAME: (not set)" >> $OUT
              continue
            fi
            R=$(curl -s -o /tmp/body -w "%{http_code}" "https://ssygukfdbtehvtndandn.supabase.co/rest/v1/income_streams?select=id&limit=1" \
              -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
            echo "$NAME basic-select: HTTP $R body=$(cat /tmp/body | head -c 150)" >> $OUT

            R2=$(curl -s -o /tmp/body2 -w "%{http_code}" -X POST "https://ssygukfdbtehvtndandn.supabase.co/rest/v1/rpc/exec_sql" \
              -H "apikey: $KEY" -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" \
              -d '{"query":"SELECT 1;"}')
            echo "$NAME exec_sql: HTTP $R2 body=$(cat /tmp/body2 | head -c 200)" >> $OUT
          done

          cat $OUT

      - name: Commit diag result
        env:
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _airdrop_diag_result.txt
          git commit -m "Airdrop DB diagnostic result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" HEAD:main || true
