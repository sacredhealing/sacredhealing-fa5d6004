name: Update Vercel Env Vars

on:
  workflow_dispatch:

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Add NEW_SERVICE_ROLE to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEW_SERVICE_ROLE: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          # Get project ID first
          PROJECT=$(curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
import sys,json
d=json.load(sys.stdin)
projs=[p for p in d.get('projects',[]) if 'sacredhealing-fa5d6004' in p.get('name','')]
print(projs[0]['id'] if projs else '')
")
          echo "Project: $PROJECT"

          # Set NEW_SERVICE_ROLE env var
          curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEW_SERVICE_ROLE\",\"value\":\"$NEW_SERVICE_ROLE\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Set:', d.get('key','error'))" || true
          echo "Done"
