name: Update Vercel Env Vars

on:
  workflow_dispatch:

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Update Vercel env vars to new Supabase
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -fsSL "https://raw.githubusercontent.com/sacredhealing/sacredhealing-fa5d6004/main/scripts/update-vercel-env.js" -o update-vercel-env.js
          node update-vercel-env.js
