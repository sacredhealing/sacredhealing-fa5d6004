name: Deploy Shiesty Signal Oracle to Railway

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Verify Railway auth
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway whoami

      - name: Deploy polymarket-worker to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd polymarket-worker
          
          # Deploy — Railway CLI will create service if it doesn't exist
          railway up --detach --service shiesty-signal-oracle 2>&1 || \
          railway up --detach 2>&1

      - name: Set environment variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          railway variables set \
            SUPABASE_URL=https://fjdzhrdpioxdeyyfogep.supabase.co \
            "SUPABASE_SERVICE_KEY=$SUPABASE_SERVICE_KEY" \
            PAPER_MODE=true \
            RISK_PCT=0.05 \
            PORT=8080 \
            --service shiesty-signal-oracle 2>&1 || \
          railway variables set \
            SUPABASE_URL=https://fjdzhrdpioxdeyyfogep.supabase.co \
            "SUPABASE_SERVICE_KEY=$SUPABASE_SERVICE_KEY" \
            PAPER_MODE=true \
            RISK_PCT=0.05 \
            PORT=8080 2>&1

          echo "✅ Environment variables set"

      - name: Get deployment URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          sleep 10
          railway status 2>&1 || true
          echo "Check railway.app for your deployment URL"
          echo "Health endpoint: https://<your-domain>/health"
