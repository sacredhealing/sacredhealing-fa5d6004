name: Deploy Shiesty Signal Oracle to Railway

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Railway CLI version:"
          railway --version

          echo "Attempting deploy from polymarket-worker directory..."
          cd polymarket-worker

          # Try deploy with service name
          railway up --detach --service shiesty-signal-oracle || {
            echo "Named service deploy failed, trying without service flag..."
            railway up --detach
          }

          echo "Setting env vars..."
          railway variables set \
            SUPABASE_URL=https://fjdzhrdpioxdeyyfogep.supabase.co \
            "SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}" \
            PAPER_MODE=true \
            RISK_PCT=0.05 \
            PORT=8080 || echo "Env vars will need to be set manually in Railway dashboard"

          echo "Deploy complete. Check https://railway.app for service status."
