name: Deploy Shiesty Signal Oracle to Railway

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy and capture output
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_railway_deploy_log.txt"
          echo "=== Railway Deploy Log $(date) ===" > $LOG

          echo "--- railway version ---" >> $LOG
          railway --version >> $LOG 2>&1

          echo "--- railway whoami ---" >> $LOG
          railway whoami >> $LOG 2>&1 || echo "whoami failed" >> $LOG

          echo "--- railway projects list ---" >> $LOG
          railway list >> $LOG 2>&1 || echo "list failed" >> $LOG

          echo "--- GraphQL me query ---" >> $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { id email projects { edges { node { id name } } } } }"}' >> $LOG 2>&1

          cat $LOG

          # Commit the log so Claude can read it
          git config user.email "deploy@sqi.app"
          git config user.name "SQI Deploy Bot"
          git add $LOG
          git commit -m "Deploy log $(date +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
