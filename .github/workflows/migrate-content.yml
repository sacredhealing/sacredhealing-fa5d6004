name: Migrate Content Data

on:
  push:
    paths:
      - '.github/workflows/migrate-content.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Migrate content tables
        env:
          NEW_SVC: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          node << 'EOF'
          const https = require('https');

          const OLD = 'https://ssygukfdbtehvtndandn.supabase.co';
          const NEW = 'https://fjdzhrdpioxdeyyfogep.supabase.co';
          const OLD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWd1a2ZkYnRlaHZ0bmRhbmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MDMxMDMsImV4cCI6MjA4MDE3OTEwM30.XXwg0F7kXR4-OFRu4A2RARfhbEXurwHp5HzMOMBAiy4';
          const SVC = process.env.NEW_SVC;
          const R2 = 'https://pub-7a2cf16596fd425ab1717b8c0c3e567d.r2.dev';

          function req(url, method, headers, body) {
            return new Promise((resolve) => {
              const u = new URL(url);
              const payload = body ? JSON.stringify(body) : '';
              const r = https.request({ hostname: u.hostname, path: u.pathname + u.search, method,
                headers: { ...headers, ...(payload ? { 'Content-Length': Buffer.byteLength(payload) } : {}) }
              }, (res) => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve({ s: res.statusCode, b: JSON.parse(d) }); } catch { resolve({ s: res.statusCode, b: d }); } });
              });
              r.on('error', e => resolve({ s: 0, b: e.message }));
              if (payload) r.write(payload);
              r.end();
            });
          }

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          function fixUrls(rows) {
            return rows.map(row => {
              const fixed = { ...row };
              for (const [k, v] of Object.entries(fixed)) {
                if (typeof v === 'string' && v.includes('ssygukfdbtehvtndandn.supabase.co/storage')) {
                  fixed[k] = v.replace('https://ssygukfdbtehvtndandn.supabase.co/storage/v1/object/public/', R2 + '/');
                }
              }
              return fixed;
            });
          }

          async function migrateTable(table) {
            const { s, b } = await req(`${OLD}/rest/v1/${table}?select=*&limit=1000`,
              'GET', { 'apikey': OLD_KEY, 'Authorization': `Bearer ${OLD_KEY}` });
            if (s !== 200 || !Array.isArray(b) || b.length === 0) {
              console.log(`${table}: skip (${s}, ${b?.length || 0} rows)`);
              return;
            }
            const rows = fixUrls(b);
            const { s: ws, b: wb } = await req(`${NEW}/rest/v1/${table}`, 'POST',
              { 'apikey': SVC, 'Authorization': `Bearer ${SVC}`,
                'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
              rows);
            console.log(`${table}: ${b.length} rows → status ${ws} ${ws >= 300 ? JSON.stringify(wb).slice(0,80) : 'OK'}`);
            await sleep(200);
          }

          async function main() {
            const tables = ['meditations','music_tracks','courses','lessons','teachers',
              'healing_audios','sound_tracks','audio_tracks','products','community_posts',
              'announcements','mantras','frequencies','activations','transmissions',
              'meditation_content','course_modules','chakras','sacred_sites'];
            for (const t of tables) await migrateTable(t);
            console.log('DONE');
          }

          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          EOF
