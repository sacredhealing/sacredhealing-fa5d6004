name: Shreem Backfill — Fix Key + Run

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/shreem-backfill-fix.yml'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Get correct service key + run backfill on Hetzner
        env:
          SUPA_PAT: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
          HELIUS_KEY: REMOVED_OLD_KEY
        run: |
          sudo apt-get install -y sshpass 2>/dev/null

          # Get service role key for the LIVE project ssygukfdbtehvtndandn
          echo "Fetching service role key for ssygukfdbtehvtndandn..."
          KEYS=$(curl -s "https://api.supabase.com/v1/projects/ssygukfdbtehvtndandn/api-keys" \
            -H "Authorization: Bearer ${SUPA_PAT}")
          echo "Keys response: $KEYS"
          
          SERVICE_KEY=$(echo "$KEYS" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if isinstance(d,list):
    for k in d:
        if k.get('name') in ('service_role','service-role','service role'):
            print(k.get('api_key',''))
            break
" 2>/dev/null || echo "")
          
          if [ -z "$SERVICE_KEY" ]; then
            echo "Could not get service key from API, trying alternate endpoint..."
            KEYS2=$(curl -s "https://api.supabase.com/v1/projects/ssygukfdbtehvtndandn/secrets" \
              -H "Authorization: Bearer ${SUPA_PAT}")
            echo "Secrets: $KEYS2"
            SERVICE_KEY=$(echo "$KEYS2" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if isinstance(d,list):
    for k in d:
        name=k.get('name','').lower()
        if 'service' in name:
            print(k.get('value',''))
            break
" 2>/dev/null || echo "")
          fi

          echo "Service key found: ${SERVICE_KEY:0:20}..."
          
          if [ -z "$SERVICE_KEY" ]; then
            echo "ERROR: Could not retrieve service key"
            exit 1
          fi

          HETZNER_IP="178.105.183.74"
          HETZNER_PW="LiuCcqgARtAx"

          echo "Copying script to Hetzner..."
          sshpass -p "$HETZNER_PW" scp -o StrictHostKeyChecking=no \
            scripts/shreem_backfill.mjs root@${HETZNER_IP}:/root/shreem_backfill.mjs

          echo "Running backfill with correct service key..."
          sshpass -p "$HETZNER_PW" ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 root@${HETZNER_IP} \
            "HELIUS_KEY=${HELIUS_KEY} SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co SUPABASE_SERVICE_KEY=${SERVICE_KEY} node /root/shreem_backfill.mjs 2>&1" \
            | tee _backfill_result.txt
          
          echo "=== RESULT ==="
          grep -E "(🏆|✅|inserted|swaps)" _backfill_result.txt | tail -30

      - name: Commit result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add _backfill_result.txt || true
          git commit -m "data: backfill with correct key $(date -u +%Y-%m-%d-%H%M)" || echo "nothing to commit"
          git push "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
