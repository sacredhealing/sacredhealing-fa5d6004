name: Shreem Backfill — Real Whale SWAP History

on:
  workflow_dispatch:
  # Also runs automatically on push to this file so it self-triggers once
  push:
    paths:
      - '.github/workflows/shreem-backfill.yml'
      - 'scripts/shreem_backfill.mjs'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backfill — fetch real SWAP history for 21 whales
        env:
          HELIUS_KEY: 775d3d1f-6801-41de-a063-8aee4382d0f4
          SUPABASE_URL: https://ssygukfdbtehvtndandn.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "🔱 Starting Shreem Brzee backfill..."
          node scripts/shreem_backfill.mjs 2>&1 | tee _backfill_result.txt
          echo ""
          echo "=== SUMMARY ==="
          grep -E "(✅|🏆|🐋|⚠|❌)" _backfill_result.txt || true

      - name: Commit backfill result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI Backfill Bot"
          git add _backfill_result.txt || true
          git commit -m "data: shreem backfill $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
