name: Fix Vercel Now
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node scripts/fix-vercel-now.mjs | tee /tmp/output.txt
          cat /tmp/output.txt > scripts/vercel-diag-output.json
      - name: Commit diagnostic output
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add scripts/vercel-diag-output.json
          git commit -m "diag: Vercel project state" || echo "no changes"
          git push
