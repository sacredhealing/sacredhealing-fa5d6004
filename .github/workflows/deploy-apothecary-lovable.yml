name: Deploy Apothecary + Bhrigu + Shreem to Lovable Supabase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy bhrigu-oracle to Lovable project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy bhrigu-oracle --project-ref ssygukfdbtehvtndandn --no-verify-jwt 2>&1 || echo "bhrigu deploy failed"
        continue-on-error: true

      - name: Deploy quantum-apothecary-chat to Lovable project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy quantum-apothecary-chat --project-ref ssygukfdbtehvtndandn --no-verify-jwt 2>&1 || echo "apothecary deploy failed"
        continue-on-error: true

      - name: Deploy shreem-helius-webhook (SUPABASE_ACCESS_TOKEN)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Attempting with SUPABASE_ACCESS_TOKEN..."
          supabase functions deploy shreem-helius-webhook --project-ref ssygukfdbtehvtndandn --no-verify-jwt 2>&1
          echo "Exit code: $?"
        continue-on-error: true

      - name: Deploy shreem-helius-webhook (SUPA_ADMIN_PAT fallback)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPA_ADMIN_PAT }}
        run: |
          echo "Attempting with SUPA_ADMIN_PAT..."
          supabase functions deploy shreem-helius-webhook --project-ref ssygukfdbtehvtndandn --no-verify-jwt 2>&1
          echo "Exit code: $?"
        continue-on-error: true

      - name: Deploy shreem-helius-webhook (SUPABASE_PAT fallback)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PAT }}
        run: |
          echo "Attempting with SUPABASE_PAT..."
          supabase functions deploy shreem-helius-webhook --project-ref ssygukfdbtehvtndandn --no-verify-jwt 2>&1
          echo "Exit code: $?"
        continue-on-error: true

      - name: Done
        run: |
          echo "All deploy attempts complete."
          echo "Check steps above for which token worked."
          echo "shreem-helius-webhook URL:"
          echo "https://ssygukfdbtehvtndandn.supabase.co/functions/v1/shreem-helius-webhook"
