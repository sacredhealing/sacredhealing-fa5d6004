name: Deploy Apothecary Chat to Lovable Supabase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set GEMINI_API_KEY secret on Lovable project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set GEMINI_API_KEY=AIzaSyAceP9hWMpkuhG-8PMbOUZNrHnocVLx7jo \
            --project-ref ssygukfdbtehvtndandn || echo "secret set failed — continuing"

      - name: Deploy quantum-apothecary-chat to Lovable project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy quantum-apothecary-chat \
            --project-ref ssygukfdbtehvtndandn \
            --no-verify-jwt
