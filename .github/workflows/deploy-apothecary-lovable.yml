name: Deploy Apothecary + Bhrigu to Lovable Supabase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Try set LOVABLE_API_KEY secret (may fail if no access)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set LOVABLE_API_KEY=${{ secrets.LOVABLE_API_KEY || \'\' }} \
            --project-ref ssygukfdbtehvtndandn 2>&1 || echo "secrets set skipped (no access)"
        continue-on-error: true

      - name: Deploy bhrigu-oracle to Lovable project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy bhrigu-oracle \
            --project-ref ssygukfdbtehvtndandn \
            --no-verify-jwt 2>&1
        continue-on-error: true

      - name: Deploy quantum-apothecary-chat to Lovable project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy quantum-apothecary-chat \
            --project-ref ssygukfdbtehvtndandn \
            --no-verify-jwt 2>&1
        continue-on-error: true

      - name: Report result
        run: |
          echo "Deployment attempted for both functions."
          echo "Check Supabase function logs to confirm success."
