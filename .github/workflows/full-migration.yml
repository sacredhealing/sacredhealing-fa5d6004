name: Direct Data Migration via Management API

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Migrate all user data directly
        env:
          NEW_SVC: ${{ secrets.NEW_SERVICE_ROLE }}
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cat << 'NODE' > /tmp/migrate.mjs
          import https from 'https';

          const OLD_REF = 'ssygukfdbtehvtndandn';
          const NEW_REF = 'fjdzhrdpioxdeyyfogep';
          const NEW_URL = 'https://fjdzhrdpioxdeyyfogep.supabase.co';
          const PAT = process.env.PAT;
          const NEW_SVC = process.env.NEW_SVC;

          function req(url, method, headers, body) {
            return new Promise((resolve) => {
              const u = new URL(url);
              const payload = body ? JSON.stringify(body) : '';
              const r = https.request({
                hostname: u.hostname, path: u.pathname + u.search, method,
                headers: { ...headers, ...(payload ? { 'Content-Length': Buffer.byteLength(payload) } : {}) }
              }, (res) => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve({ s: res.statusCode, b: JSON.parse(d) }); } catch { resolve({ s: res.statusCode, b: d }); } });
              });
              r.setTimeout(30000, () => { r.destroy(); resolve({ s: 0, b: 'timeout' }); });
              r.on('error', e => resolve({ s: 0, b: e.message }));
              if (payload) r.write(payload);
              r.end();
            });
          }

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // Query OLD Supabase via Management API (uses PAT - can access any project)
          async function queryOld(sql) {
            return req(
              `https://api.supabase.com/v1/projects/${OLD_REF}/database/query`,
              'POST',
              { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json' },
              { query: sql }
            );
          }

          // Query NEW Supabase via Management API
          async function queryNew(sql) {
            return req(
              `https://api.supabase.com/v1/projects/${NEW_REF}/database/query`,
              'POST',
              { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json' },
              { query: sql }
            );
          }

          // Upsert rows to new Supabase REST
          async function upsert(table, rows) {
            if (!rows.length) return { s: 200 };
            return req(
              `${NEW_URL}/rest/v1/${table}`,
              'POST',
              { 'Authorization': `Bearer ${NEW_SVC}`, 'apikey': NEW_SVC,
                'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
              rows
            );
          }

          function esc(v) {
            if (v === null || v === undefined) return 'NULL';
            if (typeof v === 'boolean') return v ? 'TRUE' : 'FALSE';
            if (typeof v === 'number') return String(v);
            if (typeof v === 'object') return `'${JSON.stringify(v).replace(/'/g, "''")}'::jsonb`;
            return `'${String(v).replace(/'/g, "''")}'`;
          }

          async function main() {
            console.log('=== Direct Migration: Old Supabase → New Supabase ===\n');

            // STEP 1: Get all public tables from old project
            console.log('Step 1: Discover tables in old Supabase...');
            const tablesRes = await queryOld(`
              SELECT tablename, n_live_tup as row_count
              FROM pg_catalog.pg_tables t
              LEFT JOIN pg_stat_user_tables s ON s.relname = t.tablename
              WHERE schemaname = 'public'
              ORDER BY n_live_tup DESC NULLS LAST
            `);

            if (tablesRes.s !== 200) {
              console.log('ERROR querying old tables:', tablesRes.s, JSON.stringify(tablesRes.b).slice(0,300));
              process.exit(1);
            }

            const tables = tablesRes.b;
            console.log(`Found ${tables.length} tables:\n`);
            tables.forEach(t => console.log(`  ${t.tablename}: ~${t.row_count || 0} rows`));

            // Priority order: user-data tables first
            const PRIORITY = [
              'profiles', 'user_memberships', 'subscriptions', 'membership_purchases',
              'user_membership_tier', 'user_balances', 'affiliates', 'affiliate_referrals',
              'affiliate_clicks', 'email_list', 'jyotish_charts', 'jyotish_readings',
              'bhrigu_readings', 'astrology_data', 'user_astrology', 'dosha_profiles',
              'ayurveda_sessions', 'shakti_cycle_logs', 'meditation_progress',
              'course_enrollments', 'community_posts', 'community_comments',
              'quantum_activations', 'akashic_records', 'virtual_pilgrimages',
              'scalar_field_activations', 'nadi_sessions', 'life_book_entries',
              'bot_trades', 'daily_checkins', 'achievements', 'user_achievements',
              'user_coins', 'announcements', 'mantra_logs', 'meditation_sessions',
              'practitioner_progress', 'quantum_apothecary_sessions'
            ];

            const tableNames = tables.map(t => t.tablename);
            const ordered = [...new Set([...PRIORITY.filter(t => tableNames.includes(t)), ...tableNames])];

            console.log('\nStep 2: Migrate table data...\n');

            const results = {};
            for (const table of ordered) {
              const tableInfo = tables.find(t => t.tablename === table);
              const count = parseInt(tableInfo?.row_count || 0);
              if (count === 0) { results[table] = 'empty'; continue; }

              let offset = 0, migrated = 0, errors = 0;
              while (true) {
                const res = await queryOld(`SELECT * FROM public."${table}" LIMIT 500 OFFSET ${offset}`);
                if (res.s !== 200 || !Array.isArray(res.b) || res.b.length === 0) break;
                const rows = res.b;

                const u = await upsert(table, rows);
                if (u.s >= 200 && u.s < 300) { migrated += rows.length; }
                else { errors++; console.log(`  ⚠️  ${table}@${offset}: ${u.s} ${JSON.stringify(u.b).slice(0,100)}`); }

                if (rows.length < 500) break;
                offset += 500;
                await sleep(150);
              }
              results[table] = errors ? `${migrated} migrated, ${errors} errors` : `✅ ${migrated}`;
              console.log(`  ${table}: ${results[table]}`);
            }

            // STEP 3: Fix auth users — preserve original UUIDs via SQL
            console.log('\nStep 3: Fix auth users with correct UUIDs...');
            const profRes = await queryOld(`SELECT id, email, created_at FROM public.profiles LIMIT 500`);
            if (profRes.s === 200 && Array.isArray(profRes.b)) {
              let authFixed = 0;
              for (const p of profRes.b) {
                if (!p.email || !p.id) continue;
                const sql = `
                  INSERT INTO auth.users (
                    instance_id, id, aud, role, email, encrypted_password,
                    email_confirmed_at, raw_app_meta_data, raw_user_meta_data, created_at, updated_at,
                    confirmation_token, email_change, email_change_token_new, recovery_token
                  ) VALUES (
                    '00000000-0000-0000-0000-000000000000',
                    '${p.id}', 'authenticated', 'authenticated',
                    ${esc(p.email)},
                    crypt('SiddhaQuantum2050!', gen_salt('bf')),
                    NOW(), '{"provider":"email","providers":["email"]}', '{}',
                    ${esc(p.created_at || new Date().toISOString())},
                    NOW(), '', '', '', ''
                  )
                  ON CONFLICT (id) DO UPDATE SET
                    email = EXCLUDED.email,
                    email_confirmed_at = NOW(),
                    updated_at = NOW()
                `;
                const r = await queryNew(sql);
                if (r.s === 200 || r.s === 201) authFixed++;
                else console.log(`  ⚠️  auth ${p.email}: ${r.s} ${JSON.stringify(r.b).slice(0,100)}`);
                await sleep(100);
              }
              console.log(`  Auth users fixed: ${authFixed}`);
            }

            console.log('\n=== MIGRATION COMPLETE ===');
            console.log('Login: siddhaquantumnexus.com');
            console.log('Password: SiddhaQuantum2050!');
            console.log('\nFull results:', JSON.stringify(results, null, 2));
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          NODE
          node /tmp/migrate.mjs

      - name: Save migration report
        if: always()
        run: |
          echo "Migration ran at $(date)" > scripts/last-migration-report.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add scripts/last-migration-report.txt || true
          git commit -m "chore: migration report" || echo "nothing to commit"
          git push || echo "push skipped"
