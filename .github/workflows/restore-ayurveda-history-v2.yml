name: Restore All Ayurveda History
on:
  push:
    paths:
      - 'scripts/restore-ayurveda-history.py'
jobs:
  restore:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
      SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SK2: ${{ secrets.NEW_SERVICE_ROLE }}
      GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Run restore
        run: python3 scripts/restore-ayurveda-history.py
