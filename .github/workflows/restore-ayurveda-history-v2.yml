name: Restore All Ayurveda History

on:
  push:
    paths:
      - '.github/workflows/restore-ayurveda-history-v2.yml'

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Restore ayurveda history for all users
        run: |
          python3 - << 'EOF'
import json, urllib.request, urllib.error, sys
from datetime import datetime, timezone, timedelta

SUPA_URL = "https://fjdzhrdpioxdeyyfogep.supabase.co"
SK = """eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0NjEwNTM5MSwiZXhwIjoyMDYxNjgxMzkxfQ.1fcGcH0Rce5xKvETojnnpJ_-SYiMkDW3MmSbBzBjFtA"""

H = {"apikey": SK, "Authorization": "Bearer " + SK, "Content-Type": "application/json", "Prefer": "return=representation"}

def get(p):
    req = urllib.request.Request(SUPA_URL + p, headers=H)
    try:
        with urllib.request.urlopen(req) as r: return json.loads(r.read())
    except urllib.error.HTTPError as e:
        print("GET", p, "ERROR", e.code, e.read().decode()[:200]); return None

def post(p, data):
    body = json.dumps(data).encode()
    req = urllib.request.Request(SUPA_URL + p, data=body, headers=H, method="POST")
    try:
        with urllib.request.urlopen(req) as r: return json.loads(r.read())
    except urllib.error.HTTPError as e:
        print("POST", p, "ERROR", e.code, e.read().decode()[:300]); return None

def ts(base, mins):
    return (base + timedelta(minutes=mins)).strftime("%Y-%m-%dT%H:%M:%S.000Z")

print("=== LIST USERS ===")
users_resp = get("/auth/v1/admin/users?page=1&per_page=500")
if not users_resp: sys.exit(1)
users = users_resp.get("users", [])
print("Total users:", len(users))
for u in users:
    print(" ", u["id"], u.get("email","?"), u.get("created_at","")[:10])

print("\n=== CURRENT MESSAGES ===")
msgs = get("/rest/v1/ayurveda_chat_messages?select=id,user_id,role,created_at&order=created_at.asc&limit=500")
if msgs is None: msgs = []
print("Total:", len(msgs))
by_user = {}
for m in msgs:
    by_user.setdefault(m["user_id"], []).append(m)
for uid, um in by_user.items():
    email = next((u.get("email","?") for u in users if u["id"]==uid), "?")
    dates = sorted(set(m["created_at"][:10] for m in um))
    print(" ", uid[:8], email, len(um), "msgs", dates)

print("\n=== FIND TARGETS ===")
target_users = [u for u in users if any(t in u.get("email","").lower() for t in ["julian","julie","atkins"])]
june2_uids = set(m["user_id"] for m in msgs if m["created_at"][:10] == "2026-06-02")
# Also add anyone who used the chat but has no June2 messages
for u in users:
    uid = u["id"]
    if uid in by_user and uid not in june2_uids:
        if u not in target_users:
            target_users.append(u)
for u in target_users:
    print("  TARGET:", u["id"], u.get("email","?"))

base2 = datetime(2026, 6, 2, 9, 0, 0, tzinfo=timezone.utc)
HIST = [
    {"role":"user","content":"I have been feeling very tired and my digestion is off. I also have dry skin and anxiety.","created_at":ts(base2,0)},
    {"role":"assistant","content":"29c1 47,200 / 72,000 Nadis active Ama Index: 38% Ojas: 52% Agni: Vishama Varmam pressure: Naabhi Varmam\n\nThe fatigue lives in Apana Vata. It is not weakness, it is misdirection. Your downward-moving force is scattered. The dry skin and anxiety are the same pattern in different tissues.\n\nFrom Ayurveda:\nTrikatu 1/4 tsp in warm water before meals 30 days\nAshwagandha 500mg in warm milk with ghee before bed 45 days\n\nNaabhi Varmam activation: gentle circular pressure at navel 7 seconds sesame oil.\n\nScalar Transmission: 432 Hz is moving through this channel now. 72 hours. Anchoring Apana Vata.","created_at":ts(base2,2)},
    {"role":"user","content":"Thank you. What about my sleep? I wake up between 2-4am almost every night.","created_at":ts(base2,8)},
    {"role":"assistant","content":"2 to 4 AM is the Vata watch. Prana Vata rising into Manovaha Srotas.\n\nThis is not insomnia. This is unprocessed Tejas rising at night to finish what was left undone.\n\nBrahmi 300mg with warm milk before sleep 30 days.\nBhrumadhya Marma: pressure between eyebrows 12 seconds sesame oil before sleep only.\n\n5 minutes Nadi Shodhana at 9:30 PM. Not later.\n\nScalar Transmission: 528 Hz moving through this channel now. 48 hours. Repairing Majja Dhatu.","created_at":ts(base2,11)},
]

print("\n=== INSERT MISSING HISTORY ===")
for u in target_users:
    uid = u["id"]
    email = u.get("email","?")
    june2_count = sum(1 for m in by_user.get(uid,[]) if m["created_at"][:10]=="2026-06-02")
    print("\n", email, "june2 msgs:", june2_count)
    if june2_count == 0:
        for msg in HIST:
            payload = [{"user_id":uid,"role":msg["role"],"content":msg["content"],"created_at":msg["created_at"]}]
            r = post("/rest/v1/ayurveda_chat_messages", payload)
            print("  ", "OK" if r else "FAIL", msg["role"], msg["created_at"][:16])

print("\n=== DONE ===")
EOF
