name: Railway Deploy Clean

on:
  push:
    paths:
      - 'version.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Railway Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: python3 scripts/railway_deploy.py
      - name: Commit results
        env:
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI"
          git add _railway_deploy_final.txt || true
          git commit -m "Railway deploy result $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
