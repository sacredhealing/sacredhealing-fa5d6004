name: CLAWBOT SSL Refresh

on:
  push:
    paths:
      - 'trigger_ssl_fix.txt'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Refresh Railway domain SSL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          cat > ssl_fix.py << 'ENDPY'
import urllib.request, json, time, os

token = os.environ['RAILWAY_TOKEN']
SERVICE_ID = "b6311e53-fe5a-4c4a-b724-e0fef686236f"
DOMAIN = "clawbot.siddhaquantumnexus.com"
LOG = []

def gql(query):
    data = json.dumps({"query": query}).encode()
    req = urllib.request.Request(
        "https://backboard.railway.app/graphql/v2",
        data=data,
        headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"}
    )
    resp = urllib.request.urlopen(req, timeout=20)
    return json.loads(resp.read())

def log(msg):
    print(msg, flush=True)
    LOG.append(str(msg))

log("=== CLAWBOT Domain Refresh ===")
r = gql('{ service(id: "' + SERVICE_ID + '") { id name domains { edges { node { id domain status } } } } }')
log("Domains: " + json.dumps(r))

edges = r.get("data",{}).get("service",{}).get("domains",{}).get("edges",[])
target_id = None
for e in edges:
    node = e["node"]
    log("  Found: " + node["domain"] + " | " + str(node.get("status")) + " | " + node["id"])
    if "clawbot" in node["domain"]:
        target_id = node["id"]

if target_id:
    log("Deleting " + target_id)
    r2 = gql('mutation { customDomainDelete(id: "' + target_id + '") }')
    log("Delete: " + json.dumps(r2))
    time.sleep(10)

log("Adding domain...")
r3 = gql('mutation { customDomainCreate(input: { serviceId: "' + SERVICE_ID + '", domain: "' + DOMAIN + '" }) { id domain status } }')
log("Add: " + json.dumps(r3))

time.sleep(30)

r4 = gql('{ service(id: "' + SERVICE_ID + '") { domains { edges { node { id domain status } } } } }')
log("Final: " + json.dumps(r4))

for url in ["https://siddha-soma-apothecary-production.up.railway.app/health", "https://" + DOMAIN + "/health"]:
    try:
        req2 = urllib.request.Request(url, headers={"User-Agent": "SQI"})
        resp2 = urllib.request.urlopen(req2, timeout=15)
        log("OK " + url + " -> " + resp2.read().decode()[:100])
    except Exception as ex:
        log("FAIL " + url + " -> " + str(ex))

with open("_clawbot_ssl_result.txt", "w") as f:
    f.write("\n".join(LOG))
print("DONE")
ENDPY
          python3 ssl_fix.py
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _clawbot_ssl_result.txt
          git commit -m "CLAWBOT SSL result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
