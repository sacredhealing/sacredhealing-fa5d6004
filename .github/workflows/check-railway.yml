name: Show Vars Fixed

on:
  push:
    paths:
      - 'version.txt'

jobs:
  show:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Write vars file
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cat > _railway_vars.txt << VARSEOF
=== RAILWAY VARIABLES — COPY THESE INTO RAILWAY DASHBOARD ===

Variable Name          Value
─────────────────────────────────────────────────────────────
SUPABASE_URL           https://fjdzhrdpioxdeyyfogep.supabase.co
SUPABASE_SERVICE_KEY   ${SK}
POLYGON_RPC_URL        https://polygon-mainnet.g.alchemy.com/v2/az4D7Awbl2E2rNpe6kc3M
PAPER_MODE             true
RISK_PCT               0.02
PORT                   8080

ROOT DIRECTORY (in Settings > Build):  polymarket-worker
VARSEOF
          cat _railway_vars.txt

      - name: Commit
        env:
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI"
          git add _railway_vars.txt
          git diff --staged --quiet || git commit -m "Railway vars"
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main
