name: Railway Full Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Full Railway check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_railway_full.txt"
          echo "=== Railway Full Check ===" > $LOG

          # Try team projects
          echo "--- All accessible projects ---" >> $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ projects(first: 10) { edges { node { id name createdAt services { edges { node { id name createdAt } } } environments { edges { node { id name } } } } } } }"}' >> $LOG

          echo "" >> $LOG
          echo "--- Me info ---" >> $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { id name email teams { edges { node { id name projects { edges { node { id name } } } } } } } }"}' >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "Railway full check" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
