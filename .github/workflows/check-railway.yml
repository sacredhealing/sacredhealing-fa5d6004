name: Railway Simple Test

on:
  push:
    paths:
      - 'version.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Test Railway token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_rw_test.txt"
          echo "=== Token Test $(date -u) ===" > $LOG
          echo "Token length: ${#RAILWAY_TOKEN}" >> $LOG
          echo "Token prefix: ${RAILWAY_TOKEN:0:8}..." >> $LOG
          
          # Test API
          RESP=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { id name email } }"}')
          echo "API response: $RESP" >> $LOG
          
          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "Railway token test $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
