name: Railway Check v2

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_railway_check2.txt"
          echo "=== Railway Check $(date -u) ===" > $LOG

          # Install CLI
          npm install -g @railway/cli --silent 2>/dev/null
          
          echo "--- whoami ---" >> $LOG
          RAILWAY_TOKEN="${RAILWAY_TOKEN}" railway whoami 2>&1 >> $LOG
          
          echo "--- projects ---" >> $LOG
          RAILWAY_TOKEN="${RAILWAY_TOKEN}" railway list 2>&1 >> $LOG || true

          # Try API with correct token
          echo "--- API projects ---" >> $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { id name email projects { edges { node { id name } } } } }"}' >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "Railway check v2" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
