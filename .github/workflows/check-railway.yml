name: Railway CLI Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Install Railway CLI and deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_railway_cli.txt"
          echo "=== Railway CLI Deploy $(date -u) ===" > $LOG

          # Install Railway CLI
          npm install -g @railway/cli 2>&1 | tail -3 >> $LOG
          railway --version >> $LOG

          # Test token
          echo "--- Testing token ---" >> $LOG
          railway whoami 2>&1 >> $LOG

          # List projects
          echo "--- Listing projects ---" >> $LOG  
          railway list 2>&1 >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "Railway CLI test $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
