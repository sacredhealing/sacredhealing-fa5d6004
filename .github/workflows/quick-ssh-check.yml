name: Quick SSH Check

on:
  push:
    paths:
      - '_trigger_ssh_check.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Get PM2 logs
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -qq
          mkdir -p ~/.ssh
          ssh-keyscan -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null || true
          
          sshpass -p "$HP" ssh -o StrictHostKeyChecking=no root@178.105.183.74 \
            'pm2 list && echo "---LOGS---" && pm2 logs shreem-brzee --lines 50 --nostream 2>/dev/null || true' \
            > /tmp/ssh_out.txt 2>&1 || true
          
          cat /tmp/ssh_out.txt

      - name: Save
        run: |
          cp /tmp/ssh_out.txt _ssh_check.txt
          git config user.email "bot@sqi.app" && git config user.name "SQI Bot"
          git add _ssh_check.txt
          git commit -m "data: ssh check $(date -u +%H%M)" || true
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
