name: Send Migration Email to All Users

on:
  workflow_dispatch:

jobs:
  save-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Save all emails to new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/save-emails.mjs
