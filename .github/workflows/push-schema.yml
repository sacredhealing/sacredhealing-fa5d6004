name: Push Schema to New Supabase

on:
  workflow_dispatch:

jobs:
  push-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install supabase CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh
          supabase --version

      - name: Reset migration history and force push all SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="fjdzhrdpioxdeyyfogep"
          PAT="${SUPABASE_ACCESS_TOKEN}"
          
          echo "=== Running all migrations via Management API ==="
          
          SUCCESS=0
          FAILED=0
          
          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")
            echo "--- Applying: $filename ---"
            
            # Read SQL and escape for JSON
            sql_content=$(cat "$sql_file")
            
            # POST to Supabase Management API
            response=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$sql_content" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query")
            
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -1)
            
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "  ✅ OK ($http_code)"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ⚠️  $http_code: $(echo $body | head -c 200)"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "=== COMPLETE: $SUCCESS succeeded, $FAILED warnings ==="
