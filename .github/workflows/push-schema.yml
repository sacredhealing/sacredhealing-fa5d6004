name: Push Schema to New Supabase

on:
  workflow_dispatch:

jobs:
  push-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push all SQL via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="fjdzhrdpioxdeyyfogep"
          PAT="${SUPABASE_ACCESS_TOKEN}"
          SUCCESS=0
          FAILED=0

          for sql_file in $(ls supabase/migrations/*.sql | sort); do
            filename=$(basename "$sql_file")
            echo "--- $filename ---"
            
            sql_content=$(cat "$sql_file")
            json_body=$(python3 -c "import json,sys; print(json.dumps({'query': open(sys.argv[1]).read()}))" "$sql_file")
            
            http_code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Content-Type: application/json" \
              -d "$json_body" \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query")
            
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "  ✅ $http_code"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ⚠️  $http_code: $(cat /tmp/resp.json | head -c 150)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "✅ Done: $SUCCESS ok, $FAILED warnings"
