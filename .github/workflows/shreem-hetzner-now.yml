name: Shreem Hetzner Deploy Now

on:
  workflow_dispatch:
  push:
    paths:
      - 'railway/shreem-brzee-bot/src/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: SSH deploy to Hetzner
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          sudo apt-get install -y sshpass -qq
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null || true

          sshpass -p "$HP" ssh -T -o StrictHostKeyChecking=no root@178.105.183.74 << SSHEOF
            set -e
            echo "══ SHREEM BRZEE — Hetzner Deploy $(date) ══"
            node -v

            REPO="/root/shreem-brzee"
            GH_TOKEN="${GH}"

            if [ ! -d "\$REPO/.git" ]; then
              git clone "https://x-access-token:\${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "\$REPO" --depth=1 --quiet
            else
              cd "\$REPO"
              git remote set-url origin "https://x-access-token:\${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
              git fetch origin main --quiet && git reset --hard origin/main --quiet
            fi

            cd "\$REPO/railway/shreem-brzee-bot"
            npm install --omit=dev --silent
            npx tsc --skipLibCheck 2>&1 | tail -3 || true

            if pm2 describe shreem-brzee > /dev/null 2>&1; then
              pm2 restart shreem-brzee --update-env && echo "✅ RESTARTED"
            else
              pm2 start dist/index.js --name shreem-brzee && echo "✅ STARTED"
            fi
            pm2 save --force > /dev/null

            sleep 3
            pm2 list
            echo ""
            pm2 logs shreem-brzee --lines 20 --nostream 2>/dev/null || true
            echo "══ DEPLOY COMPLETE ══"
SSHEOF
