name: Find Polymarket Contract

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Discover real contract + test Alchemy
        env:
          POLYGON_RPC: ${{ secrets.POLYGON_RPC_URL }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_contract_diag.txt"

          # 1. Get latest block
          echo "=== Latest block ===" | tee $LOG
          BLOCK=$(curl -s -X POST "$POLYGON_RPC" \
            -H "Content-Type: application/json" \
            -d '{"id":1,"jsonrpc":"2.0","method":"eth_blockNumber","params":[]}' | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(int(d['result'],16))")
          echo "Latest block: $BLOCK" | tee -a $LOG

          # 2. Test the CLOB contract addresses via getLogs with 2-block range
          for CONTRACT in \
            "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982" \
            "0xC5d563A36AE78145C45a50134d48A1215220f80a" \
            "0xd91E80cF2Ed76C7845c5C1Be50bD8E9f85A96c2" \
            "0x5d45e9c8f8a0c7d8e2b1f3a4c6d8e0f2a4b6c8d0"; do
            echo "--- Testing $CONTRACT ---" | tee -a $LOG
            RESULT=$(curl -s -X POST "$POLYGON_RPC" \
              -H "Content-Type: application/json" \
              -d "{"id":1,"jsonrpc":"2.0","method":"eth_getLogs","params":[{"fromBlock":"0x$(python3 -c 'print(hex(int("$BLOCK")-5))')","toBlock":"latest","address":"$CONTRACT"}]}")
            COUNT=$(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('result',[])) if 'result' in d else f'ERR: {d.get("error",{}).get("message","?")}[:80]')" 2>/dev/null)
            echo "  Logs in last 5 blocks: $COUNT" | tee -a $LOG
          done

          # 3. Find Polymarket contract via Polygonscan
          echo "" >> $LOG
          echo "=== Polygonscan: find Polymarket contracts ===" | tee -a $LOG
          curl -s "https://api.polygonscan.com/api?module=contract&action=getcontractcreation&contractaddresses=0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982" | tee -a $LOG
          echo "" >> $LOG
          
          # 4. Try known good Polymarket proxy address from Shiesty screenshot
          # 0xb9156052b7f3886a1c999045fc5cca3aaf77b1e
          echo "=== Check whale wallet txs ===" | tee -a $LOG
          curl -s "https://api.polygonscan.com/api?module=account&action=txlist&address=0xb9156052b7f3886a1c999045fc5cca3aaf77b1e&startblock=0&endblock=latest&page=1&offset=5&sort=desc" | \
            python3 -c "
import json,sys
d=json.load(sys.stdin)
txs=d.get('result',[])
if isinstance(txs,list):
  for t in txs[:5]:
    print(f'  to={t.get("to","?")} | input={t.get("input","")[:20]} | block={t.get("blockNumber")}')
else:
  print(txs)
" | tee -a $LOG

          git config user.email "bot@sqi.app"; git config user.name "SQI Bot"
          git add $LOG && git commit -m "Contract diag $(date +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
