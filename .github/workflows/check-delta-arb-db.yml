name: check-delta-arb-db
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Stats + fix RLS + anon test
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDQwMDMsImV4cCI6MjA5MzY4MDAwM30.Mkbodv6uEb1yMKA0UIKMzm-cFWfcgNFXr-LLGtqoNcg"

          # Get all trades with service key
          curl -s "$BASE/rest/v1/delta_arb_trades?select=status,pnl_usdc&order=created_at.desc" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" > /tmp/trades.json

          python3 - << 'PYEOF'
import json
with open('/tmp/trades.json') as f:
    trades = json.load(f)
won  = [t for t in trades if t['status'] == 'won']
lost = [t for t in trades if t['status'] == 'lost']
pnl  = sum(float(t['pnl_usdc'] or 0) for t in trades)
bal  = 100 + pnl
wr   = f"{len(won)/(len(won)+len(lost))*100:.1f}%" if (won or lost) else "N/A"
r = {"trades":len(trades),"wins":len(won),"losses":len(lost),"pnl":round(pnl,2),"balance":round(bal,2),"win_rate":wr}
print("STATS:", json.dumps(r))
with open('_delta_arb_stats.json','w') as f: json.dump(r,f,indent=2)
PYEOF

          # Try to disable RLS via supabase management API
          curl -s -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE delta_arb_trades DISABLE ROW LEVEL SECURITY; DROP POLICY IF EXISTS \"Users own their delta_arb_trades\" ON delta_arb_trades;"}' > /tmp/rls_result.txt
          echo "RLS fix result:" && cat /tmp/rls_result.txt

          # Test anon read
          echo ""
          echo "=== ANON READ TEST ==="
          ANON_RESULT=$(curl -s "$BASE/rest/v1/delta_arb_trades?select=id,status&limit=3" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" \
            -w "\nHTTP:%{http_code}")
          echo "$ANON_RESULT"
          echo "$ANON_RESULT" > _delta_arb_anon_test.json

      - name: Commit
        run: |
          git config user.email "bot@sqi.com"
          git config user.name "SQI Bot"
          git add _delta_arb_stats.json _delta_arb_anon_test.json
          git commit -m "ci: stats and RLS fix result" || echo "no changes"
          git push
