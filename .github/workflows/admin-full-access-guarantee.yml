name: admin-full-access-guarantee

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Apply admin access via Supabase API
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query" \
            -H "Authorization: Bearer ${SUPABASE_PAT}" \
            -H "Content-Type: application/json" \
            --data-raw '{
              "query": "INSERT INTO public.user_roles (user_id, role) VALUES (\'bd0b21c9-577a-450b-bb1e-21c9d0423f17\', \'admin\') ON CONFLICT (user_id, role) DO NOTHING; UPDATE public.profiles SET role = \'admin\', membership_tier = \'akasha-infinity\' WHERE id = \'bd0b21c9-577a-450b-bb1e-21c9d0423f17\'; INSERT INTO public.admin_granted_access (user_id, access_type, tier, access_id, is_active, granted_by, granted_at) SELECT \'bd0b21c9-577a-450b-bb1e-21c9d0423f17\', \'membership\', \'akasha-infinity\', \'akasha-infinity\', true, \'bd0b21c9-577a-450b-bb1e-21c9d0423f17\', NOW() WHERE NOT EXISTS (SELECT 1 FROM public.admin_granted_access WHERE user_id = \'bd0b21c9-577a-450b-bb1e-21c9d0423f17\' AND access_type = \'membership\' AND tier = \'akasha-infinity\' AND is_active = true);"
            }' && echo "SUCCESS" || echo "API blocked - check secret SUPABASE_ACCESS_TOKEN"
