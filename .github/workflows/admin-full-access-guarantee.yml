name: admin-full-access-guarantee
on:
  workflow_dispatch:

jobs:
  run-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Apply admin full access migration
        run: |
          SQL=$(cat << 'SQLEOF'
DO $$
DECLARE
  v_admin_uuid uuid := 'bd0b21c9-577a-450b-bb1e-21c9d0423f17';
BEGIN
  -- 1. user_roles
  IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='user_roles') THEN
    INSERT INTO public.user_roles (user_id, role) VALUES (v_admin_uuid, 'admin') ON CONFLICT (user_id, role) DO NOTHING;
  END IF;
  -- 2. profiles.role (id column)
  IF EXISTS (SELECT 1 FROM information_schema.columns WHERE table_schema='public' AND table_name='profiles' AND column_name='role') THEN
    UPDATE public.profiles SET role='admin', membership_tier='akasha-infinity' WHERE id=v_admin_uuid;
  END IF;
  -- 3. admin_granted_access
  IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='admin_granted_access') THEN
    UPDATE public.admin_granted_access SET is_active=false WHERE user_id=v_admin_uuid AND access_type='membership' AND tier!='akasha-infinity';
    INSERT INTO public.admin_granted_access (user_id,access_type,tier,access_id,is_active,granted_by,granted_at)
    SELECT v_admin_uuid,'membership','akasha-infinity','akasha-infinity',true,v_admin_uuid,NOW()
    WHERE NOT EXISTS (SELECT 1 FROM public.admin_granted_access WHERE user_id=v_admin_uuid AND access_type='membership' AND tier='akasha-infinity' AND is_active=true);
  END IF;
  -- 4. user_memberships
  IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='user_memberships') THEN
    DECLARE v_tid uuid;
    BEGIN
      SELECT id INTO v_tid FROM public.membership_tiers WHERE slug='akasha-infinity' LIMIT 1;
      IF v_tid IS NOT NULL THEN
        INSERT INTO public.user_memberships (user_id,tier_id,status,expires_at,created_at)
        VALUES (v_admin_uuid,v_tid,'active','2099-12-31 23:59:59+00',NOW())
        ON CONFLICT (user_id,tier_id) DO UPDATE SET status='active',expires_at='2099-12-31 23:59:59+00';
      END IF;
    END;
  END IF;
  RAISE NOTICE 'Admin full access guaranteed for %', v_admin_uuid;
END $$;
SQLEOF
)
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('RESULT:', json.dumps(d, indent=2)[:800])"
