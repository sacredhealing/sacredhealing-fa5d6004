name: Shreem Backfill — Batch A (wallets 0-6)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/shreem-batch-a.yml'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      
      - name: Run SQL to disable RLS
        env:
          SUPA_PAT: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        run: |
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/ssygukfdbtehvtndandn/database/query" \
            -H "Authorization: Bearer $SUPA_PAT" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE shreem_brzee_signals DISABLE ROW LEVEL SECURITY; GRANT ALL ON shreem_brzee_signals TO anon,authenticated; GRANT ALL ON shreem_brzee_session TO anon,authenticated; GRANT ALL ON shreem_brzee_paper_trades TO anon,authenticated;"}' \
            && echo "RLS disabled" || echo "RLS step failed (non-fatal)"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backfill wallets 0-6 (Cupsey→Boredboar)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.LOVABLE_SUPABASE_ANON_KEY }}
        run: |
          HELIUS_KEY=775d3d1f-6801-41de-a063-8aee4382d0f4 \
          SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co \
          SUPABASE_SERVICE_KEY=$SUPABASE_SERVICE_KEY \
          WALLET_START=0 WALLET_END=7 PAGES=3 DELAY=8000 \
          node scripts/shreem_backfill.mjs 2>&1 | tee _backfill_a.txt
          
          echo "=== RESULT A ===" && grep -E "(🏆|✅|inserted)" _backfill_a.txt | tail -20

      - name: Commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bot@sqi.app" && git config user.name "SQI Bot"
          git add _backfill_a.txt || true
          git commit -m "data: batch A backfill $(date -u +%Y-%m-%d-%H%M)" || true
          git push "https://x-access-token:${GH_TOKEN}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
