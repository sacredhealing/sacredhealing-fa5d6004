name: Revert Vercel to Old Supabase

on:
  push:
    paths:
      - '.github/workflows/revert-vercel-old.yml'

jobs:
  revert:
    runs-on: ubuntu-latest
    steps:
      - name: Point Vercel back to old working Supabase
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node << 'EOF'
          const https = require('https');
          const TOKEN = process.env.VERCEL_TOKEN;
          const TEAM = 'team_THcLSD2kAlHV2GE4ZCo76gZU';
          const PROJ_ID = 'prj_amxl4zjH9ZvIJAGCbUV1rjmo9j9c'; // siddhaquantumnexus.com

          const OLD_URL = 'https://ssygukfdbtehvtndandn.supabase.co';
          const OLD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWd1a2ZkYnRlaHZ0bmRhbmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MDMxMDMsImV4cCI6MjA4MDE3OTEwM30.XXwg0F7kXR4-OFRu4A2RARfhbEXurwHp5HzMOMBAiy4';

          const VARS = {
            VITE_SUPABASE_URL: OLD_URL,
            SUPABASE_URL: OLD_URL,
            VITE_SUPABASE_ANON_KEY: OLD_KEY,
            VITE_SUPABASE_PUBLISHABLE_KEY: OLD_KEY,
            SUPABASE_PUBLISHABLE_KEY: OLD_KEY,
            VITE_SUPABASE_PROJECT_ID: 'ssygukfdbtehvtndandn'
          };

          function req(method, path, body) {
            return new Promise((resolve) => {
              const payload = body ? JSON.stringify(body) : '';
              const r = https.request({ hostname: 'api.vercel.com', path, method,
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json',
                  ...(payload ? { 'Content-Length': Buffer.byteLength(payload) } : {}) }
              }, (res) => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve({ s: res.statusCode, b: JSON.parse(d) }); } catch { resolve({ s: res.statusCode, b: d }); } });
              });
              r.on('error', e => resolve({ s: 0, b: e.message }));
              if (payload) r.write(payload);
              r.end();
            });
          }

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          async function main() {
            // Get and delete all existing Supabase env vars
            const { b: envData } = await req('GET', `/v9/projects/${PROJ_ID}/env?teamId=${TEAM}`);
            const existing = envData?.envs || [];
            console.log(`Found ${existing.length} env vars`);

            for (const env of existing) {
              if (Object.keys(VARS).includes(env.key)) {
                const { s } = await req('DELETE', `/v9/projects/${PROJ_ID}/env/${env.id}?teamId=${TEAM}`);
                console.log(`Deleted ${env.key}: ${s}`);
                await sleep(100);
              }
            }

            // Create with old Supabase values
            const newVars = Object.entries(VARS).map(([key, value]) => ({
              key, value, type: 'encrypted',
              target: ['production', 'preview', 'development']
            }));

            const { s: createStatus } = await req('POST', `/v10/projects/${PROJ_ID}/env?teamId=${TEAM}`, newVars);
            console.log(`Created all vars: ${createStatus}`);

            // Verify
            const { b: verify } = await req('GET', `/v9/projects/${PROJ_ID}/env?teamId=${TEAM}`);
            const supaVars = (verify?.envs || []).filter(e => Object.keys(VARS).includes(e.key));
            console.log('Verified vars:', supaVars.map(e => e.key).join(', '));

            console.log('\nDONE - siddhaquantumnexus.com now uses old Supabase');
            console.log('Vercel will auto-redeploy from the git push that triggered this workflow');
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF
