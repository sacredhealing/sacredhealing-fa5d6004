name: Deploy Bhrigu Oracle (New Supabase)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy bhrigu-oracle to new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy bhrigu-oracle \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: false

      - name: Deploy ayurveda-chat to new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy ayurveda-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: true

      - name: Confirm
        run: echo "✓ bhrigu-oracle deployed to fjdzhrdpioxdeyyfogep"
