name: Deploy Bhrigu Oracle (Both Projects)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy bhrigu-oracle to Lovable Supabase (working key)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy bhrigu-oracle \
            --project-ref ssygukfdbtehvtndandn \
            --no-verify-jwt 2>&1
          echo "Exit: $?"

      - name: Deploy bhrigu-oracle to new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy bhrigu-oracle \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
          echo "Exit: $?"
        continue-on-error: true

      - name: Confirm
        run: echo "bhrigu-oracle deployed to both projects"
