name: Deploy Shreem Brzee to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 > ~/.ssh/known_hosts 2>/dev/null
          echo "Host key lines: $(wc -l < ~/.ssh/known_hosts)"

      - name: Write bootstrap script
        run: |
          echo "" | base64 -d > /tmp/shreem-bootstrap.sh
          chmod +x /tmp/shreem-bootstrap.sh
          echo "Bootstrap: $(wc -c < /tmp/shreem-bootstrap.sh) bytes"

      - name: Upload script to Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" = "deploy" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              'cat > /root/shreem-bootstrap.sh && chmod +x /root/shreem-bootstrap.sh && echo "Script uploaded: $(wc -c < /root/shreem-bootstrap.sh) bytes"' \
              < /tmp/shreem-bootstrap.sh
          else
            echo "Action=$ACTION — skipping upload"
          fi

      - name: Execute on Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" = "status" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "pm2 list && pm2 logs shreem-brzee --lines 30 --nostream 2>/dev/null || true"
          elif [ "$ACTION" = "restart" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "pm2 restart shreem-brzee --update-env && pm2 logs shreem-brzee --lines 15 --nostream 2>/dev/null"
          elif [ "$ACTION" = "logs" ]; then
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "pm2 logs shreem-brzee --lines 50 --nostream 2>/dev/null"
          else
            sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
              "bash /root/shreem-bootstrap.sh '$GH_TOKEN' 2>&1"
          fi
