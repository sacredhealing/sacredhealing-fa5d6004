name: Apply Shreem Brzee SQL Tables

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run shreem_brzee_signals on Lovable Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Creating shreem_brzee_signals on ssygukfdbtehvtndandn..."
          supabase db execute \
            --project-ref ssygukfdbtehvtndandn \
            --file supabase/migrations/20260609_shreem_brzee_signals.sql 2>&1
          echo ""

      - name: Run shreem_brzee_server tables on Lovable Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Creating shreem_brzee_session + shreem_brzee_paper_trades..."
          supabase db execute \
            --project-ref ssygukfdbtehvtndandn \
            --file supabase/migrations/20260611_shreem_brzee_server.sql 2>&1
          echo ""
          echo "=== SHREEM TABLES READY ON LIVE PROJECT ==="
