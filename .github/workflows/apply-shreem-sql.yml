name: Apply Shreem Brzee SQL Tables

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create shreem_brzee_signals
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute \
            --project-ref ssygukfdbtehvtndandn \
            --file supabase/migrations/20260609_shreem_brzee_signals.sql 2>&1
          echo "shreem_brzee_signals done"

      - name: Create shreem_brzee_session + paper_trades
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute \
            --project-ref ssygukfdbtehvtndandn \
            --file supabase/migrations/20260611_shreem_brzee_server.sql 2>&1
          echo "session + paper_trades done"

      - name: Confirm
        run: echo "✅ All Shreem Brzee tables created on ssygukfdbtehvtndandn"
