name: Deploy social-post — Lovable Only

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/social-post/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy social-post to Lovable (ssygukfd)
        env:
          SUPABASE_ACCESS_TOKEN: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        run: |
          set +e
          supabase functions deploy social-post --project-ref ssygukfdbtehvtndandn --no-verify-jwt > _social_post_deploy_log.txt 2>&1
          EXIT=$?
          echo "EXIT CODE: $EXIT" >> _social_post_deploy_log.txt
          cat _social_post_deploy_log.txt
          git config user.email "bot@sqi.app"
          git config user.name "SQI Deploy Bot"
          git add _social_post_deploy_log.txt
          git commit -m "social-post deploy log $(date -u +%Y-%m-%dT%H:%M)" || true
          git push "https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git" HEAD:main || true
          exit $EXIT
