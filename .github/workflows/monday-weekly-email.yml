name: SQI - Monday Weekly Update Email

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  send-monday-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger weekly-alignment-email
        env:
          SUPABASE_URL: ${{ secrets.LOVABLE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.LOVABLE_SUPABASE_ANON_KEY }}
        run: |
          echo "SQI Monday Transmission at $(date -u)"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/functions/v1/weekly-alignment-email" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{}" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::weekly-alignment-email returned HTTP $HTTP_CODE — email NOT sent."
            exit 1
          fi

          if echo "$BODY" | grep -qi '"error"'; then
            echo "::error::weekly-alignment-email returned 2xx but body contains an error field — email NOT sent."
            exit 1
          fi

          if echo "$BODY" | grep -qi '"skipped"[[:space:]]*:[[:space:]]*true'; then
            echo "No new content_changelog entries this week — intentional no-filler skip, not a failure."
            exit 0
          fi

          if echo "$BODY" | grep -qiE '"sent"[[:space:]]*:[[:space:]]*0|"recipients"[[:space:]]*:[[:space:]]*0'; then
            echo "::error::weekly-alignment-email reported 0 recipients/sent with no skip reason — likely broken."
            exit 1
          fi
