name: Cleanup Vercel Duplicate Projects

on:
  push:
    paths:
      - '.github/workflows/cleanup-vercel-duplicates.yml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete duplicate Vercel projects + verify production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TEAM="team_THcLSD2kAlHV2GE4ZCo76gZU"
          PROD_ID="prj_amxl4zjH9ZvIJAGCbUV1rjmo9j9c"
          
          echo "=== Listing all projects ==="
          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects?teamId=${TEAM}&limit=20" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          echo "$PROJECTS" | python3 -c "
import json,sys
data=json.load(sys.stdin)
for p in data.get('projects',[]):
    prod = ' <-- PRODUCTION (keep)' if p['id']=='prj_amxl4zjH9ZvIJAGCbUV1rjmo9j9c' else ' <-- DUPLICATE (delete)'
    print(f\"  {p['name']} | {p['id']}{prod}\")
"
          
          echo ""
          echo "=== Deleting duplicates ==="
          # Get all project IDs except production
          DUPLICATE_IDS=$(echo "$PROJECTS" | python3 -c "
import json,sys
data=json.load(sys.stdin)
prod='prj_amxl4zjH9ZvIJAGCbUV1rjmo9j9c'
for p in data.get('projects',[]):
    if p['id'] != prod and 'sacredhealing-fa5d6004' in p['name']:
        print(p['id'])
")
          
          for PID in $DUPLICATE_IDS; do
            echo "Deleting project: $PID"
            RESULT=$(curl -s -X DELETE "https://api.vercel.com/v9/projects/${PID}?teamId=${TEAM}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}")
            echo "Result: $RESULT"
          done
          
          echo ""
          echo "=== Verifying production project still exists ==="
          PROD_CHECK=$(curl -s "https://api.vercel.com/v9/projects/${PROD_ID}?teamId=${TEAM}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          echo "$PROD_CHECK" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(f\"Production: {d.get('name')} | {d.get('id')} | domains: {[dom.get('name') for dom in d.get('alias',[])[:3]]}\")
"
          
          echo ""
          echo "=== Triggering fresh production deploy ==="
          DEPLOY=$(curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${TEAM}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"sacredhealing-fa5d6004-adb1","gitSource":{"type":"github","repoId":"sacredhealing/sacredhealing-fa5d6004","ref":"main"}}')
          echo "$DEPLOY" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(f\"Deploy: {d.get('url','?')} | state: {d.get('readyState','?')}\")
" 2>/dev/null || echo "Deploy triggered"
          
          echo "Done. Only production project remains."
