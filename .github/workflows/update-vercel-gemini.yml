name: Update Vercel GEMINI Key
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/update-vercel-gemini.yml

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update Gemini key in Vercel
        run: |
          node -e "
          const https = require('https');
          const TOKEN = process.env.VERCEL_TOKEN;
          const KEY = process.env.GEMINI_KEY;
          function api(method, path, body) {
            return new Promise(resolve => {
              const payload = body ? JSON.stringify(body) : '';
              const opts = {
                hostname: 'api.vercel.com', path, method,
                headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
              };
              const req = https.request(opts, res => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch { resolve(d); } });
              });
              req.on('error', e => resolve({}));
              if (payload) req.write(payload);
              req.end();
            });
          }
          async function main() {
            const data = await api('GET', '/v9/projects?limit=20', null);
            const projects = data.projects || [];
            console.log('Found', projects.length, 'projects');
            for (const p of projects) {
              console.log('Project:', p.name, p.id);
              const envData = await api('GET', '/v9/projects/' + p.id + '/env', null);
              for (const e of (envData.envs || [])) {
                if (['VITE_GEMINI_API_KEY','S_GEMINI'].includes(e.key)) {
                  await api('DELETE', '/v9/projects/' + p.id + '/env/' + e.id, null);
                  console.log('  Deleted', e.key);
                }
              }
              const r = await api('POST', '/v9/projects/' + p.id + '/env', [
                {key:'VITE_GEMINI_API_KEY',value:KEY,type:'plain',target:['production','preview','development']},
                {key:'S_GEMINI',value:KEY,type:'plain',target:['production','preview','development']}
              ]);
              console.log('  Set:', JSON.stringify(r).slice(0,80));
            }
          }
          main().catch(console.error);
          "
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
