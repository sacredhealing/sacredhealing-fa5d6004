name: Update Vercel GEMINI Key
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update VITE_GEMINI_API_KEY in all Vercel projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Get all projects
          PROJECTS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=20" | python3 -c "
import json,sys
data=json.load(sys.stdin)
for p in data.get('projects',[]):
    print(p['id'], p['name'])
")
          echo "Projects: $PROJECTS"
          
          # For each project, update/create VITE_GEMINI_API_KEY
          while IFS= read -r line; do
            PID=$(echo $line | cut -d' ' -f1)
            PNAME=$(echo $line | cut -d' ' -f2)
            echo "=== $PNAME ($PID) ==="
            
            # Get existing env vars
            ENVS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$PID/env")
            
            # Delete existing VITE_GEMINI_API_KEY and S_GEMINI if present
            for KEY_NAME in "VITE_GEMINI_API_KEY" "S_GEMINI"; do
              ENV_ID=$(echo $ENVS | python3 -c "
import json,sys
data=json.load(sys.stdin)
for e in data.get('envs',[]):
    if e['key']=='$KEY_NAME':
        print(e['id'])
        break
" 2>/dev/null)
              if [ -n "$ENV_ID" ]; then
                curl -s -X DELETE -H "Authorization: Bearer $VERCEL_TOKEN" \
                  "https://api.vercel.com/v9/projects/$PID/env/$ENV_ID" > /dev/null
                echo "Deleted $KEY_NAME ($ENV_ID)"
              fi
            done
            
            # Create new VITE_GEMINI_API_KEY for all environments
            RESULT=$(curl -s -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v9/projects/$PID/env" \
              -d "[
                {\"key\":\"VITE_GEMINI_API_KEY\",\"value\":\"$GEMINI_API_KEY\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]},
                {\"key\":\"S_GEMINI\",\"value\":\"$GEMINI_API_KEY\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}
              ]")
            echo "Set result: $(echo $RESULT | head -c 100)"
          done <<< "$PROJECTS"
          echo "Done"
