name: Update Vercel GEMINI Key
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/update-vercel-gemini.yml

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Set Gemini key in all Vercel projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Fetching Vercel projects..."
          PROJECTS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects?limit=20")
          echo "Projects: $(echo $PROJECTS | python3 -c "import json,sys; print([p['name'] for p in json.load(sys.stdin).get('projects',[])])")"
          
          for PID in $(echo $PROJECTS | python3 -c "import json,sys; [print(p['id']) for p in json.load(sys.stdin).get('projects',[])]"); do
            echo "=== Project: $PID ==="
            ENVS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$PID/env")
            
            # Delete old Gemini keys
            for EID in $(echo $ENVS | python3 -c "
import json,sys
data=json.load(sys.stdin)
for e in data.get('envs',[]):
    if e['key'] in ['VITE_GEMINI_API_KEY','S_GEMINI']:
        print(e['id'])
" 2>/dev/null); do
              curl -s -X DELETE -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$PID/env/$EID"
              echo "Deleted env $EID"
            done
            
            # Set new keys
            RESULT=$(curl -s -X POST               -H "Authorization: Bearer $VERCEL_TOKEN"               -H "Content-Type: application/json"               "https://api.vercel.com/v9/projects/$PID/env"               -d '[{"key":"VITE_GEMINI_API_KEY","value":"'$GEMINI_KEY'","type":"plain","target":["production","preview","development"]},{"key":"S_GEMINI","value":"'$GEMINI_KEY'","type":"plain","target":["production","preview","development"]}]')
            echo "Set result: $(echo $RESULT | head -c 120)"
          done
          echo "All projects updated"
