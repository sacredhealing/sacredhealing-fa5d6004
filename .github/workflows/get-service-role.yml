name: Get Service Role Key
on:
  workflow_dispatch:
jobs:
  get-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and store service_role key
        env:
          SUPA_PAT: ${{ secrets.SUPA_ADMIN_PAT }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: bash scripts/get_service_role.sh
