name: Shreem Hetzner SSH Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/shreem_ssh_deploy.py'
      - 'railway/shreem-brzee-bot/src/index.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install paramiko
        run: pip install paramiko --break-system-packages -q
      - name: SSH deploy to Hetzner
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: python3 scripts/shreem_ssh_deploy.py
