name: Shreem Hetzner SSH Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install paramiko and deploy via Python SSH
        env:
          HP: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          pip install paramiko --quiet

          python3 << 'PYSSH'
          import paramiko, os, time, sys

          HOST = "178.105.183.74"
          USER = "root"
          PASS = os.environ["HP"]
          GH_TOKEN = os.environ["GH"]

          SCRIPT = f"""
          set -e
          echo "═══════════════════════════════════════"
          echo "  SHREEM BRZEE — Hetzner Deploy"
          echo "═══════════════════════════════════════"

          node -v && npm -v

          REPO="/root/shreem-brzee"
          GH_TOKEN="{GH_TOKEN}"

          if [ ! -d "$REPO/.git" ]; then
            echo "Cloning..."
            git clone "https://x-access-token:${{GH_TOKEN}}@github.com/sacredhealing/sacredhealing-fa5d6004.git" "$REPO" --depth=1 --quiet
          else
            echo "Pulling latest..."
            cd "$REPO"
            git remote set-url origin "https://x-access-token:${{GH_TOKEN}}@github.com/sacredhealing/sacredhealing-fa5d6004.git"
            git fetch origin main --quiet && git reset --hard origin/main --quiet
          fi

          cd "$REPO/railway/shreem-brzee-bot"
          echo "Dir: $(pwd)"
          ls -la

          npm install --omit=dev --silent 2>&1 | tail -3
          echo "npm done"

          npx tsc --skipLibCheck 2>&1 || echo "tsc warnings (continuing)"

          ls dist/ 2>/dev/null && echo "dist/ ready" || echo "ERROR: no dist/"

          if pm2 describe shreem-brzee > /dev/null 2>&1; then
            pm2 restart shreem-brzee --update-env
            echo "RESTARTED shreem-brzee"
          else
            pm2 start dist/index.js --name shreem-brzee
            echo "STARTED shreem-brzee"
          fi
          pm2 save --force > /dev/null

          sleep 4
          pm2 list
          echo ""
          echo "=== LOGS ==="
          pm2 logs shreem-brzee --lines 25 --nostream 2>/dev/null || true
          echo ""
          echo "=== CLAWBOT untouched ==="
          pm2 describe clawbot 2>/dev/null | grep -E "status|name|restart" | head -3 || true
          echo "═══════════════════════════════════════"
          echo "DEPLOY COMPLETE"
          """

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          print(f"Connecting to {HOST}...")
          client.connect(HOST, username=USER, password=PASS, timeout=30)
          print("Connected. Running deploy...")

          stdin, stdout, stderr = client.exec_command(SCRIPT, timeout=600)

          # Stream output
          for line in stdout:
              print(line, end="")
          for line in stderr:
              print("ERR:", line, end="")

          exit_code = stdout.channel.recv_exit_status()
          client.close()
          print(f"\nExit code: {exit_code}")
          if exit_code != 0:
              sys.exit(exit_code)
          PYSSH
