name: Apply Airdrop Farming Tables

on:
  push:
    paths:
      - '.github/workflows/apply-airdrop-farming-tables.yml'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Create tables via Supabase Management API
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PAT2: ${{ secrets.SUPA_ADMIN_PAT }}
          PAT3: ${{ secrets.SUPABASE_PAT }}
          PAT4: ${{ secrets.SUPABASE_TOKEN }}
        run: |
          node << 'NODEEOF'
          const https = require('https');
          const REF = 'ssygukfdbtehvtndandn';
          const tokens = [process.env.PAT, process.env.PAT2, process.env.PAT3, process.env.PAT4].filter(Boolean);
          const query = "-- Airdrop Farming Tracker \u2014 per-user weekly log, synced across devices.\n\nCREATE TABLE IF NOT EXISTS airdrop_farming_entries (\n  id          uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id     uuid REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,\n  protocol_id text NOT NULL,\n  week_key    text NOT NULL,\n  note        text,\n  created_at  timestamptz NOT NULL DEFAULT now(),\n  UNIQUE (user_id, protocol_id, week_key)\n);\n\nCREATE TABLE IF NOT EXISTS airdrop_farming_hygiene (\n  id          uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id     uuid REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,\n  week_key    text NOT NULL,\n  item        text NOT NULL,\n  checked     boolean NOT NULL DEFAULT true,\n  updated_at  timestamptz NOT NULL DEFAULT now(),\n  UNIQUE (user_id, week_key, item)\n);\n\nALTER TABLE airdrop_farming_entries ENABLE ROW LEVEL SECURITY;\nALTER TABLE airdrop_farming_hygiene ENABLE ROW LEVEL SECURITY;\n\nDO $$ BEGIN\n  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='airdrop_farming_entries' AND policyname='Users own airdrop_farming_entries') THEN\n    CREATE POLICY \"Users own airdrop_farming_entries\" ON airdrop_farming_entries FOR ALL USING (auth.uid() = user_id) WITH CHECK (auth.uid() = user_id);\n  END IF;\n  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='airdrop_farming_hygiene' AND policyname='Users own airdrop_farming_hygiene') THEN\n    CREATE POLICY \"Users own airdrop_farming_hygiene\" ON airdrop_farming_hygiene FOR ALL USING (auth.uid() = user_id) WITH CHECK (auth.uid() = user_id);\n  END IF;\nEND $$;\n\nGRANT ALL ON airdrop_farming_entries TO authenticated;\nGRANT ALL ON airdrop_farming_hygiene TO authenticated;\n";

          function sql(token, q) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ query: q });
              const req = https.request(
                {
                  hostname: 'api.supabase.com',
                  path: `/v1/projects/${REF}/database/query`,
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(body),
                  },
                },
                (resp) => {
                  let d = '';
                  resp.on('data', (c) => (d += c));
                  resp.on('end', () => resolve({ status: resp.statusCode, body: d }));
                }
              );
              req.on('error', (e) => resolve({ status: 0, body: String(e.message) }));
              req.write(body);
              req.end();
            });
          }

          (async () => {
            for (const token of tokens) {
              const r = await sql(token, query);
              console.log('Attempt status:', r.status, r.body.slice(0, 300));
              if (r.status && r.status < 400) {
                console.log('=== Airdrop farming tables migration complete ===');
                return;
              }
            }
            console.log('=== All token attempts failed ===');
          })();
          NODEEOF

      - name: Verify tables exist
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PAT2: ${{ secrets.SUPA_ADMIN_PAT }}
          PAT3: ${{ secrets.SUPABASE_PAT }}
          PAT4: ${{ secrets.SUPABASE_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          node << 'NODEEOF'
          const https = require('https');
          const fs = require('fs');
          const REF = 'ssygukfdbtehvtndandn';
          const query = "SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('airdrop_farming_entries','airdrop_farming_hygiene');";
          const tokens = {
            SUPABASE_ACCESS_TOKEN: process.env.PAT,
            SUPA_ADMIN_PAT: process.env.PAT2,
            SUPABASE_PAT: process.env.PAT3,
            SUPABASE_TOKEN: process.env.PAT4,
          };

          function sql(token, q) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ query: q });
              const req = https.request(
                {
                  hostname: 'api.supabase.com',
                  path: `/v1/projects/${REF}/database/query`,
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(body),
                  },
                },
                (resp) => {
                  let d = '';
                  resp.on('data', (c) => (d += c));
                  resp.on('end', () => resolve({status: resp.statusCode, body: d}));
                }
              );
              req.on('error', (e) => resolve({status: 0, body: String(e.message)}));
              req.write(body);
              req.end();
            });
          }

          (async () => {
            let out = `=== ${new Date().toISOString()} ===\n`;
            for (const [name, token] of Object.entries(tokens)) {
              if (!token) { out += `${name}: (not set)\n`; continue; }
              const r = await sql(token, query);
              out += `${name}: status=${r.status} body=${r.body}\n`;
            }
            fs.writeFileSync('_airdrop_verify_result.txt', out);
          })();
          NODEEOF

      - name: Commit verification result
        env:
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _airdrop_verify_result.txt
          git commit -m "Airdrop farming tables verification result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" HEAD:main || true
