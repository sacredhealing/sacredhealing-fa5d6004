name: Check Wallets via CLI

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check wallets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          npm install -g supabase@1.200.3 2>&1 | tail -2
          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo
          cd repo
          supabase link --project-ref fjdzhrdpioxdeyyfogep 2>&1
          
          echo "=== CLAWBOT wallet ===" | tee _wallets_result.txt
          echo "SELECT platform_wallet FROM clawbot_platform_config WHERE id=1;" | supabase db query --linked 2>&1 | tee -a _wallets_result.txt
          
          echo "=== DELTA ARB wallet ===" | tee -a _wallets_result.txt
          echo "SELECT platform_wallet FROM delta_arb_platform_config WHERE id=1;" | supabase db query --linked 2>&1 | tee -a _wallets_result.txt
          
          cat _wallets_result.txt
          
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _wallets_result.txt
          git commit -m "ci: wallet check" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
