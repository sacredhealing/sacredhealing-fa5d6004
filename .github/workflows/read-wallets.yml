name: Check Both Wallets Final

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Query via service role REST
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SK2: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          LOG="_wallets_result.txt"
          
          # Try service key
          KEY="${SK:-$SK2}"
          
          echo "=== CLAWBOT platform_wallet ===" > $LOG
          curl -s "${BASE}/clawbot_platform_config?select=platform_wallet&id=eq.1"             -H "apikey: ${KEY}"             -H "Authorization: Bearer ${KEY}" >> $LOG
          
          echo "" >> $LOG
          echo "=== DELTA_ARB platform_wallet ===" >> $LOG
          curl -s "${BASE}/delta_arb_platform_config?select=platform_wallet&id=eq.1"             -H "apikey: ${KEY}"             -H "Authorization: Bearer ${KEY}" >> $LOG
          
          cat $LOG
          
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add $LOG
          git commit -m "ci: wallet check result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
