name: Diagnose Polymarket Tables

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Test PAT access + table existence
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT="fjdzhrdpioxdeyyfogep"
          URL="https://fjdzhrdpioxdeyyfogep.supabase.co"

          echo "=== 1. List tables via Management API (PAT) ==="
          http=$(curl -s -o /tmp/r.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${SUPABASE_PAT}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT table_name FROM information_schema.tables WHERE table_schema='"'"'public'"'"' ORDER BY table_name;"}' \
            "https://api.supabase.com/v1/projects/${PROJECT}/database/query")
          echo "HTTP $http"
          cat /tmp/r.json | python3 -c "import json,sys; d=json.load(sys.stdin); [print(' -', row.get('table_name','?')) for row in d] if isinstance(d,list) else print(d)"

          echo ""
          echo "=== 2. Test polymarket_bot_settings row ==="
          http2=$(curl -s -o /tmp/r2.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${SUPABASE_PAT}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT paper_balance, paper_mode, risk_pct FROM polymarket_bot_settings LIMIT 1;"}' \
            "https://api.supabase.com/v1/projects/${PROJECT}/database/query")
          echo "HTTP $http2: $(cat /tmp/r2.json)"

          echo ""
          echo "=== 3. Test NEW_SERVICE_ROLE key against REST API ==="
          # We can't read the secret value but we can test it indirectly via a workflow
          # This step confirms if tables are reachable at all
          echo "Tables confirmed via PAT. Service role key must be fetched from Supabase dashboard."
          echo "URL: https://supabase.com/dashboard/project/${PROJECT}/settings/api"
