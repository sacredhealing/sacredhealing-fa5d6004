name: Migrate Auth Users to New Supabase

on:
  workflow_dispatch:

jobs:
  migrate-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Migrate auth users and switch Vercel
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install bcryptjs
          node scripts/migrate-auth-and-switch.mjs
