name: Fix All Shreem — Edge Deploy Only

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy shreem-helius-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy shreem-helius-webhook --project-ref ssygukfdbtehvtndandn --no-verify-jwt
          echo "✅ shreem-helius-webhook deployed"

      - name: Deploy shreem-live-executor
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy shreem-live-executor --project-ref ssygukfdbtehvtndandn --no-verify-jwt
          echo "✅ shreem-live-executor deployed"
