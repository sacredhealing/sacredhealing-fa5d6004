name: Set Secrets Now

on:
  workflow_dispatch:

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set secrets in new Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          S_GEMINI: ${{ secrets.S_GEMINI }}
          S_RESEND: ${{ secrets.S_RESEND }}
          S_STRIPE_WEBHOOK: ${{ secrets.S_STRIPE_WEBHOOK }}
          S_STRIPE_SECRET: ${{ secrets.S_STRIPE_SECRET }}
        run: node scripts/set-secrets-now.mjs
