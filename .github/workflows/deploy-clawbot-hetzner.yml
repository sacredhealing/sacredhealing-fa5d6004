name: Deploy CLAWBOT to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ssh tools
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H 178.105.183.74 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy bootstrap script to Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          chmod +x polymarket-worker/scripts/hetzner-bootstrap.sh
          sshpass -p "$HETZNER_PASS" scp -o StrictHostKeyChecking=no \
            polymarket-worker/scripts/hetzner-bootstrap.sh \
            root@178.105.183.74:/root/hetzner-bootstrap.sh

      - name: Run bootstrap on Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          sshpass -p "$HETZNER_PASS" ssh -o StrictHostKeyChecking=no \
            root@178.105.183.74 \
            "chmod +x /root/hetzner-bootstrap.sh && bash /root/hetzner-bootstrap.sh '$GH_TOKEN'"
