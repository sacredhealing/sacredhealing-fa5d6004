name: Deploy CLAWBOT to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 > ~/.ssh/known_hosts 2>/dev/null
          echo "Host key lines: $(wc -l < ~/.ssh/known_hosts)"

      - name: Write bootstrap script from repo content
        run: |
          echo '' | base64 -d > /tmp/hetzner-bootstrap.sh
          chmod +x /tmp/hetzner-bootstrap.sh
          echo "Bootstrap size: $(wc -c < /tmp/hetzner-bootstrap.sh) bytes"
          head -3 /tmp/hetzner-bootstrap.sh

      - name: Upload script to Hetzner via SSH
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
            'cat > /root/hetzner-bootstrap.sh && chmod +x /root/hetzner-bootstrap.sh && echo "Script uploaded: $(wc -c < /root/hetzner-bootstrap.sh) bytes"' \
            < /tmp/hetzner-bootstrap.sh

      - name: Execute bootstrap on Hetzner
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
          GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
        run: |
          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 \
            "bash /root/hetzner-bootstrap.sh '$GH_TOKEN' 2>&1"
