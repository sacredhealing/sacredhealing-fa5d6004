name: Deploy CLAWBOT to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy | restart | status | logs'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - status
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      HETZNER_IP: 178.105.183.74
      HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
      GH_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass + setup known_hosts
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H "$HETZNER_IP" > ~/.ssh/known_hosts 2>/dev/null
          cat ~/.ssh/known_hosts | wc -l
          echo "Host key captured"

      - name: Upload bootstrap script via SSH pipe
        run: |
          sshpass -p "$HETZNER_PASS" ssh \
            -o StrictHostKeyChecking=yes \
            -o PasswordAuthentication=yes \
            -o PubkeyAuthentication=no \
            root@$HETZNER_IP \
            "mkdir -p /root && cat > /root/hetzner-bootstrap.sh && chmod +x /root/hetzner-bootstrap.sh && echo 'Script uploaded OK'" \
            < polymarket-worker/scripts/hetzner-bootstrap.sh

      - name: Execute bootstrap on Hetzner
        run: |
          sshpass -p "$HETZNER_PASS" ssh \
            -o StrictHostKeyChecking=yes \
            -o PasswordAuthentication=yes \
            -o PubkeyAuthentication=no \
            root@$HETZNER_IP \
            "bash /root/hetzner-bootstrap.sh '$GH_TOKEN' 2>&1"
