name: Reset Admin Password

on:
  push:
    paths:
      - '.github/workflows/reset-password.yml'

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset password and verify account
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          SVC="${{ secrets.NEW_SERVICE_ROLE }}"
          UUID="bd0b21c9-577a-450b-bb1e-21c9d0423f17"
          NEW_PASS="SiddhaAdmin2026"

          echo "=== List all users first ==="
          USERS=$(curl -s "$BASE/auth/v1/admin/users?per_page=100" \
            -H "apikey: $SVC" -H "Authorization: Bearer $SVC")
          echo "$USERS"

          echo ""
          echo "=== Reset password to $NEW_PASS ==="
          RESULT=$(curl -s -X PUT "$BASE/auth/v1/admin/users/$UUID" \
            -H "apikey: $SVC" \
            -H "Authorization: Bearer $SVC" \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"$NEW_PASS\",\"email_confirm\":true,\"ban_duration\":\"none\"}")
          echo "$RESULT"

          echo ""
          echo "=== Test login with new password ==="
          LOGIN=$(curl -s -X POST "$BASE/auth/v1/token?grant_type=password" \
            -H "apikey: $SVC" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"sacredhealingvibe@gmail.com\",\"password\":\"$NEW_PASS\"}")
          echo "Login status: $(echo $LOGIN | grep -o '\"access_token\"' | head -1)"
          echo "Error: $(echo $LOGIN | grep -o '\"error_description\":\"[^\"]*\"' | head -1)"
