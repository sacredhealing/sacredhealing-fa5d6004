name: Fix Railway SSL - CLAWBOT Domain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Fix Railway SSL for clawbot.siddhaquantumnexus.com
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_railway_ssl_fix.txt"
          echo "=== Railway SSL Fix $(date -u) ===" > $LOG

          SERVICE_ID="b6311e53-fe5a-4c4a-b724-e0fef686236f"
          DOMAIN="clawbot.siddhaquantumnexus.com"

          echo "" >> $LOG
          echo "--- Step 1: List current domains ---" >> $LOG
          DOMAINS_RESP=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ service(id: \\\"${SERVICE_ID}\\\") { id name domains { edges { node { id domain status createdAt } } } } }\"}")
          echo "$DOMAINS_RESP" >> $LOG

          TARGET_ID=$(echo "$DOMAINS_RESP" | python3 -c "
import sys, json
try:
  d = json.load(sys.stdin)
  edges = d.get('data',{}).get('service',{}).get('domains',{}).get('edges',[])
  for e in edges:
    node = e['node']
    print('Found domain: ' + node['domain'] + ' status: ' + str(node.get('status','?')))
    if 'clawbot' in node['domain']:
      print('TARGET_ID=' + node['id'])
except Exception as ex:
  print('PARSE_ERROR: ' + str(ex))
" 2>&1)
          echo "$TARGET_ID" >> $LOG
          REAL_TARGET=$(echo "$TARGET_ID" | grep "^TARGET_ID=" | cut -d= -f2 | tr -d '[:space:]')
          echo "Extracted ID: [$REAL_TARGET]" >> $LOG

          if [ -n "$REAL_TARGET" ]; then
            echo "" >> $LOG
            echo "--- Step 2: Delete domain $REAL_TARGET ---" >> $LOG
            DELETE_RESP=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { customDomainDelete(id: \\\"${REAL_TARGET}\\\") }\"}")
            echo "$DELETE_RESP" >> $LOG
            sleep 8
          else
            echo "No existing domain to delete - adding fresh" >> $LOG
          fi

          echo "" >> $LOG
          echo "--- Step 3: Re-add domain ---" >> $LOG
          ADD_RESP=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { customDomainCreate(input: { serviceId: \\\"${SERVICE_ID}\\\", domain: \\\"${DOMAIN}\\\" }) { id domain status } }\"}")
          echo "$ADD_RESP" >> $LOG

          echo "" >> $LOG
          echo "--- Step 4: Wait 45s for SSL provisioning ---" >> $LOG
          sleep 45

          echo "" >> $LOG
          echo "--- Step 5: Final domain list ---" >> $LOG
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ service(id: \\\"${SERVICE_ID}\\\") { domains { edges { node { id domain status } } } } }\"}" >> $LOG

          echo "" >> $LOG
          echo "--- Step 6: Direct Railway URL health test ---" >> $LOG
          curl -s --max-time 15 "https://siddha-soma-apothecary-production.up.railway.app/health" >> $LOG 2>&1 || echo "Direct URL: FAIL" >> $LOG

          echo "" >> $LOG
          echo "--- Step 7: Custom domain health test ---" >> $LOG
          curl -sk --max-time 20 "https://${DOMAIN}/health" >> $LOG 2>&1 || echo "Custom domain: SSL may need 5-10 more min" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add $LOG
          git commit -m "CLAWBOT SSL fix $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
