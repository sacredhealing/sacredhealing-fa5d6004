name: Fix Railway SSL - CLAWBOT Domain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Fix Railway SSL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          python3 - <<'PYSC'
import urllib.request, json, time, subprocess, os

token = os.environ['RAILWAY_TOKEN']
gh_pat = os.environ['GH_PAT']
SERVICE_ID = "b6311e53-fe5a-4c4a-b724-e0fef686236f"
DOMAIN = "clawbot.siddhaquantumnexus.com"
LOG = []

def gql(query):
    data = json.dumps({"query": query}).encode()
    req = urllib.request.Request(
        "https://backboard.railway.app/graphql/v2",
        data=data,
        headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
    )
    resp = urllib.request.urlopen(req, timeout=15)
    return json.loads(resp.read())

def log(msg):
    print(msg)
    LOG.append(msg)

log("=== CLAWBOT SSL Fix ===")

# Step 1: List domains
log("Step 1: Listing domains...")
r = gql(f'{{ service(id: "{SERVICE_ID}") {{ id name domains {{ edges {{ node {{ id domain status }} }} }} }} }}')
log(json.dumps(r, indent=2))

edges = r.get("data",{}).get("service",{}).get("domains",{}).get("edges",[])
target_id = None
for e in edges:
    node = e["node"]
    log(f"  Domain: {node['domain']} | Status: {node.get('status','?')} | ID: {node['id']}")
    if "clawbot" in node["domain"]:
        target_id = node["id"]

# Step 2: Delete if exists
if target_id:
    log(f"Step 2: Deleting domain {target_id}...")
    r2 = gql(f'mutation {{ customDomainDelete(id: "{target_id}") }}')
    log(json.dumps(r2))
    time.sleep(8)
else:
    log("Step 2: No existing domain - will add fresh")

# Step 3: Add domain
log("Step 3: Adding domain...")
r3 = gql(f'mutation {{ customDomainCreate(input: {{ serviceId: "{SERVICE_ID}", domain: "{DOMAIN}" }}) {{ id domain status }} }}')
log(json.dumps(r3))

# Step 4: Wait
log("Step 4: Waiting 30s for SSL...")
time.sleep(30)

# Step 5: Final status
log("Step 5: Final status check...")
r4 = gql(f'{{ service(id: "{SERVICE_ID}") {{ domains {{ edges {{ node {{ id domain status }} }} }} }} }}')
log(json.dumps(r4, indent=2))

# Step 6: Health check
log("Step 6: Health checks...")
for url in [
    "https://siddha-soma-apothecary-production.up.railway.app/health",
    f"https://{DOMAIN}/health"
]:
    try:
        req = urllib.request.Request(url, headers={"User-Agent": "SQI-Bot"})
        resp = urllib.request.urlopen(req, timeout=15)
        log(f"  {url} -> {resp.status} {resp.read().decode()[:200]}")
    except Exception as e:
        log(f"  {url} -> ERROR: {e}")

# Write output
with open("_railway_ssl_fix.txt", "w") as f:
    f.write("\n".join(LOG))
PYSC

          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _railway_ssl_fix.txt
          git commit -m "CLAWBOT SSL fix result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
