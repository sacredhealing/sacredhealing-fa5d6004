name: Grant Polymarket Permissions

on:
  workflow_dispatch:

jobs:
  grant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: GRANT permissions via working PAT
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          LOG="_grant_log.txt"

          run_sql() {
            local q="$1"; local label="$2"
            echo "=== $label ===" | tee -a $LOG
            RESULT=$(curl -s -w "\nHTTP:%{http_code}" -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$q\"}")
            echo "$RESULT" | tee -a $LOG
            echo "" | tee -a $LOG
          }

          # Check current grants
          run_sql "SELECT grantee, table_name, privilege_type FROM information_schema.role_table_grants WHERE table_name IN ('polymarket_bot_settings','polymarket_trades') AND table_schema='public' ORDER BY grantee, table_name;" "Current grants"

          run_sql "SELECT rolname, rolsuper, rolbypassrls FROM pg_roles WHERE rolname IN ('service_role','anon','authenticated') ORDER BY rolname;" "Role info"

          # Apply grants
          run_sql "GRANT USAGE ON SCHEMA public TO service_role, anon, authenticated;" "Grant schema"
          run_sql "GRANT ALL ON public.polymarket_bot_settings TO service_role, anon, authenticated;" "Grant bot_settings"
          run_sql "GRANT ALL ON public.polymarket_trades TO service_role, anon, authenticated;" "Grant trades"
          run_sql "GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO service_role, anon, authenticated;" "Grant sequences"

          # Disable RLS to make it simple
          run_sql "ALTER TABLE public.polymarket_bot_settings DISABLE ROW LEVEL SECURITY;" "Disable RLS bot_settings"
          run_sql "ALTER TABLE public.polymarket_trades DISABLE ROW LEVEL SECURITY;" "Disable RLS trades"

          # Verify grants applied
          run_sql "SELECT grantee, table_name, privilege_type FROM information_schema.role_table_grants WHERE table_name IN ('polymarket_bot_settings','polymarket_trades') AND table_schema='public' ORDER BY grantee, table_name;" "Verify grants"

          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add $LOG
          git commit -m "Grant log $(date +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
