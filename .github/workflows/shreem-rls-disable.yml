name: Shreem — Disable RLS + Backfill with Anon Key

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/shreem-rls-disable.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Disable RLS on shreem tables via Supabase Management API
        env:
          SUPA_PAT: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        run: |
          SQL='-- Allow the backfill script (using anon key) to insert into shreem_brzee_signals\n-- This is safe because the table only contains public on-chain data (not user PII)\nALTER TABLE shreem_brzee_signals DISABLE ROW LEVEL SECURITY;\n\n-- Also ensure the shreem_brzee_session table allows anon access for the edge fn\nALTER TABLE shreem_brzee_session DISABLE ROW LEVEL SECURITY;\nALTER TABLE shreem_brzee_paper_trades DISABLE ROW LEVEL SECURITY;\n\n-- Confirm\nSELECT tablename, rowsecurity \nFROM pg_tables \nWHERE tablename IN ('shreem_brzee_signals','shreem_brzee_session','shreem_brzee_paper_trades');'
          
          echo "Disabling RLS on shreem tables..."
          RESULT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/ssygukfdbtehvtndandn/database/query" \
            -H "Authorization: Bearer ${SUPA_PAT}" \
            -H "Content-Type: application/json" \
            -d '{"query": "ALTER TABLE shreem_brzee_signals DISABLE ROW LEVEL SECURITY; ALTER TABLE shreem_brzee_session DISABLE ROW LEVEL SECURITY; ALTER TABLE shreem_brzee_paper_trades DISABLE ROW LEVEL SECURITY;"}')
          echo "RLS result: $RESULT"

      - name: Copy backfill script to Hetzner
        run: |
          sudo apt-get install -y sshpass 2>/dev/null
          sshpass -p "LiuCcqgARtAx" scp -o StrictHostKeyChecking=no \
            scripts/shreem_backfill.mjs root@178.105.183.74:/root/shreem_backfill.mjs
          echo "Script copied ✅"

      - name: Run backfill with ANON key (RLS now disabled)
        run: |
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWd1a2ZkYnRlaHZ0bmRhbmRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MDMxMDMsImV4cCI6MjA4MDE3OTEwM30.XXwg0F7kXR4-OFRu4A2RARfhbEXurwHp5HzMOMBAiy4"
          
          sshpass -p "LiuCcqgARtAx" ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 root@178.105.183.74 \
            "HELIUS_KEY=REMOVED_OLD_KEY SUPABASE_URL=https://ssygukfdbtehvtndandn.supabase.co SUPABASE_SERVICE_KEY=${ANON_KEY} node /root/shreem_backfill.mjs 2>&1" \
            | tee _backfill_result.txt
          
          echo "=== SUMMARY ==="
          grep -E "(🏆|inserted|swaps|DONE)" _backfill_result.txt | tail -30

      - name: Commit result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "bot@sqi.app"
          git config user.name "SQI Bot"
          git add _backfill_result.txt || true
          git commit -m "data: backfill RLS-disabled run $(date -u +%Y-%m-%d-%H%M)" || echo "nothing to commit"
          git push "https://x-access-token:${{GH_TOKEN}}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
