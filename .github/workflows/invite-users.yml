name: Invite All Users to New Supabase

on:
  workflow_dispatch:

jobs:
  invite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Create auth accounts and send invite emails
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/invite-users.mjs
