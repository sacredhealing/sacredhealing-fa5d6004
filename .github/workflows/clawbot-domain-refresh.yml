name: CLAWBOT Domain Refresh

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Refresh domain SSL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          python3 - <<'PYSC'
import urllib.request, json, time, os

token = os.environ['RAILWAY_TOKEN']
gh_pat = os.environ['GH_PAT']
SERVICE_ID = "b6311e53-fe5a-4c4a-b724-e0fef686236f"
DOMAIN = "clawbot.siddhaquantumnexus.com"
LOG = []

def gql(query):
    data = json.dumps({"query": query}).encode()
    req = urllib.request.Request(
        "https://backboard.railway.app/graphql/v2",
        data=data,
        headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
    )
    resp = urllib.request.urlopen(req, timeout=20)
    return json.loads(resp.read())

def log(msg):
    print(msg)
    LOG.append(str(msg))

log("=== CLAWBOT Domain Refresh ===")

r = gql(f'{{ service(id: "{SERVICE_ID}") {{ id name domains {{ edges {{ node {{ id domain status }} }} }} }} }}')
log(f"Domain query: {json.dumps(r)}")

edges = r.get("data",{}).get("service",{}).get("domains",{}).get("edges",[])
target_id = None
for e in edges:
    node = e["node"]
    log(f"  Found: {node['domain']} | {node.get('status')} | {node['id']}")
    if "clawbot" in node["domain"]:
        target_id = node["id"]

if target_id:
    log(f"Deleting {target_id}...")
    r2 = gql(f'mutation {{ customDomainDelete(id: "{target_id}") }}')
    log(f"Delete result: {json.dumps(r2)}")
    time.sleep(10)

log("Adding domain fresh...")
r3 = gql(f'mutation {{ customDomainCreate(input: {{ serviceId: "{SERVICE_ID}", domain: "{DOMAIN}" }}) {{ id domain status }} }}')
log(f"Add result: {json.dumps(r3)}")

time.sleep(30)

r4 = gql(f'{{ service(id: "{SERVICE_ID}") {{ domains {{ edges {{ node {{ id domain status }} }} }} }} }}')
log(f"Final status: {json.dumps(r4)}")

for url in [
    "https://siddha-soma-apothecary-production.up.railway.app/health",
    f"https://{DOMAIN}/health"
]:
    try:
        req = urllib.request.Request(url, headers={"User-Agent": "SQI"})
        resp = urllib.request.urlopen(req, timeout=15)
        log(f"HEALTH {url} -> {resp.status}: {resp.read().decode()[:100]}")
    except Exception as e:
        log(f"HEALTH {url} -> {type(e).__name__}: {e}")

with open("_clawbot_ssl_result.txt", "w") as f:
    f.write("\n".join(LOG))
print("Done")
PYSC

          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _clawbot_ssl_result.txt
          git commit -m "CLAWBOT domain refresh result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
