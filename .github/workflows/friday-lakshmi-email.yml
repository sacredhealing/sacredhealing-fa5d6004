name: SQI - Friday Lakshmi Email

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  send-friday-lakshmi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger lakshmi-friday
        env:
          SUPABASE_URL: ${{ secrets.LOVABLE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.LOVABLE_SUPABASE_ANON_KEY }}
        run: |
          echo "SQI Lakshmi Friday Transmission at $(date -u)"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/functions/v1/lakshmi-friday" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{}" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::lakshmi-friday returned HTTP $HTTP_CODE — email NOT sent."
            exit 1
          fi

          if echo "$BODY" | grep -qi '"error"'; then
            echo "::error::lakshmi-friday returned 2xx but body contains an error field — email NOT sent."
            echo "$BODY"
            exit 1
          fi

          if echo "$BODY" | grep -qiE '"sent"[[:space:]]*:[[:space:]]*0|"recipients"[[:space:]]*:[[:space:]]*0'; then
            echo "::error::lakshmi-friday reported 0 recipients/sent — check subscriber query."
            exit 1
          fi
