name: fix-rls-and-show-stats
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Show current stats + fix RLS
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          
          # Get stats with service key
          echo "=== CURRENT STATS ==="
          curl -s "$BASE/rest/v1/delta_arb_trades?select=status,pnl_usdc&order=created_at.desc" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" > /tmp/all_trades.json
          
          python3 << 'PYEOF'
import json, sys
with open('/tmp/all_trades.json') as f:
    trades = json.load(f)
won  = [t for t in trades if t['status'] == 'won']
lost = [t for t in trades if t['status'] == 'lost']
total_pnl = sum(float(t['pnl_usdc'] or 0) for t in trades)
bal = 100 + total_pnl
print(f"TOTAL TRADES: {len(trades)}")
print(f"WINS: {len(won)}")
print(f"LOSSES: {len(lost)}")
print(f"TOTAL PNL: ${total_pnl:.2f}")
print(f"BALANCE: ${bal:.2f}")
print(f"WIN RATE: {len(won)/(len(won)+len(lost))*100:.1f}%" if won or lost else "WIN RATE: N/A")
PYEOF

          # Drop ALL policies and disable RLS
          echo ""
          echo "=== FIXING RLS ==="
          
          # Use management API to run SQL
          curl -s -X POST "$BASE/rest/v1/rpc/query" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE delta_arb_trades DISABLE ROW LEVEL SECURITY;"}' || true
          
          # Try PostgREST admin endpoint
          curl -s -X POST "https://fjdzhrdpioxdeyyfogep.supabase.co/pg/query" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"ALTER TABLE delta_arb_trades DISABLE ROW LEVEL SECURITY;"}' || true

          # Verify anon can read now
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDQwMDMsImV4cCI6MjA5MzY4MDAwM30.Mkbodv6uEb1yMKA0UIKMzm-cFWfcgNFXr-LLGtqoNcg"
          echo ""
          echo "=== ANON READ TEST ==="
          curl -s "$BASE/rest/v1/delta_arb_trades?select=id,status&limit=3" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" \
            -w "\nHTTP:%{http_code}"

      - name: Write stats to file
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co"
          curl -s "$BASE/rest/v1/delta_arb_trades?select=status,pnl_usdc&order=created_at.desc" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" > /tmp/trades.json
          
          python3 << 'PYEOF'
import json
with open('/tmp/trades.json') as f:
    trades = json.load(f)
won  = [t for t in trades if t['status'] == 'won']
lost = [t for t in trades if t['status'] == 'lost']
total_pnl = sum(float(t['pnl_usdc'] or 0) for t in trades)
bal = 100 + total_pnl
wr = f"{len(won)/(len(won)+len(lost))*100:.1f}%" if (won or lost) else "N/A"
result = {
    "trades": len(trades), "wins": len(won), "losses": len(lost),
    "total_pnl": round(total_pnl,2), "balance": round(bal,2), "win_rate": wr
}
with open('_delta_arb_stats.json','w') as f:
    json.dump(result, f, indent=2)
print(json.dumps(result, indent=2))
PYEOF

          # Also test anon read and save result
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqZHpocmRwaW94ZGV5eWZvZ2VwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDQwMDMsImV4cCI6MjA5MzY4MDAwM30.Mkbodv6uEb1yMKA0UIKMzm-cFWfcgNFXr-LLGtqoNcg"
          curl -s "$BASE/rest/v1/delta_arb_trades?select=id,status&limit=3" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" > _delta_arb_anon_test.json
          echo "ANON TEST:" && cat _delta_arb_anon_test.json

      - name: Commit results
        run: |
          git config user.email "bot@sqi.com"
          git config user.name "SQI Bot"
          git add _delta_arb_stats.json _delta_arb_anon_test.json
          git commit -m "ci: stats + anon read test result" || echo "no changes"
          git push
