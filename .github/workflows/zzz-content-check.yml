name: SQI - Diagnostic Content Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Check content_changelog
        env:
          SUPABASE_URL: ${{ secrets.LOVABLE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.LOVABLE_SUPABASE_ANON_KEY }}
          SCRIPT_B64: 
        run: |
          echo "$SCRIPT_B64" | base64 -d > /tmp/check.py
          python3 /tmp/check.py
      - name: Commit result
        run: |
          git config user.name "SQI Bot"
          git config user.email "bot@sqi.local"
          mkdir -p diagnostics
          mv content_check_result.json diagnostics/content-check.json
          git add diagnostics/content-check.json
          git commit -m "diagnostic: content_changelog check" || echo "nothing to commit"
          git push
