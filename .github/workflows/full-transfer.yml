name: Complete Migration Old to New Supabase

on:
  push:
    paths:
      - '.github/workflows/full-transfer.yml'
      - 'scripts/migrate-final.mjs'
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Run full migration
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          NEW_SVC: ${{ secrets.NEW_SERVICE_ROLE }}
        run: node scripts/migrate-final.mjs
