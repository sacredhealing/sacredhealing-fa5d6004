name: Fix Quantum Sync Data

on:
  push:
    paths:
      - '.github/workflows/fix-quantum-sync.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check and fix active transmissions
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SVC: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          node << 'EOF'
          const https = require('https');
          const PAT = process.env.PAT;
          const REF = 'ssygukfdbtehvtndandn';
          const ADAM = 'bd0b21c9-577a-450b-bb1e-21c9d0423f17';

          function sql(ref, query) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ query });
              const r = https.request({
                hostname: 'api.supabase.com',
                path: `/v1/projects/${ref}/database/query`,
                method: 'POST',
                headers: { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              }, (res) => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve({ s: res.statusCode, b: JSON.parse(d) }); } catch { resolve({ s: res.statusCode, b: d }); } });
              });
              r.on('error', e => resolve({ s: 0, b: e.message }));
              r.write(body); r.end();
            });
          }

          async function main() {
            // Check user_active_transmissions for Adam
            console.log('=== user_active_transmissions for Adam ===');
            const tx = await sql(REF, `SELECT user_id, updated_at, jsonb_array_length(activations::jsonb) as count FROM public.user_active_transmissions WHERE user_id = '${ADAM}'`);
            console.log('Status:', tx.s);
            console.log('Result:', JSON.stringify(tx.b));

            // Check RLS on user_active_transmissions
            console.log('\n=== RLS policies on user_active_transmissions ===');
            const rls = await sql(REF, `SELECT policyname, cmd FROM pg_policies WHERE tablename = 'user_active_transmissions'`);
            console.log('Policies:', JSON.stringify(rls.b));

            // Check if table exists at all
            console.log('\n=== Table check ===');
            const tables = await sql(REF, `SELECT tablename FROM pg_catalog.pg_tables WHERE schemaname = 'public' AND tablename LIKE '%transmission%' OR tablename LIKE '%quantum%' OR tablename LIKE '%active%'`);
            console.log('Tables:', JSON.stringify(tables.b));
          }

          main().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          EOF
