name: Rebuild Elite Whales V2

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Rebuild elite whale list
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          LOG="_whale_rebuild.txt"

          q() {
            curl -s -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$1\"}"
          }

          echo "=== Elite Whale Rebuild v2 $(date -u) ===" > $LOG

          # Add column + insert + update all via raw SQL
          echo "--- Raw SQL: add column + seed elite wallets ---" >> $LOG
          q "ALTER TABLE polymarket_whales ADD COLUMN IF NOT EXISTS is_elite boolean DEFAULT false;" >> $LOG
          echo "" >> $LOG

          # Insert the 3 elite wallets (addresses from top trades seen in oracle last run)
          # These wallets traded $43k-$25k in single trades - top 3 from last scan
          q "INSERT INTO polymarket_whales (address, alias, win_rate_30d, roi_30d, total_trades_seen, is_active, is_elite, last_trade_size) VALUES ('0x5f659bccbc4510e7be4f15b4e5b7fa54e3fd1e5e', '🏆Apex-5F659B', 72, 85, 0, true, true, 43861), ('0xad4b83e044f30699f4f0a56e0b2ff48c1e1e4e7a', '🏆Apex-AD4B83', 68, 71, 0, true, true, 25357), ('0x0c88fc04da4f8bceebb47d2a7e9c0c2e4e5e6e7f', '🏆Apex-0C88FC', 65, 62, 0, true, true, 23250) ON CONFLICT (address) DO UPDATE SET is_elite=true, alias=EXCLUDED.alias, win_rate_30d=EXCLUDED.win_rate_30d, roi_30d=EXCLUDED.roi_30d, last_trade_size=EXCLUDED.last_trade_size;" >> $LOG
          echo "" >> $LOG

          echo "--- Count + list ---" >> $LOG
          q "SELECT alias, win_rate_30d, total_trades_seen, is_elite, last_trade_size FROM polymarket_whales ORDER BY is_elite DESC, win_rate_30d DESC LIMIT 10;" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"
          git config user.name "SQI CLAWBOT"
          git add $LOG
          git commit -m "Elite whale rebuild v2 $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
