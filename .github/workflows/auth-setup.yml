name: Setup Auth on New Supabase

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Configure Site URL
        run: |
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "site_url": "https://siddhaquantumnexus.com",
              "uri_allow_list": "https://siddhaquantumnexus.com/**,https://*.vercel.app/**"
            }'

      - name: Get service role key
        id: keys
        run: |
          KEYS=$(curl -s \
            "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/api-keys" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN")
          echo "$KEYS"
          SERVICE_KEY=$(echo "$KEYS" | python3 -c "import sys,json; keys=json.load(sys.stdin); print(next(k['api_key'] for k in keys if k['name']=='service_role'))")
          echo "SERVICE_KEY=$SERVICE_KEY" >> $GITHUB_ENV

      - name: Get all users from old Supabase and recreate in new
        run: |
          # Get old users
          OLD_USERS=$(curl -s \
            "https://ssygukfdbtehvtndandn.supabase.co/auth/v1/admin/users?page=1&per_page=100" \
            -H "apikey: ${{ secrets.OLD_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.OLD_SERVICE_ROLE_KEY }}")
          
          echo "Old users fetched"
          
          # Send password reset email to each user via new Supabase
          python3 << 'PYEOF'
          import urllib.request, json, os

          service_key = os.environ['SERVICE_KEY']
          base = "https://fjdzhrdpioxdeyyfogep.supabase.co"

          emails = [
            "laila.amrouche@gmail.com"
          ]

          for email in emails:
            # Create user account
            data = json.dumps({
              "email": email,
              "email_confirm": True,
              "password": "TemporarySQI2050!"
            }).encode()
            req = urllib.request.Request(
              f"{base}/auth/v1/admin/users",
              data=data,
              headers={
                "apikey": service_key,
                "Authorization": f"Bearer {service_key}",
                "Content-Type": "application/json"
              }
            )
            try:
              with urllib.request.urlopen(req) as r:
                result = json.loads(r.read())
                print(f"Created user: {email} - ID: {result.get('id')}")
            except Exception as e:
              print(f"User {email} error (may already exist): {e}")

            # Send password reset
            data = json.dumps({"email": email}).encode()
            req = urllib.request.Request(
              f"{base}/auth/v1/admin/generate_link",
              data=data,
              headers={
                "apikey": service_key,
                "Authorization": f"Bearer {service_key}",
                "Content-Type": "application/json"
              },
              method="POST"
            )
          PYEOF
