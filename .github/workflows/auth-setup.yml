name: Setup Auth Users on New Supabase

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Configure Site URL + create users + send reset emails
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          PAT = os.environ['SUPABASE_ACCESS_TOKEN']
          PROJECT = "fjdzhrdpioxdeyyfogep"
          BASE_MGMT = "https://api.supabase.com/v1"
          BASE_AUTH = f"https://{PROJECT}.supabase.co"

          def mgmt(method, path, body=None):
            req = urllib.request.Request(
              f"{BASE_MGMT}{path}",
              data=json.dumps(body).encode() if body else None,
              headers={"Authorization": f"Bearer {PAT}", "Content-Type": "application/json"},
              method=method
            )
            try:
              with urllib.request.urlopen(req) as r:
                return json.loads(r.read())
            except Exception as e:
              print(f"MGMT error {path}: {e}")
              return {}

          # 1. Set Site URL
          print("Setting Site URL...")
          mgmt("PATCH", f"/projects/{PROJECT}/config/auth", {
            "site_url": "https://siddhaquantumnexus.com",
            "uri_allow_list": "https://siddhaquantumnexus.com/**,https://*.vercel.app/**"
          })
          print("Site URL set.")

          # 2. Get service role key
          print("Getting service role key...")
          keys = mgmt("GET", f"/projects/{PROJECT}/api-keys")
          service_key = next((k['api_key'] for k in keys if k['name'] == 'service_role'), None)
          if not service_key:
            print("ERROR: Could not get service role key")
            exit(1)
          print("Got service role key.")

          # 3. Create user accounts
          emails = [
            "sacredhealingvibe@gmail.com",
            "laila.amrouche@gmail.com"
          ]

          for email in emails:
            print(f"Creating user: {email}")
            data = json.dumps({
              "email": email,
              "email_confirm": True,
              "password": "SQI2050sacred!"
            }).encode()
            req = urllib.request.Request(
              f"{BASE_AUTH}/auth/v1/admin/users",
              data=data,
              headers={
                "apikey": service_key,
                "Authorization": f"Bearer {service_key}",
                "Content-Type": "application/json"
              }
            )
            try:
              with urllib.request.urlopen(req) as r:
                result = json.loads(r.read())
                print(f"Created: {email} — ID: {result.get('id')}")
            except urllib.error.HTTPError as e:
              body = e.read().decode()
              if 'already' in body.lower() or 'exists' in body.lower():
                print(f"{email} already exists — skipping")
              else:
                print(f"Error creating {email}: {body}")

            # Send password reset email
            print(f"Sending reset email to: {email}")
            data = json.dumps({"email": email, "type": "recovery"}).encode()
            req = urllib.request.Request(
              f"{BASE_AUTH}/auth/v1/admin/generate_link",
              data=data,
              headers={
                "apikey": service_key,
                "Authorization": f"Bearer {service_key}",
                "Content-Type": "application/json"
              }
            )
            try:
              with urllib.request.urlopen(req) as r:
                result = json.loads(r.read())
                print(f"Reset link for {email}: {result.get('action_link', 'check email')}")
            except Exception as e:
              print(f"Reset email error for {email}: {e}")

          print("DONE. Both accounts created. Temporary password: SQI2050sacred!")
          PYEOF
