name: Configure Supabase Email

on:
  push:
    branches: [main]
    paths:
      - 'scripts/configure-supabase-email.mjs'
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Resend SMTP for Supabase auth emails
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/configure-supabase-email.mjs
