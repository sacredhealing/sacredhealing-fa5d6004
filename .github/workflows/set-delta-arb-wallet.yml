name: Set Delta-Arb Platform Wallet

on:
  workflow_dispatch:

jobs:
  set-wallet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Set wallet in Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          npm install -g supabase@latest 2>&1 | tail -1
          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo
          cd repo
          supabase link --project-ref fjdzhrdpioxdeyyfogep 2>&1 | tail -2
          supabase db push --linked 2>&1 | tail -3
          
          # Run the SQL directly via psql through supabase
          supabase db execute --linked --sql "UPDATE delta_arb_platform_config SET platform_wallet = '0x8BdcA3db0AAECb67b0818AAbAa5398765c649335', updated_at = now() WHERE id = 1;" 2>&1 || true
          
          echo "Wallet set: 0x8BdcA3db0AAECb67b0818AAbAa5398765c649335"
