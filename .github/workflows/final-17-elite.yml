name: Simple 17 Elite

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Patch 17 elite
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          B="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/polymarket_whales"
          H1="apikey: ${SK}"
          H2="Authorization: Bearer ${SK}"
          H3="Content-Type: application/json"
          D='{"is_elite":true,"is_active":true}'
          LOG="_final17.txt"

          echo "Patching 93511D..." > $LOG
          curl -s -o /dev/null -w "%{http_code}\n" -X PATCH "${B}?address=eq.0x93511d72d294f1478739bc38f578bf0306fd9e4d" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG

          echo "Patching FEA31B..." >> $LOG
          curl -s -o /dev/null -w "%{http_code}\n" -X PATCH "${B}?address=eq.0xfea31bc088000ff909be1dfd8d0e3f2c7ef2d227" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG

          echo "--- Final elite list ---" >> $LOG
          curl -s "${B}?is_elite=eq.true&select=alias,total_profit,strategy&order=total_profit.desc" \
            -H "$H1" -H "$H2" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"
          git config user.name "SQI"
          git add $LOG
          git commit -m "17 elite confirmed" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
