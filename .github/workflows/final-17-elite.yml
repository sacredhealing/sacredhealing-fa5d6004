name: Final 17 Elite

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Set 17 elite
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          SK="${SUPABASE_SERVICE_KEY}"
          LOG="_final17.txt"
          for addr in 0x93511d72d294f1478739bc38f578bf0306fd9e4d 0xfea31bc088000ff909be1dfd8d0e3f2c7ef2d227; do
            curl -s -o /dev/null -w "%{http_code}" -X PATCH "${BASE}/polymarket_whales?address=eq.${addr}" -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" -H "Content-Type: application/json" -d '{"is_elite":true}' >> "${LOG}"
            echo "" >> "${LOG}"
          done
          curl -s "${BASE}/polymarket_whales?select=alias,total_profit,strategy,is_elite&is_elite=eq.true&order=total_profit.desc" -H "apikey: ${SK}" -H "Authorization: Bearer ${SK}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f"TOTAL ELITE: {len(d)}"); [print(f"  [{w.get(chr(115)+chr(116)+chr(114)+chr(97)+chr(116)+chr(101)+chr(103)+chr(121),chr(83)+chr(48))}] {w[chr(97)+chr(108)+chr(105)+chr(97)+chr(115)][: 30]:30} +${float(w[chr(116)+chr(111)+chr(116)+chr(97)+chr(108)+chr(95)+chr(112)+chr(114)+chr(111)+chr(102)+chr(105)+chr(116)]):>9,.0f}") for w in d]" >> "${LOG}" 2>&1
          cat "${LOG}"
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add "${LOG}"
          git commit -m "17 elite final" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
