name: Deploy Subscription Cancellation Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.200.3/supabase_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin supabase
          supabase --version

      - name: Deploy subscription functions
        env:
          SUPABASE_ACCESS_TOKEN: sbp_102e689504a6e8b6e2e8df3e36a7699a7d94d744
        run: |
          FAILED=""
          for fn in admin-user-management stripe-cancel-subscription stripe-reactivate-subscription stripe-billing-portal; do
            echo "=== Deploying $fn ==="
            if supabase functions deploy $fn --project-ref ssygukfdbtehvtndandn --no-verify-jwt; then
              echo "OK: $fn"
            else
              echo "FAILED: $fn"
              FAILED="$FAILED $fn"
            fi
          done
          if [ -n "$FAILED" ]; then echo "Failed functions:$FAILED"; exit 1; fi
          echo "ALL DEPLOYED"
