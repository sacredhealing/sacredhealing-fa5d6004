name: Deploy Subscription Cancellation Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy subscription functions to ssygukfdbtehvtndandn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          for fn in admin-user-management stripe-cancel-subscription stripe-reactivate-subscription stripe-billing-portal; do
            echo "=== Deploying $fn ==="
            supabase functions deploy $fn \
              --project-ref ssygukfdbtehvtndandn \
              --no-verify-jwt 2>&1
            echo "Exit: $?"
          done
