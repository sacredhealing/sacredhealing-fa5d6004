name: Set Polymarket API Keys

on:
  workflow_dispatch:

jobs:
  set-vars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Set vars
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          python3 scripts/set_railway_vars.py 2>&1 | tee _set_vars_result.txt
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _set_vars_result.txt
          git commit -m "Set vars result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
