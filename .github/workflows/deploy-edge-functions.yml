name: Deploy Edge Functions to New Supabase

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy critical functions first
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in quantum-apothecary-chat bhrigu-oracle ayurveda-chat jyotish-ephemeris stripe-webhook send-welcome-email gemini-health; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "Deploying $fn..."
              supabase functions deploy $fn --project-ref fjdzhrdpioxdeyyfogep || echo "WARNING: $fn failed"
            fi
          done

      - name: Deploy all remaining functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in supabase/functions/*/; do
            fn=$(basename $fn)
            if [[ "$fn" != _* ]]; then
              echo "Deploying $fn..."
              supabase functions deploy $fn --project-ref fjdzhrdpioxdeyyfogep || echo "WARNING: $fn failed"
            fi
          done
