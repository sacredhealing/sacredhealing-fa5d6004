name: Deploy Edge Functions to New Supabase

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout OK: $(ls repo/supabase/functions | wc -l) functions found"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all updated functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          PROJECT=fjdzhrdpioxdeyyfogep
          for fn in quantum-apothecary-chat bhrigu-oracle ayurveda-chat vastu-chat guide-chat gemini-bridge nadi-scan sqi-oracle stripe-webhook admin-user-management; do
            echo "=== Deploying $fn ==="
            supabase functions deploy $fn --project-ref $PROJECT --no-verify-jwt 2>&1 || echo "WARNING: $fn failed (continuing)"
          done
          echo "Done at $(date)"
