name: Set Member Tiers and Migrate User Data

on:
  push:
    paths:
      - 'scripts/set-tiers.cjs'
      - '.github/workflows/set-tiers.yml'
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set tiers
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SVC: ${{ secrets.NEW_SERVICE_ROLE }}
        run: node scripts/set-tiers.cjs
