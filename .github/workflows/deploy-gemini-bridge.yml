name: Deploy gemini-bridge Edge Function

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/gemini-bridge/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.200.3/supabase_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin supabase
          supabase --version

      - name: Deploy edge function to the live project (ssygukfdbtehvtndandn)
        id: deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set +e
          supabase functions deploy gemini-bridge \
            --project-ref ssygukfdbtehvtndandn \
            --no-verify-jwt > /tmp/deploy_output.txt 2>&1
          echo "exit_code=$?" >> /tmp/deploy_output.txt
          cat /tmp/deploy_output.txt

      - name: Report result as a commit comment (log storage isn't reachable from the debugging sandbox)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/deploy_output.txt | head -c 60000)
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "$(python3 -c 'import json,sys; print(json.dumps({"body": "### gemini-bridge deploy output\n```\n" + sys.stdin.read() + "\n```"}))' <<< "$BODY")"
