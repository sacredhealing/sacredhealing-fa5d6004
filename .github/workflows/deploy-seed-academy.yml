name: Deploy and Run Academy Seed

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy seed-academy function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy seed-academy --project-ref fjdzhrdpioxdeyyfogep --no-verify-jwt

      - name: Invoke seed-academy and verify
        env:
          SK: ${{ secrets.NEW_SERVICE_ROLE }}
        run: |
          RESP=$(curl -s -X POST \
            "https://fjdzhrdpioxdeyyfogep.supabase.co/functions/v1/seed-academy" \
            -H "Authorization: Bearer $SK" \
            -H "Content-Type: application/json" \
            --max-time 120)
          echo "Response: $RESP"

