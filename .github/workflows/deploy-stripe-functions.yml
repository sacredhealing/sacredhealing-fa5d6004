name: Deploy Stripe Infrastructure Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy stripe-webhook \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: false

      - name: Deploy create-tier-checkout
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy create-tier-checkout \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: false

      - name: Deploy process-payout-request
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy process-payout-request \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: false

      - name: Confirm
        run: echo "✓ All 3 Stripe functions deployed to fjdzhrdpioxdeyyfogep"
