name: Fix RLS and Insert Profile

on:
  push:
    paths:
      - '.github/workflows/fix-rls-profile.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix RLS to use user_id column
        run: |
          PAT="${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          REF="fjdzhrdpioxdeyyfogep"

          sql() {
            curl -s -X POST "https://api.supabase.com/v1/projects/$REF/database/query" \
              -H "Authorization: Bearer $PAT" \
              -H "Content-Type: application/json" \
              --data-binary "{\"query\":$(echo "$1" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))')}"
          }

          echo "=== Drop old wrong policies ==="
          sql "DROP POLICY IF EXISTS allow_users_read_own ON public.profiles"
          sql "DROP POLICY IF EXISTS allow_users_update_own ON public.profiles"
          sql "DROP POLICY IF EXISTS allow_users_insert_own ON public.profiles"
          sql "DROP POLICY IF EXISTS allow_service_all ON public.profiles"

          echo "=== Create correct policies using user_id ==="
          sql "CREATE POLICY allow_read ON public.profiles FOR SELECT TO authenticated USING (auth.uid() = user_id)"
          sql "CREATE POLICY allow_update ON public.profiles FOR UPDATE TO authenticated USING (auth.uid() = user_id) WITH CHECK (auth.uid() = user_id)"
          sql "CREATE POLICY allow_insert ON public.profiles FOR INSERT TO authenticated WITH CHECK (auth.uid() = user_id)"
          sql "CREATE POLICY allow_service ON public.profiles TO service_role USING (true) WITH CHECK (true)"

          echo ""
          echo "=== Check policies created ==="
          sql "SELECT policyname, cmd FROM pg_policies WHERE tablename='profiles'"

          echo ""
          echo "=== Check Adam profile exists ==="
          sql "SELECT id, user_id, email, full_name, display_name, membership_tier, is_admin, has_akasha_infinity_access FROM public.profiles WHERE user_id='bd0b21c9-577a-450b-bb1e-21c9d0423f17'"

          echo ""
          echo "=== Update Adam profile with correct data ==="
          sql "UPDATE public.profiles SET full_name='Adam', display_name='Adam', email='sacredhealingvibe@gmail.com', membership_tier='akasha_infinity', subscription_tier='akasha_infinity', subscription_status='active', has_prana_flow_access=true, has_siddha_quantum_access=true, has_akasha_infinity_access=true, is_admin=true, onboarding_completed=true WHERE user_id='bd0b21c9-577a-450b-bb1e-21c9d0423f17'"

          echo ""
          echo "=== Verify final state ==="
          sql "SELECT id, user_id, full_name, membership_tier, is_admin, has_akasha_infinity_access FROM public.profiles WHERE user_id='bd0b21c9-577a-450b-bb1e-21c9d0423f17'"
