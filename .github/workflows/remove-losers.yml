name: Demote Negative EV Whales

on:
  workflow_dispatch:

jobs:
  demote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Demote to watching
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          B="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1/polymarket_whales"
          H1="apikey: ${SK}"
          H2="Authorization: Bearer ${SK}"
          H3="Content-Type: application/json"
          D='{"is_elite":false}'
          LOG="_demoted.txt"

          echo "Demoting 9 negative EV wallets..." > $LOG
          curl -s -o /dev/null -w "84CFFF: %{http_code}\n" -X PATCH "${B}?address=eq.0x84cfffc3f16dcc353094de30d4a45226eccd2f63" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "84AD9C: %{http_code}\n" -X PATCH "${B}?address=eq.0x84ad9c5c547a82ec9a08547b94bd922446e5bfb7" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "EED588: %{http_code}\n" -X PATCH "${B}?address=eq.0xeed588bab0b0df73a9a6def7a59e512e9ede1a33" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "000D25: %{http_code}\n" -X PATCH "${B}?address=eq.0x000d257d2dc7616feaef4ae0f14600fdf50a758e" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "E52C0A: %{http_code}\n" -X PATCH "${B}?address=eq.0xe52c0a1327a12edc7bd54ea6f37ce00a4ca96924" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "93511D: %{http_code}\n" -X PATCH "${B}?address=eq.0x93511d72d294f1478739bc38f578bf0306fd9e4d" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "D3B034: %{http_code}\n" -X PATCH "${B}?address=eq.0xd3b034d7bfb2473fb252d0414646d9786bac329e" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "B2A362: %{http_code}\n" -X PATCH "${B}?address=eq.0xb2a3623364c33561d8312e1edb79eb941c798510" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG
          curl -s -o /dev/null -w "335592: %{http_code}\n" -X PATCH "${B}?address=eq.0x335592400e402c26583ce8b56d12605e9548a126" -H "$H1" -H "$H2" -H "$H3" -d "$D" >> $LOG

          echo "" >> $LOG
          echo "REMAINING ELITE:" >> $LOG
          curl -s "${B}?is_elite=eq.true&order=total_profit.desc&select=alias,total_profit,win_rate_30d,strategy" \
            -H "$H1" -H "$H2" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "Demoted 9 negative EV wallets" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
