name: Create Users Only

on:
  push:
    paths:
      - 'scripts/users-only.mjs'

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create admin users
        env:
          NEW_SERVICE_ROLE: ${{ secrets.NEW_SERVICE_ROLE }}
        run: node scripts/users-only.mjs
