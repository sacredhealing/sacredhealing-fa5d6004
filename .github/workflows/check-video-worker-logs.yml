name: Check Video Worker Logs (read-only)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Install sshpass
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 22 -H 178.105.183.74 > ~/.ssh/known_hosts 2>/dev/null

      - name: Pull live logs (no restart)
        env:
          HETZNER_PASS: ${{ secrets.HETZNER_ROOT_PASSWORD }}
        run: |
          sshpass -p "$HETZNER_PASS" ssh -T -o StrictHostKeyChecking=yes root@178.105.183.74 << 'REMOTE' > _worker_logs.txt 2>&1
          echo "=== PM2 STATUS ==="
          pm2 list
          echo ""
          echo "=== LAST 60 LOG LINES (out) ==="
          pm2 logs video-worker --lines 60 --nostream --out 2>/dev/null
          echo ""
          echo "=== LAST 30 LOG LINES (error) ==="
          pm2 logs video-worker --lines 30 --nostream --err 2>/dev/null
          echo ""
          echo "=== ACTIVE JOB TMP DIRS ==="
          ls -la /root/sqi-app/video-worker/tmp/ 2>/dev/null || echo "no tmp dir"
          echo ""
          echo "=== HEALTH ==="
          curl -sf http://localhost:3002/health
          REMOTE

          git config user.email "bot@sqi.app"
          git config user.name "SQI Deploy Bot"
          git add _worker_logs.txt
          git commit -m "worker log check $(date -u +%Y-%m-%dT%H:%M)" || true
          git push "https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git" HEAD:main || true
