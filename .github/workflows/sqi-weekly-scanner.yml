name: SQI — Weekly Content Scanner + Voice Composer

on:
  schedule:
    - cron: '0 6 * * 6'   # Saturday 06:00 UTC
  workflow_dispatch:

jobs:
  scan-and-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cd repo
          supabase secrets set \
            GH_TOKEN=${{ secrets.GH_ADMIN_PAT }} \
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --project-ref fjdzhrdpioxdeyyfogep 2>/dev/null || true

      - name: 1. Run content scanner
        id: scanner
        env:
          SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "\u2736 Step 1: Content scanner"
          SCAN=$(curl -s -X POST \
            "$SUPABASE_URL/functions/v1/sqi-weekly-scanner" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{}" --max-time 240)
          echo "Scanner: $SCAN"
          # Extract content items as JSON for next step
          echo "SCAN_RESULT=$SCAN" >> $GITHUB_ENV

      - name: 2. Run voice composer
        env:
          SUPABASE_URL: https://fjdzhrdpioxdeyyfogep.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "\u2736 Step 2: Voice composer — generating this week's emails"
          COMPOSE=$(curl -s -X POST \
            "$SUPABASE_URL/functions/v1/sqi-voice-composer" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"emailType":"both"}' --max-time 240)
          echo "Compose result: $COMPOSE"
          echo "$COMPOSE" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    m = d.get('monday', {})
    f = d.get('friday', {})
    print('Monday subject:', m.get('subject',''))
    print('Friday subject:', f.get('subject',''))
    print('Week:', d.get('weekDate',''))
    print('\u2736 Both emails generated and stored in Supabase')
except: print('Parse error:', sys.stdin.read()[:200])
" || true

      - name: Done
        run: echo "\u2736 Saturday scan complete. Monday 07:00 UTC will send with this week's voice."
