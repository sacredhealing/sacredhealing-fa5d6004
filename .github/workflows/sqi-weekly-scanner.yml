name: SQI - Weekly Content Scanner

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Scan commits and write to content_changelog
        env:
          SUPABASE_URL: ${{ secrets.LOVABLE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.LOVABLE_SUPABASE_ANON_KEY }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          SCRIPT_B64: 
        run: |
          echo "$SCRIPT_B64" | base64 -d > /tmp/scan.py
          python3 /tmp/scan.py
