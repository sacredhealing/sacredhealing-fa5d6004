name: Read Platform Wallet v2

on:
  workflow_dispatch:

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Query via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          npm install -g supabase@latest 2>&1 | tail -1
          git clone "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" repo
          cd repo
          supabase link --project-ref fjdzhrdpioxdeyyfogep
          
          RESULT=$(supabase db query --linked "SELECT platform_wallet FROM clawbot_platform_config WHERE id = 1;" 2>&1)
          echo "CLAWBOT_WALLET=$RESULT"
          
          RESULT2=$(supabase db query --linked "SELECT platform_wallet FROM delta_arb_platform_config WHERE id = 1;" 2>&1)
          echo "DELTA_ARB_WALLET=$RESULT2"
          
          # Write to file and commit
          cd ..
          echo "clawbot: $RESULT" > _wallet_result.txt
          echo "delta_arb: $RESULT2" >> _wallet_result.txt
          git config user.email "bot@sqi.app"
          git config user.name "SQI-Bot"
          git add _wallet_result.txt
          git commit -m "ci: wallet read result" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
