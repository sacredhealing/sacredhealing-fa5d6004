name: Add Cloudflare DNS for CLAWBOT

on:
  workflow_dispatch:

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Add DNS records
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          LOG="_cf_dns.txt"
          echo "=== Adding Cloudflare DNS for clawbot.siddhaquantumnexus.com ===" > $LOG

          # Get zone ID
          ZONE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=siddhaquantumnexus.com" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',[]); print(r[0]['id'] if r else 'NOT_FOUND')")
          echo "Zone ID: $ZONE" >> $LOG

          if [ "$ZONE" = "NOT_FOUND" ]; then
            echo "ERROR: Zone not found or token invalid" >> $LOG
            cat $LOG; exit 1
          fi

          # Add CNAME record: clawbot -> znoshz46.up.railway.app
          CNAME=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"clawbot","content":"znoshz46.up.railway.app","ttl":1,"proxied":false}')
          echo "CNAME result: $CNAME" >> $LOG

          # Add TXT record for Railway verification
          TXT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"TXT","name":"_railway-verify.clawbot","content":"railway-verify=a309b36de887bd641d969c3ede","ttl":1}')
          echo "TXT result: $TXT" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"; git config user.name "SQI"
          git add $LOG
          git commit -m "CF DNS for clawbot.siddhaquantumnexus.com" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
