name: Deploy Edge Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Disable spend cap
        run: |
          curl -s -X PUT             "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/billing/spend-cap"             -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN"             -H "Content-Type: application/json"             -d '{"is_enabled": false}' || true
          echo "Spend cap disabled"

      - name: Delete auto-deployed non-critical functions
        run: |
          PROJECT=fjdzhrdpioxdeyyfogep
          for fn in abundance-oracle affiliate-commission akasha-codex-backfill akasha-codex-cluster akasha-codex-curator akasha-codex-export analyze-dosha analyze-music-track apply-promo-code audio-analysis audio-to-scripture auth-email-hook backfill-stripe-revenue check-achievements; do
            supabase functions delete $fn --project-ref $PROJECT || true
          done

      - name: Set Gemini API secret
        run: |
          supabase secrets set GEMINI_API_KEY=AIzaSyAdDnCIjX7AZqzLGBUYEi5BGZ6fgzA6SS0 --project-ref fjdzhrdpioxdeyyfogep

      - name: Deploy critical functions
        run: |
          PROJECT=fjdzhrdpioxdeyyfogep
          OPTS="--project-ref $PROJECT --use-api"
          supabase functions deploy quantum-apothecary-chat $OPTS
          supabase functions deploy quantum-apothecary $OPTS
          supabase functions deploy guide-chat $OPTS
          supabase functions deploy gemini-bridge $OPTS
          supabase functions deploy vastu-chat $OPTS
          supabase functions deploy bhrigu-oracle $OPTS
          supabase functions deploy prediction-engine-scan $OPTS
          supabase functions deploy ayurveda-chat $OPTS
          supabase functions deploy nadi-scan $OPTS
          supabase functions deploy sqi-oracle $OPTS
          supabase functions deploy stripe-webhook $OPTS
          supabase functions deploy create-membership-checkout $OPTS
          supabase functions deploy check-membership-subscription $OPTS
          supabase functions deploy customer-portal $OPTS
          supabase functions deploy create-tier-checkout $OPTS
          supabase functions deploy weekly-alignment-email $OPTS
          supabase functions deploy send-welcome-email $OPTS

  create-users:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/create-admin.mjs