name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Gemini API secret
        run: |
          supabase secrets set GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --project-ref fjdzhrdpioxdeyyfogep

      - name: Deploy critical functions
        run: |
          PROJECT=fjdzhrdpioxdeyyfogep
          OPTS="--project-ref $PROJECT --use-api"
          supabase functions deploy quantum-apothecary-chat $OPTS
          supabase functions deploy quantum-apothecary $OPTS
          supabase functions deploy guide-chat $OPTS
          supabase functions deploy gemini-bridge $OPTS
          supabase functions deploy vastu-chat $OPTS
          supabase functions deploy bhrigu-oracle $OPTS
          supabase functions deploy prediction-engine-scan $OPTS
          supabase functions deploy ayurveda-chat $OPTS
          supabase functions deploy nadi-scan $OPTS
          supabase functions deploy sqi-oracle $OPTS
          supabase functions deploy stripe-webhook $OPTS
          supabase functions deploy create-membership-checkout $OPTS
          supabase functions deploy check-membership-subscription $OPTS
          supabase functions deploy customer-portal $OPTS
          supabase functions deploy create-tier-checkout $OPTS
          supabase functions deploy weekly-alignment-email $OPTS
          supabase functions deploy send-welcome-email $OPTS
          supabase functions deploy fetch-podcast-episodes $OPTS
          supabase functions deploy fetch-shc-price $OPTS
          supabase functions deploy polymarket-proxy $OPTS
