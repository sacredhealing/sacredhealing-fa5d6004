name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout with PAT
        run: |
          git clone https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git repo
          echo "Checkout OK: $(ls repo/supabase/functions | wc -l) functions found"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Gemini API secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -s -o /tmp/secret_resp.json -w "HTTP:%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/secrets" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '[{"name":"GEMINI_API_KEY","value":"${{ secrets.GEMINI_API_KEY }}"}]'
          echo ""

      - name: Deploy quantum-apothecary-chat
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          supabase functions deploy quantum-apothecary-chat \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: true

      - name: Deploy quantum-apothecary
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: repo
        run: |
          supabase functions deploy quantum-apothecary \
            --project-ref fjdzhrdpioxdeyyfogep \
            --no-verify-jwt 2>&1
        continue-on-error: true

      - name: Deploy ayurveda-chat
