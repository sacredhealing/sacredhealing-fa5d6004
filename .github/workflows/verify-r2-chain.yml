name: Verify R2 Chain

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}

      - name: Run verification chain
        run: |
          FN="https://ssygukfdbtehvtndandn.supabase.co/functions/v1/social-post"
          echo "=== 1. presign_upload ===" > _r2_verify.txt
          PRESIGN=$(curl -s -X POST "$FN" -H "Content-Type: application/json" -d '{"action":"presign_upload","ext":"txt"}')
          echo "$PRESIGN" >> _r2_verify.txt
          UPLOAD_URL=$(echo "$PRESIGN" | grep -o '"uploadUrl":"[^"]*"' | cut -d'"' -f4 | sed 's/\\u0026/\&/g')

          echo "" >> _r2_verify.txt
          echo "=== 2. CORS preflight check (simulating the browser) ===" >> _r2_verify.txt
          curl -s -X OPTIONS "$UPLOAD_URL" \
            -H "Origin: https://sacredhealing.lovable.app" \
            -H "Access-Control-Request-Method: PUT" \
            -D - -o /dev/null >> _r2_verify.txt

          cat _r2_verify.txt
          git config user.email "bot@sqi.app"
          git config user.name "SQI Deploy Bot"
          git add _r2_verify.txt
          git commit -m "r2 cors verify $(date -u +%Y-%m-%dT%H:%M)" || true
          git push "https://x-access-token:${{ secrets.GH_ADMIN_PAT }}@github.com/sacredhealing/sacredhealing-fa5d6004.git" HEAD:main || true
