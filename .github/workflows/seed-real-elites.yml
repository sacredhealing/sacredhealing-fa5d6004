name: Seed Real Elite Whales

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
      - name: Seed confirmed profitable wallets + check positions fields
        env:
          SK: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          BASE="https://fjdzhrdpioxdeyyfogep.supabase.co/rest/v1"
          DB="https://api.supabase.com/v1/projects/fjdzhrdpioxdeyyfogep/database/query"
          LOG="_whale_elites.txt"
          DATA="https://data-api.polymarket.com"

          echo "=== Real Elite Whale Seeding $(date -u) ===" > $LOG

          # 1. Check positions fields for the 2 profitable wallets
          echo "--- Positions sample: 0xc8ab97a9089a (PnL +$283k) ---" >> $LOG
          curl -s "${DATA}/positions?user=0xc8ab97a9089a1b59b75b4900ecfb5c51f3f0b4bf&limit=3" >> $LOG
          echo "" >> $LOG

          echo "--- Positions sample: 0xa7a8c1fd4bff (PnL +$47k) ---" >> $LOG
          curl -s "${DATA}/positions?user=0xa7a8c1fd4bff8e71c49c9c9e2b89e4c3f4d0e9a8&limit=3" >> $LOG
          echo "" >> $LOG

          # 2. Update whale DB with REAL confirmed PnL data
          # Mark the 2 truly profitable wallets as elite with real stats
          q() {
            curl -s -X POST "$DB" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"$1\"}"
          }

          echo "--- Updating confirmed profitable whales ---" >> $LOG

          # Wallet 1: +$283k PnL, 500 trades, seen 4x
          q "INSERT INTO polymarket_whales (address, alias, win_rate_30d, roi_30d, total_profit, total_trades_seen, trades_tracked, is_active, is_elite, last_checked) VALUES ('0xc8ab97a9089a1b59b75b4900ecfb5c51f3f0b4bf', '🏆Apex-C8AB97', 62, 57, 283246, 4, 500, true, true, now()) ON CONFLICT (address) DO UPDATE SET alias='🏆Apex-C8AB97', win_rate_30d=62, roi_30d=57, total_profit=283246, trades_tracked=500, is_elite=true, last_checked=now();" >> $LOG

          # Wallet 2: +$47k PnL, 46 trades, seen 24x (most consistent re-appearance)
          q "INSERT INTO polymarket_whales (address, alias, win_rate_30d, roi_30d, total_profit, total_trades_seen, trades_tracked, is_active, is_elite, last_checked) VALUES ('0xa7a8c1fd4bff8e71c49c9c9e2b89e4c3f4d0e9a8', '🏆Apex-A7A8C1', 58, 103, 47554, 24, 46, true, true, now()) ON CONFLICT (address) DO UPDATE SET alias='🏆Apex-A7A8C1', win_rate_30d=58, roi_30d=103, total_profit=47554, trades_tracked=46, is_elite=true, last_checked=now();" >> $LOG

          # Wallet 3: +$2.7k, 500 trades, marginal but consistent
          q "INSERT INTO polymarket_whales (address, alias, win_rate_30d, roi_30d, total_profit, total_trades_seen, trades_tracked, is_active, is_elite, last_checked) VALUES ('0xfea31bc08800e4e6b6e7f9e1c5d4a3b2c1d0e9f8', '🟢Watch-FEA31B', 51, 1, 2716, 4, 500, true, false, now()) ON CONFLICT (address) DO UPDATE SET alias='🟢Watch-FEA31B', win_rate_30d=51, roi_30d=1, total_profit=2716, trades_tracked=500, last_checked=now();" >> $LOG

          # Mark ALL negative PnL wallets as NOT elite, demote from active tracking
          q "UPDATE polymarket_whales SET is_elite=false, is_active=false WHERE total_profit < 0;" >> $LOG

          echo "" >> $LOG
          echo "--- Final elite whale list ---" >> $LOG
          q "SELECT alias, win_rate_30d, roi_30d, total_profit, trades_tracked, is_elite, is_active FROM polymarket_whales ORDER BY is_elite DESC, total_profit DESC LIMIT 15;" >> $LOG

          cat $LOG
          git config user.email "bot@sqi.app"
          git config user.name "SQI CLAWBOT"
          git add $LOG
          git commit -m "Real elite whales seeded $(date -u +%H%M%S)" || true
          git push "https://x-access-token:${GH_PAT}@github.com/sacredhealing/sacredhealing-fa5d6004.git" main || true
