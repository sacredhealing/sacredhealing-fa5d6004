# Railway Service 2: root `polymarket-copy-bot` — combined copy + Polyclaw (main.py).
# Variables: POLYGON_RPC_URL, POLY_*, WALLET_PRIVATE_KEY, PAPER_MODE=true, RISK_PCT, etc.

[build]
builder = "DOCKERFILE"
