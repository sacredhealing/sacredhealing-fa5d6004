<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sacred Healing - Awaken Your Inner Light</title>
    <!-- Tailwind v4 fix deployed -->
    <meta name="description" content="Transform your life with guided meditations, healing courses, and spiritual growth. Earn SHC tokens as you progress on your journey." />
    <meta name="author" content="Sacred Healing" />
    <meta name="theme-color" content="#8A2BE2" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- App Icons - Sacred Healing logo (replace icon-512x512.png and icon-192x192.png with your original logo) -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-512x512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Sacred Healing - Spiritual Wellness App" />
    <meta property="og:description" content="Guided meditations, healing courses, and Web3 rewards for your spiritual journey" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SacredHealing" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sacred Healing" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Performance: DNS Prefetch for external services -->
    <link rel="dns-prefetch" href="https://ssygukfdbtehvtndandn.supabase.co" />
    <link rel="preconnect" href="https://ssygukfdbtehvtndandn.supabase.co" crossorigin />
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  </head>

  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
