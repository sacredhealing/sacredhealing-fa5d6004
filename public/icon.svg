<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="innerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:0.3" />
    </radialGradient>
    <radialGradient id="glowBottom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  <!-- Deep purple background -->
  <rect width="512" height="512" fill="#2D1B4E"/>
  <!-- Subtle glow top-left -->
  <ellipse cx="80" cy="80" rx="120" ry="120" fill="url(#glowTop)" opacity="0.4"/>
  <!-- Outer golden frame with decorative pattern -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="16"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.6"/>
  <!-- Inner teal gradient circle -->
  <circle cx="256" cy="256" r="185" fill="url(#innerBg)"/>
  <!-- Top ornate emblem (lotus/mandala) -->
  <g transform="translate(256, 135)">
    <circle cx="0" cy="0" r="18" fill="url(#glowTop)" opacity="0.95"/>
    <path d="M0,-22 Q12,-8 8,6 Q0,18 -8,6 Q-12,-8 0,-22" fill="url(#gold)" stroke="#DAA520" stroke-width="1" opacity="0.95"/>
    <circle cx="0" cy="-2" r="6" fill="#E91E63"/>
  </g>
  <!-- Bottom ornate emblem (heart) -->
  <g transform="translate(256, 377)">
    <circle cx="0" cy="0" r="18" fill="url(#glowBottom)" opacity="0.9"/>
    <path d="M0,18 C-14,-6 -22,-18 0,-26 C22,-18 14,-6 0,18" fill="url(#gold)" stroke="#DAA520" stroke-width="1" opacity="0.95"/>
    <circle cx="0" cy="2" r="5" fill="#E91E63"/>
  </g>
  <!-- Sacred Healing text -->
  <text x="256" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-style="italic" font-weight="bold" fill="url(#gold)">Sacred</text>
  <text x="256" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-style="italic" font-weight="bold" fill="url(#gold)">Healing</text>
  <!-- Decorative leaf accents at sides -->
  <path d="M380,256 Q400,240 395,256 Q400,272 380,256" fill="url(#gold)" opacity="0.7"/>
  <path d="M132,256 Q112,240 117,256 Q112,272 132,256" fill="url(#gold)" opacity="0.7"/>
</svg>
